## Generated C Headers

The compiler emits a small set of C headers in the generated output. These are organized into three tiers:

**Core headers** — always emitted. These are FC's platform contract — every FC program requires them:

| Header | Provides |
|--------|----------|
| `<stdint.h>` | Fixed-width integer types (`int8_t`, `uint64_t`, etc.) |
| `<stddef.h>` | `ptrdiff_t`, `size_t`, `NULL` |
| `<stdbool.h>` | `bool` |
| `<stdlib.h>` | `malloc`, `free`, `abort` |
| `<string.h>` | `memcmp`, `strlen` |

**Feature-gated headers** — emitted only when the program uses the corresponding feature:

| Header | Triggered by |
|--------|-------------|
| `<stdio.h>` | String interpolation (`"\{expr}"`), or `stdin`/`stdout`/`stderr` globals |
| `<math.h>` | Float type properties using `NAN`/`INFINITY` (`.nan`, `.inf`, `.neg_inf`) |
| `<float.h>` | Float type properties using `FLT_*`/`DBL_*` (`.min`, `.max`, `.epsilon`) |

**Extern-driven headers** — emitted from `module ... from "header.h"` declarations in user code or the standard library. See §C Interop.

A pure-integer program with no string interpolation and no floats gets a 5-header preamble. Stack-dynamic allocation uses `__builtin_alloca` (see §GNU extensions required), avoiding any `<alloca.h>` dependency.

# PART 7 — Memory Management

## Memory Management

FC's memory model is manual — no garbage collector, no borrow checker. Memory lives either on the stack or the heap, and the programmer is responsible for managing heap allocations explicitly.

Five built-in compile-time operators handle memory and runtime checking operations that require compiler participation to resolve:

| Operator | Description |
|----------|-------------|
| `alloc(T)` | Heap-allocate and zero-initialize a value of type `T`, returning `T*?`. |
| `alloc(T[N] { })` | Heap-allocate a zero-initialized slice of `N` elements, returning `T[]?`. `N` may be a runtime value. |
| `alloc(T[N] { elems })` | Heap-allocate a slice initialized with provided elements. `N` must be a literal. |
| `alloc(T, N)` | Heap-allocate a raw buffer of `N` elements of type `T`, returning `T*?`. No length tracking — caller must manage size manually. |
| `alloc(expr)` | Heap-allocate and initialize with the value of `expr`. Accepts: string/cstr literals, interpolated strings (str and cstr), array literals (`T[N] { ... }`), struct literals, union variant constructors, and slice expressions. Scalars and bare variables are a compile error — use `alloc(T)` for uninitialized heap allocation. |
| `free(ptr)` | Free a heap-allocated pointer or slice. When passed a slice, compiler emits `free(slice.ptr)`. |
| `default(T)` | Produce the default (zero-initialized) value of type `T` on the stack. |
| `sizeof(T)` | Return the size in bytes of type `T` as an `int64`. |
| `alignof(T)` | Return the alignment in bytes of type `T` as an `int64`. For fixed arrays `T[N]`, returns alignment of element type `T`. |
| `assert(cond)` | Check that `cond` (a `bool` expression) is true at runtime. If false, prints a diagnostic message to stderr and calls `abort()`. |
| `assert(cond, msg)` | Same as `assert(cond)`, but additionally includes the string `msg` (type `str`) in the diagnostic output. |

These are not functions — they cannot be stored in bindings or passed as arguments. They are resolved entirely at compile time.

`alloc`, `free`, `sizeof`, `alignof`, `default`, and `assert` are **reserved identifiers** — they cannot be used as user-defined binding or function names anywhere in FC code. Attempting to define a binding with one of these names is a compile error. This ensures that bare calls to these operators are always unambiguous, regardless of what names are in scope.

The idiomatic name for a type's cleanup function is `drop` — a convention borrowed from Rust. `T.drop` should free any heap memory the value owns and release any other resources it holds (file handles, connections, and so on). Nothing in the language enforces this name, but it is the expected convention.

**Best practice:** Use `defer` (see §Defer) to pair allocation with cleanup at the point of acquisition. This ensures cleanup runs regardless of which exit path the function takes:

```fc
let p = alloc(point { x = 1, y = 2 })!
defer free(p)
// ... use p, possibly with early returns ...
// free(p) runs automatically
```

---

## Default Values

Every FC type has a well-defined default value, produced by zero-initializing its memory. This is what both `default(T)` on the stack and `alloc(T)` on the heap produce.

```fc
let x = default(int32)     // 0
let f = default(float64)   // 0.0
let b = default(bool)      // false
let s = default(str)       // empty slice — { ptr = null, len = 0 }
let p = default(point)     // point { x = 0.0, y = 0.0 }
let o = default(int32?)    // int32? with no value
let n = sizeof(int32)      // 4 — int64
let a = alignof(int64)     // 8 — int64 (on most platforms)
```

Default values by type category:

| Type | Default |
|------|---------|
| Integer types | `0` |
| Float types | `0.0` |
| `bool` | `false` |
| `T?` | `none` |
| `T*?` | `none` |
| Slices (`T[]`) | Empty slice — `{ ptr = null, len = 0 }`. Safe because bounds checking prevents indexing into a zero-length slice. |
| Structs | Zero bytes across all fields — each field holds whatever zero means for its type at its memory offset. No construction occurs. |
| Unions | Zero bytes — tag field is 0, which maps to the first declared variant. Payload bytes are also zero. The resulting value is a valid union of the first variant with zeroed payload memory. |
| `T*` | Zero bytes — physically null. The programmer is responsible for initializing raw pointer fields before use. |
| Function types | Zero bytes — null `fn_ptr` and null `ctx`. Calling a zero-initialized function value will crash. The programmer is responsible for initializing function-typed fields before calling them. |

> **Note on unions**
> The first-variant convention means the programmer controls what `default(T)` produces for a union by ordering variants intentionally. If no variant is a sensible default, the programmer should avoid relying on `default` for that union and initialize explicitly instead.

**Raw pointer and function-typed fields** — both `default(T)` and `alloc(T)` are zero-initialization under the hood. For types containing raw `T*` fields or function-typed fields, zero-init produces physically null bytes. The programmer is responsible for writing valid values to those fields before dereferencing or calling them, regardless of whether the value lives on the stack or the heap.

## Assert

**`assert(condition)`** — evaluates `condition` (which must be a `bool` expression) at runtime. If the condition is true, execution continues normally. If the condition is false, `assert` prints a diagnostic message to stderr and terminates the program by calling `abort()`.

**`assert(condition, message)`** — same as the single-argument form, but additionally includes `message` (which must be a `str` expression) in the diagnostic output.

```fc
assert(x > 0)
assert(x > 0, "x must be positive")
assert(count == items.len, "count mismatch")
```

The diagnostic output follows FC's error message format:

```
filename:line: assertion failed: x > 0
filename:line: assertion failed: x > 0: x must be positive
```

The expression text is captured at compile time from the source code. The filename and line number refer to the location of the `assert` call in the FC source file.

`assert` is a void-typed expression — it cannot be used where a value is expected. It is a built-in operator, not a function, and does not require any imports.

**Type constraints:**
- The condition must be `bool`. Passing a non-`bool` expression is a compile error.
- The message (if present) must be `str`. Passing a non-`str` expression is a compile error.

> **Transpilation**
> ```c
> // assert(x > 0)
> ({ if (!(x > 0)) { fprintf(stderr, "file.fc:10: assertion failed: x > 0\n"); abort(); } })
>
> // assert(x > 0, "msg")
> ({ if (!(x > 0)) { fc_str _am0 = msg; fprintf(stderr, "file.fc:10: assertion failed: x > 0: %.*s\n", (int)_am0.len, (const char*)_am0.ptr); abort(); } })
> ```

## Stack Allocation

Stack memory is allocated implicitly when a binding is declared. All stack bindings must be initialized at declaration — FC never emits an uninitialized C local variable.

```fc
let x = 42                           // stack int32, initialized to 42
let p = point { x = 1.0, y = 2.0 }  // stack struct, explicitly initialized
let p = default(point)               // stack struct, zero-initialized
let buf = int32[128] { }             // stack slice, zero-initialized
let rgb = uint8[3] { 255, 0, 128 }  // stack slice, exhaustive element list
```

Stack slices are backed by a compiler-generated C array. The slice binding is the only thing the programmer interacts with — the backing array is an implementation detail.

`N` in `T[N] { }` must be a compile-time integer literal for stack-allocated slices. FC does not emit C variable-length arrays (VLAs) — they were made optional in C11 and are absent or unreliable on many embedded compilers. For heap-allocated slices (`alloc(T[N] { })`), `N` may be a runtime value since `calloc` accepts a runtime count.

> **Transpilation**
> `int32[128] { }` transpiles to `int32_t _buf[128] = {0}` plus a slice struct `{ .ptr = _buf, .len = 128 }`. `default(point)` transpiles to `point p = {0}`.

**Lifetime** — all local bindings share the stack frame of their enclosing function. A pointer or slice into stack memory is valid for the duration of the function call and must not escape it. Returning a stack-allocated pointer or slice, or storing it in heap memory that outlives the call, produces a dangling pointer. Use heap allocation for data that must outlive a function call.

#### Escape analysis

The compiler tracks the **provenance** of every pointer and slice expression — whether it refers to stack memory, heap memory, static memory, or is unknown (e.g. received as a function parameter). The following are compile errors:

- **Returning stack memory** — returning a stack-derived pointer, slice, or option-wrapped pointer/slice from a function (both explicit `return` and implicit last-expression):

```fc
let bad = () ->
    let mut x = 42
    &x                              // compile error: cannot return stack-allocated int32*

let also_bad = () ->
    int32[4] { 1, 2, 3, 4 }        // compile error: cannot return stack-allocated int32[]
```

- **Freeing non-heap memory** — calling `free` on a string literal (static memory) or stack-allocated memory:

```fc
free("hello")                       // compile error: cannot free static memory
let mut x = 42
free(&x)                            // compile error: cannot free stack-allocated memory
```

- **Storing stack pointers in heap structs** — passing a stack-derived pointer or slice as a field value in `alloc(struct_lit)`:

```fc
struct node =
    data: int32*

let mut x = 42
let n = alloc(node { data = &x })   // compile error: cannot store stack-allocated int32* in heap struct
```

Provenance propagates through let bindings, if/match branches, blocks, option wrapping (`some`/unwrap), pointer arithmetic, pointer casts, subslices, and `.ptr` on slices. If any branch of an if/match is stack-derived, the result is treated as stack-derived (conservative).

The analysis is **intraprocedural** — function parameters and call return values have unknown provenance. A function that receives a pointer parameter is allowed to return it; the caller is responsible for ensuring the pointer is valid. `alloc(stack_data)` produces heap provenance — the deep-copy promotes stack data to the heap, which is the intended escape hatch:

```fc
let make_slice = () ->
    let arr = int32[3] { 10, 20, 30 }
    alloc(arr)!                     // OK — deep copy to heap, safe to return
```

---

## Heap Allocation

```fc
let n = alloc(node)              // returns node*? — may fail
let n = alloc(node)!             // unwrap — crash on failure
let buf = alloc(node[128] { })   // heap-allocated slice of 128 nodes, returns node[]?
let raw = alloc(uint8, 256)      // raw buffer of 256 bytes, returns uint8*?
free(ptr)                        // free a heap-allocated pointer
free(buf)                        // free a heap-allocated slice — compiler emits free(buf.ptr)
```

`alloc(T)` transpiles to `calloc(1, sizeof(T))`. `alloc(T[N] { })` transpiles to `calloc(N, sizeof(T))` and wraps the result in a slice with `len = N`. `alloc(T, N)` transpiles to `calloc(N, sizeof(T))` and returns the raw pointer without wrapping it in a slice — the caller is responsible for tracking the buffer size. Memory is always zero-initialized. `free` on a slice transpiles to `free(slice.ptr)`.

### alloc forms summary

| Form | Returns | Behavior |
|------|---------|----------|
| `alloc(T)` | `T*?` | Zero-initialized single value |
| `alloc(T[N] { })` | `T[]?` | Zero-initialized array of `N` elements; `N` may be runtime |
| `alloc(T[N] { elems })` | `T[]?` | Heap array initialized with provided elements; `N` must be literal |
| `alloc(T, N)` | `T*?` | Raw buffer of `N` elements, zero-initialized (no length tracking) |
| `alloc("literal")` | `str?` | Heap copy of string literal |
| `alloc(c"literal")` | `cstr?` | Heap copy of cstr literal |
| `alloc("...%d{x}...")` | `str?` | Interpolated string written directly to heap |
| `alloc(c"...%d{x}...")` | `cstr?` | Interpolated cstr written directly to heap |
| `alloc(struct { fields })` | `T*?` | Heap struct initialized from literal |
| `alloc(union.variant(val))` | `T*?` | Heap union initialized from variant |
| `alloc(slice_expr)` | `T[]?` | **Deep-copy** — allocates `len * sizeof(elem)` and copies data |

`alloc(expr)` accepts: string/cstr literals, interpolated strings (str and cstr), array literals (`T[N] { ... }`), struct literals, union variant constructors, and slice expressions. The bare form `alloc(T[N])` is not valid — the `{ }` initializer is always required, even when empty. This keeps `T[N]` unambiguously a type and `T[N] { }` unambiguously a value expression. For runtime-sized allocation, `N` may be any integer expression but explicit element values are not allowed (the array is zero-initialized). Other expressions — scalars, bare pointer variables, and other non-literal forms — are a compile error. The error message directs users to `alloc(T)` for uninitialized heap allocation. This restriction prevents accidental pointer-to-pointer semantics and makes alloc intent explicit.

The slice deep-copy form is the idiomatic way to promote a stack slice or string to heap-owned memory:

```fc
let s = "hello %d{n}"       // stack-allocated (alloca) — unsafe to return
let owned = alloc(s)!        // heap copy — safe to return, caller must free

let mut buf = int32[3] { }
buf.ptr[0] = 10
let heap_buf = alloc(buf)!   // deep-copies the 3 int32s to heap
```

#### alloc with string and cstr literals

`alloc("hello")` creates a heap copy of the string literal, returning `str?`. `alloc(c"hello")` creates a heap copy of the cstr literal including the null terminator, returning `cstr?` (= `uint8*?`). The caller must free the result.

```fc
let s = alloc("hello")!         // str? — heap copy of literal
let c = alloc(c"hello")!        // cstr? — heap copy with null terminator
```

#### Direct-to-heap optimization

When `alloc` wraps a literal expression — string literals, cstr literals, interpolated strings, struct literals, union variants, or array literals — the compiler writes directly to heap memory. No intermediate stack allocation occurs. For interpolated strings, this means `snprintf` writes directly into the `calloc`'d buffer. This is an implementation optimization; the semantics are identical to allocating on the stack and then copying.

#### Raw buffer allocation

`alloc(T, N)` allocates a raw buffer of `N` elements of type `T`, returning `T*?`. Unlike `alloc(T[N] { })`, it does not wrap the result in a slice — the caller must track the buffer size manually. This is useful for manual buffer construction (cstr buffers, C interop) and cases where slice overhead is unwanted.

```fc
let buf = alloc(uint8, 256)!    // uint8*? — raw buffer, no length tracking
```

`alloc(T, N)` transpiles to `calloc(N, sizeof(T))`. Like all alloc forms, the memory is zero-initialized.

`alloc` and `free` require a hosted C environment with heap allocation (FC's platform contract — see §Platform contract).

### Initialized alloc

`alloc` also accepts a value expression instead of a bare type name. The type is inferred from the expression, memory is allocated and zero-initialized, then the value is written in. This combines allocation and initialization into a single expression.

**Struct literal** — partial construction allowed, unspecified fields remain zero:

```fc
let p = alloc(point3d { x = 2, y = 3, z = 4 })!
let p = alloc(point3d { x = 2, z = 4 })!        // y defaults to 0
```

**Union variant:**

```fc
let s = alloc(shape.circle(3.14))!
let r = alloc(parse_outcome.success(42))!
```

**Slice literal** — same rules as stack slice initialization. Length is always required and the element count must match exactly:

```fc
let buf = alloc(int32[4] { 1, 2, 3, 4 })!   // heap slice, length 4
let buf = alloc(int32[4] { })!               // heap slice, all zeros — same as alloc(int32[4])
```

In all cases the return type follows from the value's type — `T*?` for structs and unions; `T[]?` for slices (deep-copied).

> **Transpilation**
> `alloc(point3d { x = 2, z = 4 })` transpiles to `calloc(1, sizeof(point3d))` followed by a compound literal assignment `*_p = (point3d){ .x = 2, .z = 4 }`. `alloc(int32[4] { 1, 2, 3, 4 })` transpiles to `calloc(4, sizeof(int32_t))` followed by element assignments. Both are conditional on the allocation succeeding.

### Initialization after alloc

When using the zero-init form, there are two idiomatic ways to initialize fields afterward.

**Field-by-field** — useful when only some fields differ from their defaults:

```fc
let p = alloc(point3d)!
p->x = 2
p->z = 4
// y remains 0 — already zero-initialized by alloc
```

**Whole-struct assignment** — write a struct literal through the pointer with `*p = ...`:

```fc
let p = alloc(point3d)!
*p = point3d { x = 2, y = 3, z = 4 }

// partial construction also works — unspecified fields default to 0
*p = point3d { x = 2, z = 4 }
```

> **Transpilation**
> `*p = point3d { x = 2, z = 4 }` transpiles to `*p = (point3d){ .x = 2, .z = 4 }` — a C99 compound literal assigned through a pointer dereference.

# PART 8 — C Interop

## C Interop

C library bindings are declared using `extern` inside a module with a `from` clause that names the C header file. The compiler emits a corresponding `#include` directive in the generated C output. The programmer is responsible for correct type mapping.

> **Note on `from` in module declarations**
> The `from "..."` in `module libc from "stdio.h"` is distinct from the `from` used in import statements. Here `from` names the C header that provides the declared symbols. The compiler emits `#include <header>` for each unique `from` string. It has nothing to do with namespace-qualified imports.

> **Module and extern constraints**
> A module with a `from` clause may **only** contain `extern` declarations — it is a pure C binding wrapper. Conversely, `extern` declarations may **only** appear inside a module with a `from` clause. Regular FC code (let bindings, structs, unions) belongs in modules without `from`. To mix FC wrappers with C bindings, use a nested submodule:
> ```fc
> module io =
>     private module c from "stdio.h" =
>         extern fwrite: (any*, uint64, uint64, any*) -> uint64
>     let write = (s: const str, f: any*) ->
>         (int64) c.fwrite((any*)s.ptr, 1u64, (uint64)s.len, f)
> ```

```fc
module c_stdlib from "stdlib.h" =
    extern free as c_free: (any*) -> void
    extern malloc:  (usize) -> any*?

module c_stdio from "stdio.h" =
    extern fopen:   (cstr, cstr) -> any*?

module c_string from "string.h" =
    extern memcpy:  (any*, any*, usize) -> any*
    extern strlen:  (cstr) -> usize
```

> **Note on the examples above**
> Each `from` module corresponds to one C header — the compiler emits `#include <header>` for each. `free` is declared as `c_free` because `free` is a reserved identifier in FC — see §Reserved identifiers and `extern as`. `any*` is used where C uses `void*` — see §any* — opaque pointers. The `usize` parameters for `malloc`, `memcpy`, and `strlen` map directly to C's `size_t` — the generated C uses `size_t` at the call boundary, matching the real C prototypes exactly on every target. Using `int64` here also works (the C compiler narrows it via the real header prototypes) but `usize` is more precise and avoids unnecessary 64-bit arithmetic on smaller targets.

### Feature-test macro defines

Some C headers require feature-test macros (e.g., `_POSIX_C_SOURCE`, `_GNU_SOURCE`) to be `#define`d before the header is included. The `define` clause on a `from` module declaration places this requirement alongside the extern declarations that need it:

```fc
module t from "time.h" define "_POSIX_C_SOURCE" "200809L" =
    extern clock_gettime: (int32, any*) -> int32
    extern nanosleep:     (any*, any*?) -> int32
```

The compiler emits `#define _POSIX_C_SOURCE 200809L` before all `#include` lines in the generated C output. This follows the POSIX requirement that feature-test macros must precede any header inclusion.

**Rules:**
- If multiple modules define the same macro with the same value, the define is emitted once (silent deduplication).
- If multiple modules define the same macro with **different** values, the compiler reports an error.
- The `define` clause is only valid on modules with a `from` clause.
- The macro name and value are both string literals.

This keeps the header's requirements co-located with the declaration that needs them — passing a file that uses POSIX time functions to the compiler brings everything it needs, with no extra build flags required.

### Extern constants

C constants defined as `#define` macros can be imported using the same `extern` syntax as functions, but with a non-function type:

```fc
module c from "fcntl.h" =
    extern O_RDONLY: int64
    extern O_WRONLY: int64
    extern O_CREAT: int64
```

The compiler emits the C macro name directly into the generated code. Since the `#include` for the header is emitted in the preamble, the C preprocessor expands the macro at C compilation time. No intermediate variable or declaration is needed — the macro name appears inline wherever the constant is used.

**With alias** — when the C name doesn't follow FC naming conventions:

```fc
module sdl from "SDL2/SDL.h" =
    extern SDL_INIT_VIDEO as sdl_init_video: int64
    extern SDL_INIT_AUDIO as sdl_init_audio: int64
```

The `as` clause follows the same convention as `extern ... as` for functions: `SDL_INIT_VIDEO` is the C name (emitted in generated code), `sdl_init_video` is the FC name (used in FC source). Without `as`, the C name and FC name are the same.

**Usage:**

```fc
import sdl_init_video, sdl_init_audio from sdl

let flags = sdl_init_video | sdl_init_audio    // bitwise OR of C constants
```

**Valid types** — extern constants may have:
- Integer types: `int8` through `uint64`, `isize`, `usize`
- Float types: `float32`, `float64`
- `bool`
- Pointer types: `any*`, `T*`
- String type: `cstr` (with `const` qualifier for string literal defines)

**Rejected types** — the compiler rejects extern constants with types that have no C `#define` equivalent:
- Slice types (`T[]`) — FC slices are fat pointers with length; a C macro cannot produce one.
- Option types (`T?`) — FC-internal tagged/sentinel types with no C equivalent.
- Struct and union types — C `#define` values are scalar or pointer, not aggregate.
- `void` — meaningless for a constant.

**Programmer responsibility** — the programmer must declare the correct FC type. The compiler does not verify the declared type against the actual C macro value — that responsibility falls to the C compiler at the next stage. As a guideline, choose the widest FC type that is safely convertible from the C value. For example, declare a POSIX `int` constant as `int64` rather than `int32`, since C `int` width varies but `int64_t` always holds it.

**Boundary casts** — for `cstr`-typed constants, the compiler emits a cast from `char*` (C's string literal type) to `uint8_t*` (FC's `cstr` representation). For other types, C's implicit conversions handle the boundary.

> **Note on function-like macros**
> Only value-producing macros can be imported. Function-like macros (`#define MAX(a,b) ...`) are code transformations, not constant values, and cannot be imported as extern constants. To use a function-like macro from FC, wrap it in a C helper function or reimplement the logic in FC.

### Extern structs

C struct types can be imported using `extern struct` inside a `from` module. This tells the compiler that the struct is defined in the C header — the compiler uses the C struct directly instead of generating its own typedef.

```fc
module t from "time.h" define "_POSIX_C_SOURCE" "200809L" =
    extern struct timespec =
        tv_sec: int64
        tv_nsec: int64
```

The generated C uses `struct timespec` (the real C type) wherever the FC type is referenced. No `typedef` or `struct` definition is emitted — the header's definition is used directly. The C compiler validates field names at C compilation time.

**With alias** — when the C name doesn't match FC naming conventions:

```fc
module sdl from "SDL2/SDL.h" =
    extern struct SDL_Rect as sdl_rect =
        x: int32
        y: int32
        w: int32
        h: int32
```

The `as` clause follows the same convention as `extern ... as` for functions: `SDL_Rect` is the C name (emitted in generated code as `struct SDL_Rect`), `sdl_rect` is the FC name (used in FC source code). Without `as`, the C name and FC name are the same.

**Usage** — extern structs support all FC struct features:

```fc
import timespec from t

let ts = timespec { tv_sec = 42, tv_nsec = 0 }     // struct literal
let s = ts.tv_sec                                    // field access
let mut ts2 = default(timespec)                      // zero initialization
let size = sizeof(timespec)                          // size query
let eq = ts == ts2                                   // structural equality
match ts with                                        // pattern matching
| { tv_sec = s } -> use(s)
```

**Rules:**
- Extern structs can only appear inside a `module ... from "header"` block.
- Extern structs cannot be generic (no type parameters).
- All fields must be declared with FC types that are assignment-compatible with the actual C field types.
- The compiler always emits `struct C_name` in the generated C. This works for both `struct timespec` (no typedef) and `typedef struct SDL_Rect { ... } SDL_Rect;` (where the struct tag matches the typedef name).
- Fields may reference other extern struct or extern union types declared in the same `from` module.
- Bitfields and anonymous inner structs are not supported — use `any*` for those types.

### Extern unions

C union types (untagged, overlapping memory) can be imported using `extern union` inside a `from` module. This is analogous to `extern struct` — the compiler uses the C union directly instead of generating its own definition. Extern unions are distinct from FC's tagged `union` type: they have no discriminant tag and their fields overlap in memory.

```fc
module u from "test_union.h" =
    extern union int_or_float =
        i: int32
        f: float32
```

The generated C uses `union int_or_float` wherever the FC type is referenced.

**With alias:**

```fc
module sdl from "SDL2/SDL.h" =
    extern union SDL_Event as sdl_event =
        type: uint32
        key: sdl_keyboard_event
        motion: sdl_mouse_motion_event
```

**Usage** — extern unions support field access, literals, default, sizeof, address-of, and equality:

```fc
import sdl_event from sdl

let mut event = default(sdl_event)
event.type = 42u32                             // field mutation
let v = int_or_float { i = 99 }               // literal
let size = sizeof(sdl_event)                   // size query
let eq = v == default(int_or_float)            // byte-level equality (memcmp)
```

**Equality** — extern union equality uses byte-level comparison (`memcmp` over `sizeof`), not field-by-field comparison. This is the only sound option since fields overlap in memory and there is no tag to determine the active member.

**Rules:**
- Extern unions can only appear inside a `module ... from "header"` block.
- Extern unions cannot be generic (no type parameters).
- All fields must be declared with FC types that are assignment-compatible with the actual C field types.
- Fields may reference other extern struct or extern union types declared in the same `from` module. This enables mapping complex C unions like `SDL_Event` where each variant is itself a C struct.
- Partial field declarations are supported — you only need to declare the fields you intend to access in FC. The compiler uses the C header's definition for layout and sizing, so undeclared fields still occupy their correct memory positions.
- The compiler always emits `union C_name` in the generated C.
- Pattern matching is not supported on extern unions — there is no tag to dispatch on, and reading all overlapping fields simultaneously is semantically wrong.

### Reserved identifiers and `extern as`

FC reserves `alloc`, `free`, `sizeof`, `alignof`, `default`, and `assert` as built-in operator names — they cannot be used as user-defined binding names anywhere in FC code. This creates a conflict when importing C functions that share these names. `free` is the most common case.

The `extern as` form resolves this by binding the C function under a different name in the FC module:

```fc
module libc from "stdlib.h" =
    extern free as c_free: (any*) -> void   // C's free, available as libc.c_free
```

The string after `as` becomes the FC-visible name. The original C symbol name is used in the generated C output. This follows the same `as` aliasing convention already used in import statements.

In practice, `extern free as c_free` is essentially never needed. FC's built-in `free` operator emits C's `free()` in the generated output and works on any heap pointer regardless of whether it was allocated via FC's `alloc` or `libc.malloc` — at the C level it is the same allocator. If a C API requires `free` as a function pointer value, a wrapper lambda suffices:

```fc
let mut free_fn = (ptr: any*) -> free(ptr)   // (any*) -> void — addressable, passable
```

The `extern as` form is shown here for completeness and is more relevant when a C library has a function named `alloc`, `sizeof`, or `default`.

### Null return values from C

C functions that can return null must be declared with a `?` return type. This keeps null out of FC's type system — the programmer is forced to handle the absent case explicitly before using the value:

```fc
let buf = libc.malloc(1024u)   // type is any*? — usize argument matches C's size_t
let ptr = buf!                 // unwrap — crash on null
// or
match buf with
| none     -> handle_failure()
| some(p)  -> use(p)
```

The programmer is responsible for correctly declaring which C functions can return null. A bare `T*` return type is treated as non-nullable — the compiler assumes the function always returns a valid pointer. Getting this wrong (declaring a nullable return as non-nullable) is the same class of bug as in C itself.

For C functions that signal failure via a sentinel integer value (such as `-1`), declare the return type as a plain integer and check the sentinel directly — do not use `?`:

```fc
module posix from "fcntl.h" =
    extern open: (cstr, int32) -> int32    // returns -1 on failure, not null

let fd = posix.open(c"file.txt", 0)
if fd == -1 then handle_error()
```

### Null arguments to C

If a C function accepts null for a pointer parameter, declare it as `T*?` and pass `default(T*?)` or `some(ptr)` at the call site:

```fc
module pthreads from "pthread.h" =
    extern pthread_create: (any*?, any*?, (any*) -> any*?, any*?) -> int32
    // thread function: (any*) -> any*? — receives and returns the user-data pointer
```

### Passing FC values to C

Higher-level FC types must be explicitly lowered at C call sites:

- `str` — use `(cstr)s` to create a null-terminated stack copy, or `c"..."` for constant strings. The `cstr` is always non-const (fresh stack copy). If the extern expects `const char*`, declare the parameter as `const cstr`.
- `const cstr` / `cstr` — pass directly. `const cstr` maps to `const char*` (read-only), `cstr` maps to `char*` (mutable). Use `c"..."` literals for constant strings (type is `const cstr`).
- `T?` — unwrap with `x!` or `match` before passing
- Structs — memory-compatible with C structs if declared in the same field order

### Automatic boundary casts

The compiler automatically inserts C-level casts at extern call boundaries to bridge FC's type representations with C's conventions. These casts are invisible to the FC programmer — they only appear in the generated C:

| FC parameter type | C cast inserted | Reason |
|---|---|---|
| `const cstr` (`const uint8*`) | `(const char*)` | C read-only string functions expect `const char*` |
| `cstr` (`uint8*`) | `(char*)` | C mutable string functions expect `char*` |
| `cstr*` (`uint8**`) | `(char**)` | Out-parameter variant (e.g. `strtol`'s `endptr`) |
| `any**` (`void**`) | `(void*)` | `void**` doesn't implicitly convert to `T**` in C; `void*` does |

The `const cstr` / `cstr` distinction maps directly to C's `const char*` / `char*`. Use `const cstr` for C functions that read a string (most of them), and `cstr` for C functions that write into a char buffer. Typed pointers (`T*`, `const T*`) implicitly widen to `any*` / `const any*` at extern boundaries, matching C's implicit `T*` → `void*` conversion.

```fc
module c from "stdlib.h" =
    extern strtol: (const cstr, cstr*, int32) -> int64

let mut end = default(uint8*)
let val = c.strtol((cstr)s, &end, 10)   // const cstr → (const char*), &end → (char**)
```

The `any**` cast covers opaque handle APIs where a C function writes a handle through a `T**` out-parameter:

```fc
module sqlite from "sqlite3.h" =
    extern sqlite3_open: (const cstr, any**) -> int32

let mut db = default(any*)
let rc = sqlite.sqlite3_open(c"test.db", &db)   // const cstr → (const char*), &db → (void*)
```

### Variadic extern functions

C functions that accept a variable number of arguments (`printf`, `snprintf`, `open`, etc.) are declared with `...` after the fixed parameters:

```fc
module c from "stdio.h" =
    extern printf: (const cstr, ...) -> int32
    extern fprintf: (any*, const cstr, ...) -> int32
    extern snprintf: (cstr, usize, const cstr, ...) -> int32
```

Note: `snprintf`'s first param is `cstr` (mutable output buffer), format string is `const cstr` (read-only).

The compiler type-checks the fixed parameters normally — the `const cstr` format string, the `any*` file handle, the `usize` buffer size — but variadic arguments beyond the fixed parameters are not type-checked. The programmer is responsible for matching format specifiers to argument types, the same as in C.

**Argument promotion.** C's default argument promotions apply to variadic arguments: sub-`int` types (`int8`, `int16`, `uint8`, `uint16`) are promoted to `int`, and `float32` is promoted to `double`. The compiler inserts these casts automatically in the generated C. Boundary casts also apply — `cstr` variadic arguments are cast to `const char*` at the C boundary.

```fc
module c from "stdio.h" =
    extern fprintf: (any*, const cstr, ...) -> int32

let val = 42i8
c.fprintf(stdout, c"value: %d name: %s\n", val, c"hello")
// generated C: fprintf(stdout, (const char*)"value: %d name: %s\n", (int)val, (const char*)"hello")
```

**Variadic declarations are extern-only** — FC functions cannot be variadic. The `...` syntax is only valid inside extern function type signatures. Attempting to use `...` in a regular function definition is a parse error.

**Argument count.** A variadic call must provide at least the fixed parameters. Passing fewer arguments than the fixed parameter count is a compile error.

### Mapping C enums

C enums are integer constants. In pure FC, use union types for sum types. When interoperating with a C API that uses an enum, model it as a module of `int32` constants and declare the extern function with an `int32` parameter:

```fc
module af =                    // address family constants (from sys/socket.h)
    let inet  = 2
    let inet6 = 10

module sock =                  // socket type constants
    let stream = 1
    let dgram  = 2
    let raw    = 3

module c_socket from "sys/socket.h" =
    extern socket: (int32, int32, int32) -> int32    // returns fd or -1

let fd = c_socket.socket(af.inet, sock.stream, 0)
if fd == -1 then handle_error()
```

For bit flag enums, the same pattern applies and values combine naturally with bitwise operators:

```fc
module file_mode =
    let read  = 1
    let write = 2
    let exec  = 4

let mode = file_mode.read | file_mode.write
```

### `any*` — opaque pointers

`any*` is FC's opaque pointer type — a raw address with no associated element type. It maps directly to C's `void*` in generated code. Unlike C's `void*`, the name is unambiguous: `void` already has a specific meaning in FC (the non-instantiable return type), so reusing it for an unrelated pointer concept would be confusing. `any*` says what it means.

`any*` cannot be dereferenced — the compiler has no type information to read through it. It can only be stored, passed, returned, and cast to a typed pointer when the programmer knows the concrete type.

**C interop — opaque handles**

`any*` exists because C libraries expose opaque pointer types — `FILE*`, `sqlite3*`, `pthread_t*` — where the struct definition is hidden. FC has no struct definition to attach to these pointers, so they are represented as `any*`. Standard library modules like `std::io` wrap C's stdio and therefore return `any*` handles — the type propagates from the C boundary through the wrapper.

FC code that receives `any*` handles never constructs or inspects them; it passes them to functions that know how to operate on them:

```fc
module sqlite from "sqlite3.h" =
    extern sqlite3_open:  (cstr, any*?) -> int32
    extern sqlite3_exec:  (any*, cstr, (any*, int32, any*, any*) -> int32, any*?, any*?) -> int32
    extern sqlite3_close: (any*) -> int32

module c_stdio from "stdio.h" =
    extern fopen:  (cstr, cstr) -> any*?
    extern fclose: (any*) -> int32
    extern fread:  (any*, int64, int64, any*) -> int64
    extern fwrite: (any*, int64, int64, any*) -> int64

module c_stdlib from "stdlib.h" =
    extern malloc: (usize) -> any*?
    extern free:   (any*) -> void
```

Note that `fread` and `fwrite` take `any*` for both the data buffer and the `FILE*` handle — both are `void*` in C. `int64` maps C's `size_t` parameters — a reasonable signed upper bound. For exact platform matching, use `usize` instead (see §Embedded targets and raw pointer arrays).

The programmer is responsible for passing handles to the correct functions — FC's type system does not distinguish a `sqlite3*` from a `FILE*` at the `any*` level. This is an acceptable tradeoff: opaque handles are passed to a small number of known functions, and mixing them up is no more likely than passing the wrong integer argument.

**Function pointer parameters in C interop**

FC functions internally carry an extra `void* _ctx` parameter for closure support. When a non-capturing function or lambda is passed to a C extern, the compiler generates a **trampoline** — a thin static wrapper that drops the `_ctx` and matches the C calling convention. This happens automatically; the programmer just passes the function:

```fc
module libc from "stdlib.h" =
    extern qsort: (any*, usize, usize, (const any*, const any*) -> int32) -> void

// Named top-level comparator — non-capturing, so the compiler generates a trampoline
let int_compare = (a: const any*, b: const any*) ->
    let ia = *((const int32*) a)
    let ib = *((const int32*) b)
    ia - ib

let main = (args: str[]) ->
    let mut nums = int32[5] { 5, 2, 8, 1, 9 }

    // Pass a named function — trampoline bridges FC's (a, b, _ctx) to C's (a, b)
    libc.qsort(nums.ptr, 5u, (usize)sizeof(int32), int_compare)

    // Pass a non-capturing lambda directly — same trampoline mechanism
    libc.qsort(nums.ptr, 5u, (usize)sizeof(int32),
        (a: const any*, b: const any*) ->
            *((const int32*) b) - *((const int32*) a))
```

**What can be passed to extern function parameters:**

The compiler accepts only two forms at an extern call boundary:

1. **A top-level function name** — `int_compare` in the example above.
2. **A non-capturing lambda literal** — written directly at the call site.

Anything else is a compile error. In particular:

- **Capturing lambdas** are rejected — a C function pointer has no way to carry the closure's captured environment.
- **Local variables of function type** are rejected, even if the value they hold is non-capturing. Once a lambda is assigned to a binding, the compiler only sees the type `(A, B) -> C`, which does not encode whether the value captures. Since the variable could hold either a capturing or non-capturing function at runtime (e.g. from different branches of an `if`), the compiler conservatively rejects it.

The workaround is straightforward: inline the lambda at the call site, or hoist it to a top-level `let`.

C APIs that need stateful callbacks typically provide a `void*` context parameter for this purpose — define a context struct, pass it as `any*`, and cast back inside a non-capturing callback.

**`any*` vs `void*` in C — a note on naming**

C uses `void` to mean two unrelated things: the absence of a return value (`void` as a return type) and the absence of a pointer's element type (`void*`). The only unifying thread is "absence of type information" — a stretch that has confused C programmers for decades. Rust faced the same problem and solved it by introducing `c_void` as a separate FFI-specific type, explicitly noting in its documentation that `c_void` is unrelated to Rust's unit type `()`.

FC avoids the problem entirely: `void` means what it always means, and `any*` is its own named concept.

**Where `any*` is not needed in FC**

In C, `void*` is frequently used for patterns that FC handles at the language level. FC programmers should reach for these before `any*`:

- **Heterogeneous collections** — in C, a `void*[]` holds mixed types. In FC, use a tagged union: `union shape = | circle(circle) | rect(rect)`. The type system tracks what's in each slot; no unsafe cast required.
- **Generic algorithms** — in C, `qsort` takes `void*` because it cannot be parameterized by element type. In FC, generic functions handle this directly: `let sort = (arr: 'a[], cmp: ('a, 'a) -> int32) -> ...`.
- **Stateful callbacks** — in C, a `void*` user_data accompanies every callback to carry context. In FC, closures capture their environment as a fat pointer internally — no manual user_data threading needed.
- **Opaque types within FC** — in C, hiding a struct's internals requires forward-declaring it in a header and exposing only `void*`. In FC, module-level `private` fields achieve the same thing with a typed pointer — the caller holds a `connection*` but cannot access its fields. No type erasure needed.

`any*` appears in everyday FC code — file handles from `std::io`, database handles from C wrapper libraries — but it always originates from a C boundary. Pure FC modules that want to hide their internals should use private struct fields and typed pointers, not `any*`.

### Converting between str and cstr

`str` to `cstr` — use `(cstr)` cast to create a null-terminated stack copy:

```fc
let cs = (cstr) s    // stack copy with null terminator — safe for passing to C
```

The cast emits an `alloca`+`memcpy` to create a null-terminated copy on the stack. The copy is valid until the enclosing function returns.

`cstr` to `str` — construct a slice from the raw pointer and length:

```fc
let s = str { ptr = cs, len = libc.strlen(cs) }
```

The resulting `str` shares memory with the original C string — no allocation occurs. The programmer is responsible for ensuring the C string remains live for the lifetime of the FC slice.

# PART 9 — Standard Library

All standard library modules live in the `std::` namespace and are written in regular FC wrapping C standard library functions. Import with `import <module> from std::`. Source files are in `stdlib/`.

## std::io

File I/O using opaque `any*` handles (C `FILE*`). Reading, writing, opening, closing, seeking, and filesystem operations. The built-in globals `stdin`, `stdout`, `stderr` are typed `any*` and always available without import.

## std::sys

Environment variables, process control, wall-clock time, and sleep. Mostly pure C11; `sleep` uses POSIX `nanosleep` (works on Linux, macOS, and Windows via MinGW).

## std::math

Common mathematical functions wrapping C11 `math.h`, all operating on `float64` (on Linux, link with `-lm`). Includes constants, arithmetic, rounding, trigonometry, exponential/logarithmic, and floating-point classification.

## std::text

String parsing and manipulation. Numeric parsing (`parse_int32`, etc.), searching, trimming, case conversion, split/join. See `stdlib/text.fc` for the full API.

## std::net

POSIX networking wrapping `sys/socket.h`, `netinet/in.h`, `arpa/inet.h`, and `netdb.h`. IPv4 only. Provides socket lifecycle (`open_tcp`, `open_udp`, `open_icmp`, `close`, `shutdown`), address construction (`make_addr`, `make_addr_str`), TCP operations (`bind_addr`, `listen`, `accept`, `connect_addr`), data transfer (`send_bytes`, `recv_bytes`, `send_to`, `recv_from`), byte order conversion (`host_to_net16`, `host_to_net32`, `net_to_host16`, `net_to_host32`), DNS resolution (`resolve`), and socket options (`set_reuse_addr`). Socket creation functions return `int32?`; callers check for failure with option handling. Requires POSIX sockets (Linux, macOS, Windows via MinGW).

## std::data

Generic data structures and collection utilities. Lives in the `std::` namespace under `module data`; import individual modules with `import data from std::` then `import <module> from data` (or access directly as `std::data.array_list.make()`). Each data structure uses the companion pattern — the struct sits alongside its same-named module within `module data`. Contains:

- **`array_list`** — Dynamic array with amortized O(1) append. Backed by a growable heap-allocated slice. Supports indexed access, insert, remove, sort, and functional operations (map, filter, fold, scan, reduce, etc.).
- **`linked_list`** — Doubly-linked list with O(1) prepend/append. Pointer-based nodes, each separately heap-allocated. Supports pop from either end, insert at index, sort, and the same functional operations as array_list.
- **`hash_dict`** — Hash map with open addressing and linear probing. Stores user-provided hash and equality functions. Supports put, get, remove, and iteration over key-value pairs.
- **`hash_set`** — Hash set using the same probing strategy as hash_dict. Supports add, has, remove, and filtered iteration.
- **`slice`** — Functional operations on built-in `'a[]` slices: map, filter, fold, scan, reduce, find, sort, reverse, copy, and more. Read-only functions take `const 'a[]`; mutating functions (sort, reverse, retain, apply) take `'a[]`.

All sequential collections (array_list, linked_list, slice) share a consistent functional API: `fold_left`, `fold_right`, `reduce`, `scan`, `map`, `mapi`, `filter`, `iter`, `iteri`, `any`, `all`, `find`, `count`. In-place mutating variants: `sort`, `reverse`, `retain`, `apply`, `applyi`. The `try_` prefix convention returns an option; the bare name force-unwraps (e.g., `try_find` vs `find`).

# PART 10 — Style Guidelines

## Formatting

### Indentation Width

Use **4 spaces** per indentation level. The language requires spaces only (tabs are a compile error), and while the offside rule technically permits any consistent width, 4 spaces is the standard. This follows the conventions established by F# and Python, both of which use the same indentation-based layout model.

```fc
let main = (args: str[]) ->
    let x = 42
    let y = x + 1
    y
```

### Match Arm Alignment

Match arms should be aligned at the **same column** as the `match` keyword. The language permits deeper indentation, but same-level alignment is the standard style:

```fc
// preferred
match s with
| circle(r) -> r * r
| square(w) -> w * w

// allowed but not preferred
match s with
    | circle(r) -> r * r
    | square(w) -> w * w
```

When a match arm body spans multiple lines, the body is indented one level from the `|`:

```fc
match opt with
| some(x) ->
    let y = x + 1
    y * 2
| none -> 0
```

### Operator Spacing

Use spaces around binary operators. No space between unary operators and their operands:

```fc
let x = a + b * c          // spaces around binary operators
let y = -x                  // no space after unary -
let z = !flag               // no space after unary !
let p = *ptr                // no space after unary *
```

No spaces in field access, pointer access, or indexing:

```fc
p.x
node->next
data[i]
s[1..10]
```

### Declarations

Struct and union declarations place the body on the next line, indented one level. Each field or variant is on its own line:

```fc
struct point =
    x: float64
    y: float64

union shape =
    | circle(float64)
    | rectangle(dims)
    | point
```

No space between field name and colon in struct fields and function parameters:

```fc
struct rect =
    w: int32
    h: int32

let area = (r: rect) -> r.w * r.h
```

### Function Definitions

Short functions may be written on a single line. Longer functions place the body on the next line:

```fc
let double = (x: int32) -> x * 2

let abs = (x: int32) ->
    if x < 0 then -x else x
```

## Naming Conventions

FC uses **snake_case** for all identifiers — variables, functions, types, fields, variants, modules, and namespaces. Type variables use an apostrophe prefix (`'a`, `'elem`). There is no PascalCase, camelCase, or UPPER_CASE convention in the language.

| Element | Examples |
|---------|----------|
| Variables | `x`, `sum`, `cur_node` |
| Functions | `area`, `sum_list`, `find_substring` |
| Types (struct/union) | `point`, `shape`, `node` |
| Fields and variants | `width`, `next`, `circle`, `ok` |
| Modules and namespaces | `math`, `io`, `geom::` |
| Type variables | `'a`, `'b`, `'elem` |

## Comments

Use `//` line comments for brief annotations. Use `/* */` block comments for larger sections. Block comments may be nested:

```fc
// single-line comment

/* block comment */

/* outer /* nested */ still in outer */
```

---

# Appendix

The FC compiler and all supporting materials are developed in a single repository: [github.com/stephen-swensen/fc-lang](https://github.com/stephen-swensen/fc-lang).

## Repository Guide

**`spec/`** — This specification (`fc-spec.html`), a BNF grammar (`grammar.bnf`), and a runnable quick-reference program (`examples.fc`) that demonstrates all core language features in commented, compilable FC code. Read `examples.fc` first for a fast overview of the language.

**`src/`** — The compiler implementation. A single-pass C11 program that reads `.fc` source files and emits a self-contained `.c` file. The pipeline is: lexer → parser → pass 1 (declaration collection) → pass 2 (type checking) → monomorphization → C code emission.

**`stdlib/`** — The standard library, written in FC. Modules for I/O (`io.fc`), system operations (`sys.fc`), math (`math.fc`), text processing (`text.fc`), and generic data structures (`data.fc`). These are regular FC source files that wrap C standard library functions via `extern`.

**`tests/`** — Comprehensive test suite organized by feature category. Each test is a `.fc` file (or multi-file subdirectory) with expected exit codes or expected compiler error messages. Tests are compiled and run with both GCC and Clang.

**`demos/`** — Standalone demo applications that exercise the language and standard library in realistic scenarios: `fibbles` is a Snake/Nibbles clone using SDL2, `fing` is a ping clone using raw ICMP sockets, and `furl` is an HTTP client (curl clone) using TCP sockets. Each demo has its own `run.sh` and README.

<script>
  marked.setOptions({ breaks: false, gfm: true, smartypants: false, mangle: false, headerIds: false });

  const md = document.getElementById('spec-markdown').textContent;
  document.getElementById('content').innerHTML = marked.parse(md);

  document.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });

  function slugify(text) {
    return text
      .toLowerCase()
      .replace(/[—–]/g, '-')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
  }

  const navContainer = document.getElementById('nav-links');
  let h1c = 0, h2c = 0, h3c = 0, h4c = 0;

  document.querySelectorAll('#content h1, #content h2, #content h3, #content h4').forEach(h => {
    let numText;

    if (h.tagName === 'H1') {
      h1c++; h2c = 0; h3c = 0; h4c = 0;
      numText = h1c + '.';
    } else if (h.tagName === 'H2') {
      h2c++; h3c = 0; h4c = 0;
      numText = h1c + '.' + h2c;
    } else if (h.tagName === 'H3') {
      h3c++; h4c = 0;
      numText = h1c + '.' + h2c + '.' + h3c;
    } else if (h.tagName === 'H4') {
      h4c++;
      numText = h1c + '.' + h2c + '.' + h3c + '.' + h4c;
    }

    const numSlug = numText.replace(/\./g, '-').replace(/-$/, '');
    const titleSlug = slugify(h.textContent);
    const id = numSlug + '-' + titleSlug;
    h.id = id;

    const numSpan = document.createElement('span');
    numSpan.className = 'sec-num';
    numSpan.textContent = numText + ' ';
    h.prepend(numSpan);

    const a = document.createElement('a');
    a.href = '#' + id;

    const navNum = document.createElement('span');
    navNum.className = 'nav-num';
    navNum.textContent = numText + ' ';
    a.appendChild(navNum);
    a.appendChild(document.createTextNode(h.textContent.replace(numText + ' ', '')));

    if (h.tagName === 'H1') a.classList.add('nav-part');
    else if (h.tagName === 'H2') a.classList.add('nav-h2');
    else if (h.tagName === 'H3') a.classList.add('nav-h3');
    else if (h.tagName === 'H4') a.classList.add('nav-h4');

    navContainer.appendChild(a);
  });
</script>

<script>
  const toggle = document.getElementById('nav-toggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('nav-overlay');

  function openNav() {
    sidebar.classList.add('open');
    overlay.classList.add('open');
  }
  function closeNav() {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  }

  toggle.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeNav() : openNav();
  });
  overlay.addEventListener('click', closeNav);

  // Close nav when a link is tapped on mobile
  document.querySelectorAll('#nav-links a').forEach(a => {
    a.addEventListener('click', () => {
      if (window.innerWidth <= 768) closeNav();
    });
  });
</script>
