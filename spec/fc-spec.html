# PART 3 — Functions

## Defining Functions

Functions are `let` statements (at the top level) or let binding expressions (when nested) whose value is a lambda. There is no separate `fn` or `def` keyword.

Function overloading — multiple functions sharing the same name with different parameter types — is not supported. Each name resolves to exactly one function. This is not an arbitrary restriction: FC's directional type inference depends on call sites being unambiguous. If multiple candidates existed for a name, the compiler would need to resolve the ambiguity by examining how the result is used or what the arguments are, introducing the kind of global constraint solving the inference model is designed to avoid. See §Type inference as a design theorem.

A lambda is written as `(params) ->` followed by a body expression. For multi-line bodies the body is the indented block on the following lines — the return type is always inferred from the body expression, never annotated.

```fc
// single line — body follows -> on same line
let double = (x: int32) -> x * 2

// multi-line — body is the indented block following ->
let abs = (x: int32) ->
    if x < 0 then -x else x

// match body
let describe = (s: shape) ->
    match s with
    | circle(r)    -> "circle"
    | rectangle(_) -> "rectangle"
    | point        -> "point"

// sequence of let bindings — final expression is the return value
let hypotenuse = (a: float64, b: float64) ->
    let a2 = a * a
    let b2 = b * b
    sqrt(a2 + b2)
```

### Parameters are let bindings

Function parameters are let bindings — immutable and non-addressable within the function body. If you need a mutable local copy of a parameter, shadow it with a mutable let binding:

```fc
let factorial = (n: int32) ->
    let mut n = n          // shadow parameter with mutable let binding
    let mut result = 1
    loop
        if n <= 1 then break result
        result = result * n
        n = n - 1
```

### Early return

`return` exits the function immediately. For value-returning functions, `return expr` supplies the return value. For void-returning functions, bare `return` exits without a value — this is the idiomatic way to write a no-op function body or to exit early from a void function:

```fc
let find = (haystack: str, needle: str) ->
    if needle.len > haystack.len then return default(str?)
    // ... rest of body
    default(str?)

let log_nop = (msg: str) -> return     // void — does nothing

let validate = (data: uint8[]) ->      // void — early exit on error
    if data.len == 0 then return
    process(data)
```

In all cases `return` is only needed for early exits — the normal return value of a value-returning function is the final expression of the body. A void function with no early exit needs no `return` at all; the body just ends.

### Entry point

```fc
import io from std::

let main = (args: str[]) ->
    io.write("program: %s{args[0]}\n", stdout)
    0
```

`main` at the top level is the program entry point, equivalent to C's `main`. It takes `args: str[]` — a slice of command-line arguments where `args[0]` is the program name (matching C's `argv[0]`). It must return `int32`. Every program must have exactly one `let main`. The file containing `let main` is the **entry-point file** — it is the only file that may have non-module top-level declarations (see §Module System & Visibility).

> **Transpilation**
> The compiler generates a C `main` wrapper that converts `argc`/`argv` into a `str[]` slice:
> ```c
> int main(int argc, char** argv) {
>     fc_slice_uint8* _args = (fc_slice_uint8*)alloca(argc * sizeof(fc_slice_uint8));
>     for (int i = 0; i < argc; i++) {
>         _args[i].ptr = (uint8_t*)argv[i];
>         _args[i].len = (int64_t)strlen(argv[i]);
>     }
>     fc_slice_slice_uint8 args = { .ptr = _args, .len = (int64_t)argc };
>     return fc_main(args);
> }
> ```
> Each `argv[i]` becomes a `str` (fat pointer) pointing directly at the existing `argv[i]` string — no string data is copied. The length is computed via `strlen`. The only allocation is the array of `fc_str` structs (`argc * 16 bytes` on 64-bit), stack-allocated via `alloca`. A pathologically large `argc` could overflow the stack, but this is outside the range of normal program invocation.

### Stack frames and lifetime

All local bindings in a function body — regardless of their lexical nesting depth — share a single stack frame that lives for the duration of the function call. Lexical scope controls name visibility, not memory lifetime.

```fc
let f = () ->
    let px =
        let mut x = 42
        &x          // &x is valid here — x lives in f's stack frame
    *px             // still valid — f has not returned yet
```

A pointer to a local binding is valid for the entire function call. It must not escape the function — storing it in a heap-allocated struct, returning it, or passing it to something that outlives the call will result in a dangling pointer. Use heap allocation for data that must outlive a function call.

The compiler performs **escape analysis** on pointer and slice expressions, tracking whether they refer to stack, heap, or static memory. Returning a stack-derived pointer from a function, freeing a stack pointer, and storing a stack pointer in a heap-allocated struct are all compile errors. See §Stack Allocation for details.

---

## Closures & Capture

Lambdas may capture immutable `let` bindings from the enclosing *local* scope by copy. `let mut` bindings cannot be captured.

**Top-level bindings are not captures.** When a lambda references a top-level `let` or `let mut` binding, it accesses the global directly — no copy is made and no capture occurs. This means the function sees mutations to the global, and the function is *not* a closure for C interop purposes (it can be passed to `extern` function pointer parameters). Only references that cross a local lambda boundary produce captures.

```fc
let threshold = 10
let above = (x: int32) -> x > threshold    // captures threshold by copy

let mut counter = 0
let f = () -> counter + 1                  // compile error — cannot capture mutable let binding
```

In contrast, a top-level mutable binding can be freely referenced:

```fc
let mut total = 0
let add = (n: int32) ->                    // not a closure — total is a global, not a capture
    total = total + n
    total
```

Capturing a pointer value (a `let` binding that holds a pointer) is allowed. The programmer is responsible for ensuring the pointed-to memory remains live for the lifetime of the closure.

If you want to mutate a mutable let binding from another function, there are two approaches. The first passes a pointer as an explicit parameter — this is a plain function, not a closure:

```fc
let mut x = 3
let modify = (px: int32*) ->
    *px = 4

modify(&x)
// x is now 4
```

The second captures a pointer to the mutable binding, producing a true closure:

```fc
let mut x = 3
let px = &x
let modify = () ->
    *px = 4

modify()
// x is now 4
```

Here `px` is a `let` binding holding an `int32*`, so it is capturable by copy. The copied pointer still points at `x`, and writing through it mutates `x`. The programmer is responsible for ensuring `x` remains live for the lifetime of the closure.

> **Transpilation**
> All function values in FC use a uniform **fat-pointer representation** — a two-word struct containing a C function pointer and a `void*` context pointer. The general form for a function type `(A) -> R` is:
> ```c
> typedef struct {
>     R (*fn_ptr)(A, void*);
>     void* ctx;
> } fc_fn_A_R;
> ```
> Every function value of a given function type has the same size and layout, regardless of what it captures. This uniformity is what makes function values composable — an `arraylist<() -> int32>` works correctly because every element is the same two-word struct.
>
> **Capturing lambdas** — the compiler generates a context struct containing copies of the captured values and allocates it on the **stack frame of the function that creates the lambda**. For example, given this FC code:
> ```fc
> let threshold = 10
> let above = (x: int32) -> x > threshold
> ```
> The compiler emits:
> ```c
> // context struct — one field per captured value
> typedef struct { int32_t threshold; } _ctx_above;
>
> // generated function — receives context as void*
> bool _above_impl(int32_t x, void* _ctx) {
>     return x > ((_ctx_above*)_ctx)->threshold;
> }
>
> // in the creating function's body:
> _ctx_above _above_ctx = { .threshold = threshold };
> fc_fn_int32_bool above = { .fn_ptr = _above_impl, .ctx = &_above_ctx };
> ```
>
> **Non-capturing lambdas** set the context pointer to null. No context struct is generated.
>
> **Call sites** — the compiler emits `closure.fn_ptr(arg, closure.ctx)` uniformly for all function values, whether capturing or not. The generated function ignores the null context pointer in the non-capturing case.
>
> **Lifetime** — the context struct lives on the stack frame of the function that creates the capturing lambda. A capturing closure is valid for the duration of that function call and must not outlive it. The lifetime rules are identical to stack slices and pointers to local bindings:
>
> - Passing a capturing closure as an argument to a function call: safe — the callee returns before the creator's frame is popped.
> - Returning a capturing closure from the function that created it: **compile error** — the context pointer would dangle.
> - Storing a capturing closure into heap memory that outlives the creating function: **undefined behavior** — not currently detected.
> - Non-capturing closures have no lifetime restriction — the null context pointer is always valid.
>
> The safe rule: a capturing closure must not outlive the function that created it. If captured state must outlive the creating function, heap-allocate the data explicitly and capture the pointer — a `let` binding holding a pointer has no lifetime restriction on the closure itself, only the usual programmer responsibility to keep the pointed-to memory live.
>
> **`extern` function pointer parameters** — when a function type appears as a parameter in an `extern` declaration, the compiler maps it to a plain C function pointer at the C boundary. The programmer passes a non-capturing lambda directly; the compiler extracts the `fn_ptr` field from the fat struct automatically. Passing a capturing lambda to an `extern` function pointer parameter is a compile error.
>
> The compiler may elide the fat-pointer wrapping when it can prove a function value is never used in a first-class manner — never stored, never passed as a `() -> T` parameter. This is an implementation quality optimization, not a language guarantee. Correct code is always generated without it.
>
> To obtain a raw C function pointer for direct use (e.g. storing in a C struct field), use `&f` on a non-capturing `let mut` binding — see §Address-of.

# PART 4 — Type System

## Structs

```fc
struct point =
    x: float64
    y: float64

struct node =
    value: int32
    next: node*?       // self-referential via pointer
```

Mutually recursive struct definitions are allowed — two structs may reference each other via pointer fields. Since all top-level declarations are collected in the first compiler pass, declaration order does not matter:

```fc
struct tree_node =
    value: int32
    parent: tree_node*?
    children: child_list*?

struct child_list =
    node: tree_node*
    next: child_list*?
```

The same rules apply to generic structs — a generic type may reference itself or another generic type via pointer fields. The monomorphizer follows the same pointer rule: it only needs the layout of a type to emit a pointer to it, so the instantiation graph never cycles. A direct recursive field without a pointer — `struct foo = value: foo<'a>` — would be an infinitely-sized type and is a compile error, exactly as for non-generic structs.

### Construction

Struct literals use named fields. Fields may appear in any order, and fields may be omitted — omitted fields are zero-initialized to their default value.

```fc
let p = point { x = 1.0, y = 2.0 }           // all fields
let p = point3d { z = 1, x = 3 }             // partial — y defaults to 0
let p = point3d { }                           // all fields defaulted
```

Fields may also span multiple lines — the `{` / `}` suspend the offside rule, so indentation is unrestricted inside the literal:

```fc
let p = point3d {
    x = 1.0,
    y = 2.0,
    z = 3.0
}
```

A trailing comma after the last field is permitted.

> **Transpilation**
> Struct literals transpile to C11 designated initializers. Unspecified fields are zero-initialized by C's rules:
> ```c
> point3d p = { .x = 3, .z = 1 };   // y == 0
> ```

### Field access

```fc
p.x        // direct field access
ptr->x     // pointer field access
```

Structs may be allocated on the stack or heap. Memory layout is identical to the equivalent C struct in declaration order — FC defers entirely to the C compiler for field alignment and padding. This means FC structs and their C equivalents are always ABI-compatible.

---

## Union Types

Union types are tagged unions — each value carries a variant tag and an optional payload. The compiler enforces exhaustive pattern matching.

```fc
union parse_outcome =
    | success(int32)
    | failure(str)

union shape =
    | circle(float64)
    | rectangle(rect_dims)   // multi-field variants use a struct
    | point                  // no payload
```

### Variant rules

- Each variant carries zero or one type
- Multiple values require a named struct
- Variant names are scoped to their union type

### Construction

Outside a match context, use the qualified variant name:

```fc
let s = shape.circle(3.14)
let r = parse_outcome.success(42)
```

> **Transpilation**
> Union types transpile to a C tagged struct using a C11 anonymous union for the payload. For example:
> ```c
> typedef enum { SHAPE_CIRCLE = 0, SHAPE_RECTANGLE, SHAPE_POINT } shape_tag;
> typedef struct {
>     shape_tag tag;
>     union { double circle; rect_dims rectangle; };
> } shape;
> ```
> The anonymous union means payload fields are accessed directly on the struct (`s.circle`) rather than through a named payload field (`s.payload.circle`), producing cleaner generated code. Variant tags are assigned integer values in declaration order starting from 0. This means zero-initialized memory is always a valid union value — the tag field 0 corresponds to the first declared variant, and the payload bytes are zero.

---

## Option Types

Option is a built-in generic type (see §Generics). Null is not expressible in FC — option is the only way to intentionally express the absence of a value. The `?` suffix creates an option type.

```fc
int32?      // optional int32
str?        // optional string
node*?      // optional pointer to node
```

### Constructing options

```fc
some(x)            // wrap a value — type inferred from x
default(int32?)    // int32? with no value
default(node*?)    // node*? with no value
```

`some` is a built-in operator that infers the option type from its argument expression. To create a none value, use `default(T?)` — conceptually, `none` is the first variant of the option type, so its default value is none (see §Default Values).

### Checking options

Option types have two synthetic read-only fields that return `bool`:

```fc
let x = some(42)
let y = default(int32?)

x.is_some    // true
x.is_none    // false
y.is_some    // false
y.is_none    // true
```

These fields cannot be assigned to. They work with both pointer options (`T*?`) and value options (`int32?`, `str?`, etc.).

### Unwrapping

```fc
let n = alloc(node)!    // unwrap — crashes if none
```

Use `x!` when you are certain a value is present and want to crash loudly if not. Unwrapping a `none` value prints a diagnostic to stderr with the source file, line number, and expression text, then aborts:

```
file.fc:3: unwrap failed: x
```

For safe unwrapping, use a `match` expression.

> **Transpilation**
> Option types transpile differently depending on whether the underlying type is a pointer:
>
> **Pointer options** (`T*?`) transpile to a plain C pointer `T*`. Null represents `none`, any non-null pointer represents `some`. No struct or tag is needed — null is a valid pointer sentinel that FC's own type system keeps permanently available, since raw `T*` is never null. This means `T*?` is directly ABI-compatible with C functions that return nullable pointers.
>
> **All other options** (`int32?`, `float64?`, `str?`, `point?`, etc.) transpile to a C struct with a value field and a boolean tag:
> ```c
> typedef struct { int32_t value; bool has_value; } fc_option_int32;
> ```
> Non-pointer types have no spare bit pattern that can safely serve as a sentinel — every bit pattern is a valid value — so an explicit tag is required.

---

## Pointers

Pointers in FC are intended to always be valid — a value of type `T*` should always point to a live `T`. There is no null literal and no null comparison in FC — null is not expressible in FC code. If a pointer may legitimately be absent, use the option type `T*?`.

This is a convention enforced by the language surface, not a hard guarantee at the memory level. A struct with a raw `T*` field that is zero-initialized will physically contain a zero pointer. Dereferencing it will crash. FC trusts the programmer to initialize raw pointer fields before use — the same responsibility as in C, but with null removed as an expressible value so it can never appear through normal code paths.

```fc
int32*       // pointer to int32, always valid
int32*?      // optional pointer, may be none
node**       // pointer to pointer to node
```

Multi-level pointers (`T**`, `T***`, etc.) compose naturally. In practice, `T**` appears in two contexts: C interop with out-parameter APIs (a function writes a `T*` back through a `T**`), and low-level data structures. Idiomatic FC rarely needs `T**` for pure FC code — option types, struct returns, and mutable bindings cover the common cases where C would use a pointer out-parameter.

```fc
// T** out-parameter pattern — function writes a heap pointer through T**
let create = (out: int32**) ->
    let p = alloc(int32)!
    *p = 99
    *out = p

let mut result = default(int32*)
create(&result)        // &result is int32** — create writes through it
let v = *result        // 99
free(result)
```

### Pointer width

A pointer is its own type — `T*` — and its storage width is a property of the pointer itself, not of `T`. All pointer types in FC, regardless of what they point to, are exactly one native word wide: 32 bits on a 32-bit target, 64 bits on a 64-bit target, and so on for any architecture FC targets. The element type `T` only matters when the pointer is dereferenced — it tells the compiler how many bytes to read and what type the result has. The pointer value itself, the address, is always one word.

This is why `any*` is a valid and faithful representation of an opaque C handle: it is a full-width address, indistinguishable in size from `FILE*` or `sqlite3*` or any other pointer type. See §any* — opaque pointers.

### Address-of

Only `let mut` bindings have addresses. You cannot take the address of a `let` binding.

```fc
let mut x = 42
let px = &x    // ok — x is a mutable let binding, px inferred as int32*

let y = 42
let py = &y    // compile error — y is a let binding
```

**Taking the address of a function** — `&f` on a function binding is valid if and only if the lambda is non-capturing. All function values use a fat-pointer representation internally, but a non-capturing lambda has a null context pointer, so the compiler can safely extract the raw `fn_ptr` field and produce a plain C-compatible function pointer.

In practice, `&f` is rarely needed. When a function type appears in an `extern` parameter declaration, the compiler handles the C function pointer mapping automatically — the programmer passes a non-capturing lambda directly without `&`. See §C Interop.

The main remaining use case for `&f` is a C struct that contains a function pointer field, accessed by FC via a raw pointer, where no `extern` function mediates the assignment:

```fc
// storing a function pointer into a C struct field directly
let mut handler = (x: int32) -> process(x)
some_c_struct->callback = &handler
```

Taking the address of a capturing lambda is always a compile error:

```fc
let threshold = 10
let mut above = (x: int32) -> x > threshold   // captures threshold
let p = &above    // compile error — capturing lambda
```

### Dereferencing

```fc
let val = *px        // explicit dereference, copies value
px->field            // pointer field access, no struct copy
(*px).field          // same as above — compiler does not copy struct
```

### Mutating through a pointer

The dereference operator on the left-hand side of `=` writes through the pointer:

```fc
let mut x = 42
let px = &x
*px = 99        // x is now 99
px->field = 1   // write through pointer to struct field
```

`px` itself is a let binding — its value (the address it holds) cannot change. What changes is the value at that address. Reassigning `px` to point somewhere else would require `px` to be a mutable let binding.

### Pointer arithmetic

```fc
let next = px + 1      // advance pointer by one element
let val = *(px + 1)    // dereference at offset
```

> **Note**
> `*ptr` in a field access context does not copy the struct. A copy only occurs when `*ptr` is used in a value position, such as `let x = *ptr` where the binding type is a struct.

---

## Slices & Strings

A slice is a fat pointer — a struct containing a raw pointer and a length. It is passed and stored by value; there is no extra level of indirection. Slices are first-class types. Indexing is bounds-checked.

The slice type suffix `[]` follows the element type:

```fc
uint8[]     // slice of uint8
int32[]     // slice of int32
int32?[]    // slice of optional int32
int32[]?    // optional slice of int32
int32?[]?   // optional slice of optional int32
str         // built-in alias for uint8[]
```

### Representation

A slice transpiles to a C struct with two fields:

```c
typedef struct { int32_t* ptr; int64_t len; } fc_slice_int32;
```

The struct is two words. Passing a slice to a function copies those two words — cheap, and no heap involvement.

### Allocation

Slices can be stack-allocated using literal initialization syntax, or heap-allocated with `alloc`. See §Memory Management for the full treatment. Slice-specific forms:

```fc
let mut buf = int32[128] { }          // stack slice — zero-initialized
let rgb = uint8[3] { 255, 0, 128 }   // stack slice — exhaustive element list
let buf = alloc(int32[128] { })       // heap slice — returns int32[]?
let buf = alloc(int32[128] { })!     // heap slice — unwrap, crash on failure
```

Two initialization forms for stack slices:

- `{ }` — all elements set to their default value, equivalent to zero-initializing the backing memory
- `{ v1, v2, ... }` — exhaustive element list, count must match declared length exactly — compile error otherwise

There is no partial-list initialization. If you want all elements to hold a specific non-zero value, use a loop.

`free` accepts a slice directly — the compiler emits `free(buf.ptr)`. Only free slices returned by `alloc`. The compiler's escape analysis detects and rejects `free` on stack-allocated slices and string literals at compile time. Freeing a sub-slice or other non-heap memory that escapes detection is undefined behavior.

```fc
free(buf)       // free heap-allocated slice
free(buf.ptr)   // equivalent, explicit
```

### Slice operations

```fc
s.ptr       // raw pointer to first element
s.len       // number of elements — int64
s[i]        // bounds-checked index — compile error if i is not an integer type
s[i..j]     // sub-slice from i up to but not including j
s[..j]      // sub-slice from start up to but not including j
s[i..]      // sub-slice from i to end
```

Both `.ptr` and `.len` are **read-only** — assigning to either field is a compile error. Independent mutation of these fields would break the slice invariant (that `.ptr` points to at least `.len` valid elements). To reshape a slice, use sub-slicing (`s[i..j]`) or construct a new slice from raw parts using struct literal syntax (see §Slice construction from raw pointer).

`s.len` is always `int64`. This is a deliberate design choice with two motivations. First, a platform-native length type would leak the target architecture into the type system, making struct layouts, arithmetic, and stored lengths all implicitly platform-dependent — reintroducing one of the footguns FC is designed to eliminate. Second, a signed length means `int32` — the default integer type — widens to `int64` naturally, so common patterns like `0..slice.len`, `i < slice.len`, and `slice.len - 1` all work without explicit casts. An unsigned `uint64` length would not widen from `int32` (since negative values would change meaning), forcing casts at nearly every slice boundary. A signed length also avoids the well-known C bug class where `a.len - b.len` underflows to a huge positive number — signed subtraction produces a negative result, which is almost always what the programmer intended.

The maximum representable length is 2^63 − 1 (approximately 9.2 exabytes), which exceeds the addressable memory of any current or foreseeable hardware.

The cost of `int64` on 32-bit and smaller targets is real but acceptable; programmers who need tight inner loops on constrained hardware can drop to raw pointer arithmetic, which FC supports as an explicit escape hatch. The compiler may use narrower types such as `size_t` internally in generated C where provably safe — for example, loop counters in `for` transpilation — but this is an implementation detail that does not affect FC semantics.

Sub-slices share memory with the original — no allocation occurs. A sub-slice's `.ptr` is an interior pointer into the same backing allocation — freeing a sub-slice is undefined behavior. All range forms are bounds-checked. `s[..j]` is sugar for `s[0..j]` and `s[i..]` is sugar for `s[i..s.len]`.

### String literals and memory

FC's `str` type makes no null-termination guarantee. A `str` is a fat pointer — a pointer and a length — and the length is the only authority on where the string ends. To pass a string to a C function that expects null termination, use a `(cstr)` cast or a `c"..."` literal.

String literal memory lives in static read-only storage — the compiler emits the bytes into the binary's read-only data section, and the `str` fat pointer is constructed with `.ptr` pointing to that static data. This has two consequences:

- **Mutating a string literal element is a compile error.** String literals have type `const str` — the compiler rejects writes through const slices. Casting away const with `(str)s` and then writing is undefined behavior — the data is physically in read-only memory.
- **Freeing a string literal is a compile error.** The compiler's escape analysis rejects `free` on static memory, and the const qualifier additionally prevents freeing const pointers/slices.

These hazards are caught at compile time via the const type system and escape analysis, unlike C where they are only detected at runtime (if at all).

```fc
let s = "hello"          // s: const str — points to static read-only memory
s[0] = 72u8              // compile error: cannot assign through const pointer/slice
free(s)                  // compile error: cannot free const pointer/slice

let mut buf = alloc(uint8[5] { })!
buf[0] = 72u8            // ok — heap-allocated, mutable (non-const str)
free(buf)                // ok — heap-allocated
```

### Slice construction from raw pointer

When interoperating with C, a slice can be constructed from a raw pointer and a known length using struct literal syntax:

```fc
let s = str { ptr = cs, len = libc.strlen(cs) }
let buf = uint8[] { ptr = some_ptr, len = 128 }
```

The resulting slice shares memory with the original pointer — no allocation occurs. The programmer is responsible for ensuring the pointer remains live for the lifetime of the slice.

### C interop

For C functions expecting a null-terminated string, use `(cstr)` to create a stack copy with a null terminator, or use `c"..."` literals for constant strings:

```fc
libc.puts((cstr)s)           // stack copy with null terminator
libc.puts(c"hello")          // cstr literal — always null-terminated
```

For C functions that take a pointer and length (e.g. `fwrite`), pass `.ptr` and `.len` directly — no null termination needed.

### Embedded targets and raw pointer arrays

On memory-constrained embedded targets, the slice fat pointer — a pointer plus an `int64` length — may be undesirable. `int64` arithmetic is expensive on 8-bit and 16-bit hardware, and bounds checking adds overhead that may be unacceptable in tight loops.

The `alloc(T, N)` form allocates a raw buffer directly without constructing a slice:

```fc
let buf = alloc(uint8, 128)!        // uint8* — raw buffer, no slice overhead
```

Alternatively, `alloc(T[N] { })` creates a slice which the programmer can narrow to a raw pointer:

```fc
let buf = alloc(uint8[128] { })!.ptr    // uint8* — 128 bytes allocated, slice header discarded
```

The underlying heap allocation is identical in both cases — `calloc(128, sizeof(uint8))`. What you lose is bounds checking — indexing via the raw pointer is unchecked, the same as C.

Alternatively, take the pointer from a stack slice:

```fc
let mut arr = uint8[128] { }
let buf = arr.ptr               // uint8* into stack memory — no fat pointer, no bounds checking
```

From this point the programmer is responsible for tracking the length and staying within bounds — the same responsibility as in C.

For full control over allocation, `isize` and `usize` allow direct use of C's `malloc`/`memcpy`/etc. with platform-correct types — no `int64` overhead on smaller targets:

```fc
module c from "stdlib.h" =
    extern malloc: (usize) -> any*?
    extern free as c_free: (any*) -> void

module mem from "string.h" =
    extern memcpy: (any*, any*, usize) -> any*
    extern memset: (any*, int32, usize) -> any*
    extern strlen: (cstr) -> usize

let main = (args: str[]) ->
    let size = 256u                           // usize — matches C's size_t exactly
    let buf = (uint8*)c.malloc(size)!         // raw pointer, no slice overhead
    mem.memset((any*)buf, 0, size)            // zero-fill with platform-native size
    // ... use buf with pointer arithmetic ...
    c.c_free((any*)buf)
```

This compiles to the same C you would write by hand — `malloc(256)`, `memset(buf, 0, 256)` — with no intermediate slice construction and no `int64` arithmetic. The `usize` type emits `size_t` in the generated C, so on an 8-bit AVR it is 16 bits, on a 32-bit ARM it is 32 bits, and on a 64-bit host it is 64 bits — matching the target's native address width in every case.

---

## Fixed-Size Inline Arrays

A struct field declared with `T[N]` stores `N` elements of type `T` inline in the struct, just like a C array member. In the FC type system, the field is accessed as a `T[]` slice — the compiler creates a fat-pointer view automatically on every field access.

```fc
struct packet =
    data: uint8[256]
    len: int32
```

This produces the C struct `struct packet { uint8_t data[256]; int32_t len; };`.

### Access

Accessing a fixed-array field yields a `T[]` slice with `.ptr` pointing to the inline data and `.len` equal to `N`:

```fc
let p = packet { len = 0 }
p.data.len        // always 256
p.data[0]         // bounds-checked element access
p.data[10..20]    // subslicing
for b in p.data   // iteration
    use(b)
p.data.ptr        // raw uint8* to the start of the inline array
```

The object must be an lvalue (a named binding, not a temporary). Accessing a fixed-array field on a function return value or struct literal is a compile error — bind the struct first.

### Assignment

Assigning a slice to a fixed-array field copies data via `memcpy`:

- If `src.len > N`: runtime abort (prevents data loss).
- If `src.len <= N`: copy `src.len` elements, zero-fill the remaining `N - src.len` elements.

```fc
let mut p = packet { len = 0 }
let msg = uint8[4] { 0x48u8, 0x45u8, 0x4Cu8, 0x4Fu8 }
p.data = msg   // copies 4 bytes, zeros remaining 252
p.len = 4
```

### Struct Literals

Fixed-array fields in struct literals accept slice values. The data is copied inline:

```fc
let src = uint8[8] { 1u8, 2u8, 3u8, 4u8, 5u8, 6u8, 7u8, 8u8 }
let p = packet { data = src, len = 8 }
```

Omitted fields are zero-initialized (the entire inline array is zeroed).

### Restrictions

- `N` must be a compile-time integer literal (no expressions, no type variables for size).
- `T[N]` is valid only in struct field declarations (including extern structs) and as a `sizeof`/`alignof` operand. It cannot appear as a function parameter type, return type, or binding type.
- `&s.data` is a compile error — use `s.data.ptr` for the raw pointer.

### sizeof

`sizeof(T[N])` returns `N * sizeof(T)` as `int64`. A struct containing inline arrays includes them in its size:

```fc
sizeof(int32[4])     // 16
sizeof(packet)       // >= 257 (256 bytes of data + 4 bytes of len, plus padding)
```

### alignof

`alignof(T)` returns the alignment requirement of type `T` in bytes as `int64`. Like `sizeof`, it is a constant expression and works with type variables in generic functions.

```fc
alignof(int8)        // 1
alignof(int32)       // 4 (on most platforms)
alignof(int64)       // 8 (on most platforms)
```

For fixed arrays, `alignof(T[N])` returns the alignment of the element type `T`, not the array — matching C11 semantics.

```fc
alignof(int32[4])    // same as alignof(int32)
```

In generic functions, `alignof('a)` is resolved at monomorphization time:

```fc
let get_align = <'a>() -> alignof('a)
get_align<int32>()   // 4
get_align<int64>()   // 8
```

Transpiles to `(int64_t)_Alignof(...)` in C11.

### Equality

Struct equality (`==`) compares fixed-array fields element-by-element (or via `memcmp` for simple types).

### C Interop

Extern structs can declare fixed-array fields to match C struct layouts:

```fc
module net from "netinet/in.h" =
    extern struct in6_addr =
        s6_addr: uint8[16]
```

The field maps directly to `uint8_t s6_addr[16]` in the C header.

### Generics

Generic structs may use fixed arrays with a type variable element:

```fc
struct buffer =
    data: 'a[256]
```

Each monomorphized instance (e.g. `buffer<int32>`) produces a concrete C struct with the appropriate inline array.

## Function Types

```fc
(int32, int32) -> int32           // takes two int32, returns int32
(str) -> bool                     // takes str, returns bool
() -> void                        // no parameters, returns void
(int32) -> (int32) -> int32       // returns a function
```

Function types transpile to C function pointers. When the function type appears in a position that may receive a closure (such as a function parameter), the compiler uses a fat function pointer — a function pointer paired with a `void*` context pointer. See §Closures & Capture for the full transpilation treatment.

> **Aside — function values and slices as fat pointers**
> Both slices and function values are two-word structs at the representation level. The similarity ends there.
>
> Slices are **transparent** about their internals — `.ptr` and `.len` are directly accessible, slices can be constructed from raw parts using struct literal syntax, and the fat pointer representation *is* the type from the programmer's perspective.
>
> Function values are **opaque** — the compiler never exposes `.fn_ptr` or `.ctx` as accessible fields. The only operation that matters is calling. This is intentional: a function value's internal layout is an implementation detail, and exposing it would be noise for the overwhelming majority of use cases and unsafe for the rest. Constructing a function value from raw parts is not supported.
>
> The one place this opacity is pierced is `&f` on a non-capturing function binding, which extracts the raw C function pointer for interop. This is not "address of the function value struct" — it reaches inside and pulls out a field — which means `&f` and `&s` are subtly different operations despite using the same syntax. `&f` is a narrow C interop escape hatch and rarely appears in FC code.

---

## Static Type Properties

Every type in FC has built-in static properties accessible via dot notation on the type name. These replace C's inconsistent collection of macros.

The dot notation `T.something` is not a special "static property" feature — it is simply module access syntax. The compiler implicitly provides a built-in module for each primitive type pre-populated with type-specific properties. User-defined static properties on structs are just a module sharing the type's name (see §Module System).

A **type alias** is a symbolic stand-in for another type — it is not a new type. Because an alias is just another name for the same underlying type, it inherits all static properties, built-in module members, operators, and inference rules of that type without any additional specification. Should any further alias syntax be added in future, this same rule applies: an alias always fully impersonates the aliased type at every level.

The built-in aliases `str` and `cstr` are the canonical examples: `str` is `uint8[]` and `cstr` is `uint8*`. Import aliases (§Importing) extend this mechanism to user-defined types — `import point as pt from geometry` makes `pt` a type alias for `point`. The alias name is preserved in diagnostics and function signatures, but the underlying type identity is unchanged: `pt` and `point` are the same type, values are freely interchangeable, and `==` works across them.

### Type-specific built-ins

Available only on the types where they make sense — using them on other types is a compile error:

| Types | `.min` | `.max` | `.bits` | `.nan` | `.inf` | `.neg_inf` | `.epsilon` |
|-------|--------|--------|---------|--------|--------|------------|------------|
| int8–int64 | yes | yes | yes | — | — | — | — |
| uint8–uint64 | yes | yes | yes | — | — | — | — |
| float32, float64 | yes | yes | yes | yes | yes | yes | yes |

```fc
int32.min       // minimum representable value
int32.max       // maximum representable value
int32.bits      // 32
uint8.min       // 0
uint8.max       // 255
float64.nan     // not-a-number
float64.inf     // positive infinity
float64.neg_inf // negative infinity
float64.min     // smallest positive normal value
float64.max     // largest finite value
float64.epsilon // machine epsilon
float64.bits    // 64
```

- **Integer `.min`/`.max`**: range bounds (`INT32_MIN`/`INT32_MAX` etc.)
- **Float `.min`**: smallest positive normal value (`FLT_MIN`/`DBL_MIN`)
- **Float `.max`**: largest finite value (`FLT_MAX`/`DBL_MAX`)
- **Float `.epsilon`**: smallest x such that 1.0 + x ≠ 1.0 (`FLT_EPSILON`/`DBL_EPSILON`)
- **Float `.inf`/`.neg_inf`**: positive/negative infinity
- **Float `.nan`**: not-a-number
- **`.bits`**: bit width of the type as `int32` (8, 16, 32, or 64)

> **Transpilation**
> Type properties transpile to the appropriate C constants from `<stdint.h>`, `<float.h>`, and `<math.h>`. For example, `int32.max` becomes `INT32_MAX`, `float64.nan` becomes `((double)NAN)`.

# PART 5 — Generics

## Overview

FC supports parametric polymorphism through type variables. A type variable is a placeholder for any concrete type — the compiler produces a separate concrete instantiation for each unique combination of types a generic function or type is used with. This is **monomorphization**: there is no runtime type information, no boxing, and no dispatch overhead. Every generic use site compiles down to code that is identical in structure to what you would have written by hand for that specific type.

This is the same model as C++ templates, but specified at the language level rather than as a text-substitution mechanism. The compiler resolves all type variables before emitting any C output — the generated C contains only concrete, fully-typed code.

---

## Type Variables

A type variable is written as an apostrophe followed by a name: `'a`, `'b`, `'elem`, `'Key`, `'Val`. The apostrophe is a dedicated sigil — concrete type names never begin with `'`, so there is no ambiguity.

Type variables are **implicit** — they are never declared separately. Any `'a` appearing in a function signature, struct body, or union body is automatically treated as a type variable. Multiple occurrences of the same name within the same scope refer to the same type variable and constrain the types at those positions to be identical.

---

## Generic Functions

A function is generic if one or more type variables appear in its parameter or return types. The type variables are resolved at each call site by the compiler — no explicit instantiation syntax is required.

```fc
let identity = (x: 'a) -> x

let fst = (a: 'a, b: 'b) -> a

let map = (s: 'a[], f: ('a) -> 'b) ->
    let mut result = alloc('b[s.len] { })!
    let mut i = 0
    loop
        if i >= s.len then break result
        result[i] = f(s[i])
        i = i + 1

let swap = (p: pair<'a, 'b>) ->
    pair { first = p.second, second = p.first }
```

When the same type variable appears more than once, the compiler unifies the types at those positions:

```fc
let eq_first = (a: 'a, b: 'a) -> a == b    // both arguments must be the same type
```

`==` is valid here without any constraint because FC defines structural equality for all types (see §Structural Equality). This is one of the benefits of FC's universal equality model — unconstrained type variables can always use `==` and `!=`.

Return types are always inferred — if the body expression resolves to a concrete type, that becomes the return type after type variable substitution.

### Implicit and explicit type arguments

In the normal case, type variables are resolved entirely from the function's arguments — no explicit type annotation is needed at the call site:

```fc
let x = identity(42)                          // 'a = int32, inferred from argument
let z = map(points, (p: point) -> p.x)        // 'a = point, 'b = float64, inferred
```

However, some functions introduce type variables that do not appear in any parameter. The most common case is a constructor or factory function where the element type is not given by any argument:

```fc
// 'a cannot be inferred from any argument — it only appears in the return type
let make = <'a>() ->
    arraylist { data = alloc('a[4] { })!, len = 0 }
```

The `<'a>` prefix declares that `'a` is a type variable that must be explicitly supplied at every call site:

```fc
let mut nums = arraylist.make<int32>()
let mut strs = arraylist.make<str>()
```

Multiple explicit type variables are separated by commas:

```fc
let make_pair = <'a, 'b>() ->
    pair { first = default('a), second = default('b) }

let p = make_pair<int32, str>()
```

**The rule:** a type variable belongs in `<>` if and only if it does not appear in any parameter type. If a type variable appears in a parameter, it is always inferred from the argument — declaring it in `<>` as well is a compile error:

```fc
// compile error — 'a appears in a parameter, cannot also be declared explicit
let bad = <'a>(x: 'a) -> x
```

This keeps the explicit syntax minimal — it only appears when genuinely necessary, and a `<>` declaration is a clear signal to the reader that the type cannot be derived from the arguments.

**Inside a generic function body**, a `<>` type variable may be satisfied by a type variable already in scope from the enclosing function's own parameters — no explicit `<type>` annotation is needed at internal call sites:

```fc
let map = (l: arraylist<'a>, f: ('a) -> 'b) ->
    let mut result = arraylist.make<'b>()    // 'b is in scope — explicit but no concrete type needed
    for x in l.data[..l.len]
        arraylist.add(&result, f(x))
    result
```

The explicit `<type>` syntax is only required when calling from a non-generic context where no type variable is in scope.

**Passing generic functions as arguments** — `<type>` syntax is only valid in call position, never as a standalone expression. A generic function cannot be passed as a value directly — it has no single concrete type until instantiated. The idiomatic pattern is a wrapper lambda that instantiates at the required type:

```fc
let factory = <'a>() -> default('a)

// wrapper lambda instantiates factory at a specific type
let str_factory = () -> factory<str>()

let l = arraylist.repeat<str>(5, str_factory)

// or inline
let l = arraylist.repeat<str>(5, () -> factory<str>())
```

The wrapper is a plain concrete `() -> str` — no new language mechanism required. This covers all practical factory and callback patterns without rank-2 polymorphism.

**Rank-2 polymorphism is not supported** — a function parameter typed as "a generic function that works for any type" (e.g. `f: <'a>() -> 'a`) would require the callee to invoke `f` at multiple different types, which implies runtime type information or a constraint system. FC has neither, and this pattern is explicitly out of scope. The wrapper lambda approach covers all realistic cases without it.

**Parsing** — `name<type>()` is always parsed as a generic call, never as a comparison expression. This is unambiguous in FC because type names (`int32`, `str`, `point`, `'a`) are syntactically distinct from value expressions in all positions where they may appear. No disambiguation sigil (such as Rust's `::<>` turbofish) is required.

---

## Generic Structs and Unions

Structs and unions become generic by using type variables in their field or variant definitions. The type parameters are inferred from the body — no explicit parameter list is required on the type name.

```fc
struct pair =
    first:  'a
    second: 'b

struct box =
    value: 'a

union result =
    | ok('a)
    | err('b)
```

The compiler treats `pair` as implicitly parameterized over `'a` and `'b`, `box` over `'a`, and `result` over `'a` and `'b`. The type parameters are ordered by first appearance in the body, reading top-to-bottom, left-to-right.

For generic structs, type arguments are inferred from the struct literal fields:

```fc
let p = pair { first = 42, second = "hello" }    // pair<int32, str>
let b = box { value = 3.14 }                     // box<float64>
```

For generic unions, type arguments must be provided explicitly at the construction site using `name<types>.variant(args)` syntax. This is required because a variant's payload may not constrain all type parameters — for example, `result.err(32)` cannot determine `'a`:

```fc
let r = result<int32, str>.ok(42)                // result<int32, str>
let e = result<int32, str>.err("fail")           // result<int32, str>
```

Type variables in a struct or union propagate through — a function accepting a `pair<'a, 'b>` introduces those variables into its own signature:

```fc
let map_fst = (p: pair<'a, 'b>, f: ('a) -> 'c) ->
    pair { first = f(p.first), second = p.second }
```

### Type-associated modules on generic types

A module sharing a generic type's name works the same as for concrete types. Type variables in scope within the type definition are available within the associated module:

```fc
struct box =
    value: 'a

module box =
    let wrap = (x: 'a) -> box { value = x }
    let unwrap = (b: box<'a>) -> b.value
    let map = (b: box<'a>, f: ('a) -> 'b) -> box { value = f(b.value) }
```

Built-in operators `default(T)` and `sizeof(T)`, as well as static module member access, follow the same monomorphization rules as operators — they are valid on type variables in a generic body and checked against the concrete type at each call site:

```fc
let make_default = (x: 'a) -> default('a)     // ok — checked at call site
let size_of_val  = (x: 'a) -> sizeof('a)       // ok — checked at call site
let get_min      = (x: 'a) -> 'a.min           // ok — valid if concrete type has .min
let make_none    = (x: 'a) -> default('a?)     // ok — produces 'a? with no value
```

A call site that provides a type without the required property is a monomorphization error — the same rule as for unsupported operators.

---

## option

`option` is a built-in generic union:

```fc
union option =
    | none
    | some('a)
```

The syntax for option types is `T?` — there is no `option<T>` type syntax. Conceptually, `option` follows the same design as a union with `none` as its first variant: `default(T?)` produces a none value (first-variant-is-default, see §Default Values), and `| none ->` / `| some(v) ->` work as match patterns with exhaustiveness checking. The built-in `some(expr)` operator (see §Constructing options) wraps a value and infers the option type, and `x!` unwraps it (crashing if none).

The pointer optimization is preserved as a special compiler rule applied during monomorphization: when `option` is instantiated with a pointer type (`'a*`), the compiler emits a plain nullable C pointer rather than a tagged struct. This is invisible at the FC level — `'a*?` still behaves as an option type — but means pointer options remain zero-cost and ABI-compatible with C nullable pointer returns.

---

## Monomorphization

For each unique combination of concrete types a generic function or type is used with, the compiler produces a distinct concrete instantiation. This happens entirely before C code is emitted — the generated C contains no type variables, no generic machinery, and no runtime type information.

```fc
let x = identity(42)        // produces: identity instantiated at int32
let y = identity(3.14)      // produces: identity instantiated at float64
let z = identity("hello")   // produces: identity instantiated at str

let p1 = pair { first = 1,     second = true  }   // produces: pair<int32, bool>
let p2 = pair { first = "hi",  second = 3.14  }   // produces: pair<str, float64>
```

Each instantiation becomes a distinct C type or function. The compiler derives C names from the generic name and the concrete type arguments — for example, `pair<int32, bool>` might emit as `pair_int32_bool` and `identity` at `int32` as `identity_int32`. The exact naming scheme is a compiler implementation detail; what matters is that names are unique, derived deterministically from the types, and human-readable enough to be identifiable in debugger output and compiler errors.

Two uses of the same generic at the same concrete types share a single instantiation — the compiler deduplicates across the entire build.

> **Transpilation**
> A generic struct transpiles to a C struct per instantiation:
> ```c
> typedef struct { int32_t first; bool second; } pair_int32_bool;
> typedef struct { fc_slice_uint8 first; double second; } pair_str_float64;
> ```
> A generic function transpiles to a C function per unique call signature:
> ```c
> int32_t identity_int32(int32_t x) { return x; }
> double  identity_float64(double x) { return x; }
> ```
> Option types (`T?`) follow the existing option transpilation rules per instantiation — pointer types use the null-sentinel form, all others use the tagged struct form.

### Errors at monomorphization

FC has no constraint system in this version. Type variables are unconstrained — any concrete type may be substituted. If a generic function uses an operation that the concrete type does not support, the compiler reports an error at the **call site** where the unsupported instantiation was requested, identifying the type variable substitution that caused the problem. Errors are not reported inside the generic definition itself.

This means generic functions work naturally across numeric types without any annotation:

```fc
let add = (a: 'a, b: 'a) -> a + b

add(1, 2)           // ok — int32 supports +
add(1.0, 2.0)       // ok — float64 supports +
add("x", "y")       // compile error at this call site — str does not support +
```

The error message identifies the call site and the substitution: something like "when calling `add` with `'a = str`, operator `+` is not defined for `str`." This makes it straightforward to diagnose in practice, even without a formal constraint declaration in the source.

### Scope of operations on type variables

The following operations are valid on type variables within a generic body, with validation deferred to monomorphization:

- **Operators**: arithmetic (`+`, `-`, `*`, `/`, `%`), comparison (`==`, `!=`, `<`, `>`, `<=`, `>=`), bitwise (`&`, `|`, `^`, `~`, `<<`, `>>`)
- **Built-in type operators**: `default('a)`, `sizeof('a)`
- **Built-in static type properties**: `'a.min`, `'a.max`, `'a.bits`, `'a.nan`, `'a.inf`, `'a.neg_inf`, `'a.epsilon`

The following are **not** supported on type variables:

- **Field access on values** — `x.field` where `x: 'a` is not valid. The compiler does not perform structural typing; a type variable does not carry information about which fields the concrete type will have. To operate on fields generically, pass them as separate parameters: write `let sum = (x: 'a, y: 'a) -> x + y` rather than `let sum = (p: 'a) -> p.x + p.y`.
- **User-defined type-associated module members** — `'a.make()` or `'a.zero` where `make`/`zero` are members of a user-defined module sharing the type's name. Only the built-in static properties listed above are accessible on type variables. User-defined module members require a concrete type name.

---

# PART 6 — Program Structure

## The FC Compiler

FC programs are compiled by the `fc` command-line tool, which transpiles FC source files into a single C source file. The generated C requires a GCC-compatible C11 compiler (GCC, Clang, or a GCC-based cross-compiler — see §Why C as a target for details).

### Usage

```
fc <input.fc> [input2.fc ...] [-o output.c]
```

One or more `.fc` source files are passed as arguments. If `-o` is not specified, the output filename is derived from the first input file by replacing its extension with `.c`.

```
fc main.fc                              // produces main.c
fc main.fc -o build/app.c               // explicit output path
fc src/main.fc src/math.fc src/util.fc   // produces src/main.c
```

All source files are compiled together as a single translation unit — there is no separate compilation or linking step on the FC side. The resulting C file is self-contained and can be compiled with:

```
cc -std=c11 -o myapp main.c
```

### Diagnostics

The compiler writes all diagnostic messages to stderr. Each message includes the source location and a description:

```
filename.fc:line:col: error: description
```

**Error accumulation** — the compiler reports as many errors as it can in a single invocation rather than stopping at the first error. When the type checker encounters an error, it marks the erroneous expression with a poison type and continues checking the rest of the program. The poison type propagates silently through subsequent operations, suppressing cascading false positives. For example, if `let a = 1 + true` produces a type error, later uses of `a` in arithmetic, function calls, or assignments will not generate additional spurious errors.

Syntax errors (lexer and parser) remain fatal — they prevent the compiler from building a well-formed AST, so compilation stops immediately on the first syntax error.

After all errors are reported, the compiler prints a summary:

```
3 error(s)
```

### Exit codes

| Code | Meaning |
|------|---------|
| 0 | Compilation succeeded |
| 1 | One or more errors occurred |

### Compilation pipeline

The compiler processes source in five stages:

1. **Lex & parse** — each source file is tokenized (with indentation converted to `INDENT`/`DEDENT` tokens) and parsed into an AST. Syntax errors are fatal.
2. **Pass 1 (declaration collection)** — all files are scanned to collect top-level names, struct/union layouts, function signatures, module and namespace declarations. This enables forward references and cross-file module access regardless of file order.
3. **Pass 2 (type checking)** — expressions are type-checked bottom-up with scope tracking. Type errors are accumulated, not fatal. Generic function and type instantiations are registered as they are encountered.
4. **Monomorphization** — transitive generic instantiations are discovered (generic functions calling other generic functions), concrete types are built for all instantiations, and type dependencies are topologically sorted so by-value struct/union dependencies are emitted before their dependents.
5. **Code generation** — the typed AST is emitted as C11 source containing only concrete, fully-typed code. No type variables or generic machinery appear in the output.

If any errors are accumulated during passes 1 or 2, later stages are skipped and the compiler exits with code 1.

---

## Module System & Visibility

### Modules

Modules are the primary organizational unit. All reusable code lives in modules. A module is declared with `module name =` followed by an indented body containing functions, types, nested modules, and imports:

```fc
module geometry =
    struct point =
        x: int32
        y: int32

    let manhattan = (p: point) -> p.x + p.y

    module transforms =
        let scale = (p: point, factor: int32) ->
            point { x = p.x * factor, y = p.y * factor }
```

Modules are fully contained within a single file. Multiple modules may exist in one file. Module names are flat — `module math` inside any file declares a module named `math`. The filename has no effect on module naming.

### Namespaces

A file may declare a namespace as its first line. Namespaces group modules across files and prevent name collisions between independently developed code:

```fc
namespace acme::graphics::
```

A namespace name consists of one or more `::` separated segments and always ends with `::`. Files with no namespace declaration are in `global::` — the implicit default. Application code normally lives in `global::`; libraries should declare a namespace.

`global::` is reserved: it cannot appear in a `namespace` declaration or in an `import ... from global::` clause. It exists only as the implicit default for files with no namespace. This prevents library code from importing application-level declarations out of the global namespace — cross-namespace access always requires explicit imports from a named namespace.

Namespaces are purely a compile-time disambiguation mechanism. They have no presence in expressions or at runtime.

### Top-level declarations and the entry-point file

Non-module top-level declarations (`let`, `struct`, `union`) are only allowed in the **entry-point file** — the file containing `let main`. Every program must have exactly one `let main`. All other files may only contain `module` declarations (and file-level imports). Files in non-global namespaces may only contain modules.

```fc
// main.fc — the entry-point file
module utils =
    let double = (x: int32) -> x * 2

struct config =                           // OK — this is the entry-point file
    width: int32
    height: int32

let main = (args: str[]) ->
    utils.double(21)
```

This restriction ensures that file ordering never affects compilation — all cross-file code is in modules, which the compiler resolves regardless of order.

### Global scope and implicit visibility

Types (`struct`, `union`), bindings (`let`, `let mut`), and modules declared at file level in the entry-point file reside in the **global scope**. These global declarations are implicitly visible to all modules in the `global::` namespace — no import is required:

```fc
// main.fc — entry-point file
struct point =
    x: int32
    y: int32

let mut origin = point { x = 0, y = 0 }

let main = (args: str[]) ->
    let p = helper.make_point()
    origin = p
    origin.x + origin.y
```

```fc
// helper.fc
module helper =
    let make_point = () -> point { x = 10, y = 20 }  // point and origin visible here
    let shift = () ->
        origin.x = origin.x + 1                       // global mutable state
```

This works because the [name resolution order](#name-resolution-order) falls through from module members and imports to the global scope. The global scope acts as an implicit outermost layer visible to all `global::` code across all files.

**Namespace boundary.** Modules in a non-global namespace (e.g., `namespace acme::`) do *not* see global declarations implicitly. They must use `import` to access them:

```fc
// vendor.fc
namespace acme::
module vendor =
    // point is NOT visible here — different namespace
    // must import explicitly if needed
```

**Shadowing.** If a module defines a member with the same name as a global declaration, the module member takes priority (module members are checked before the global scope in name resolution). This follows the same innermost-wins rule as `let` shadowing:

```fc
struct point =
    x: int32
    y: int32

module shapes =
    struct point =               // shadows global point within this module
        x: float64
        y: float64
    let make = () -> point { x = 1.0, y = 2.0 }   // uses shapes.point
```

**Design rationale.** Restricting file-level declarations to the entry-point file means there is exactly one source of global types and state. This avoids the ordering and visibility problems that arise when multiple files can inject globals, while still providing a lightweight mechanism for shared types and state in application code. Libraries should define types in modules rather than relying on global scope.

### Visibility

Everything inside a module is public by default. Use `private` to hide a symbol from importers:

```fc
module math =
    let add = (a: int32, b: int32) -> a + b            // public

    private let clamp = (x: int32, lo: int32, hi: int32) ->
        if x < lo then lo
        else if x > hi then hi
        else x
```

`private` applies to functions, structs, unions, and nested modules.

### Importing

Imports are **transparent aliases** that introduce names into a lexical scope, following the same scoping and shadowing rules as `let` bindings. An import does not create a new type; it creates a name that resolves to the original definition. Imports may appear at file level or inside module bodies.

**Import forms:**

```fc
// Same-namespace (global:: implicit)
import module_a                                       // whole module
import module_a as m                                  // aliased
import func_a from module_a                           // named member
import func_a as f, func_b from module_a              // multiple
import * from module_a                                // all public members

// Cross-namespace
import module_a from acme::graphics::                 // whole module
import func_a from acme::graphics::module_a           // named member
```

**Rules:**
- `::` terminates namespace paths; `.` navigates into modules/submodules
- `import *` works on modules only — not bare namespaces
- `import T from M` brings both the type `T` (struct or union) and its type-associated module `T` (if any) into scope

**Aliases** do not create new types. The same type can be imported under multiple aliases, and values of any alias are interchangeable:

```fc
import point as pt from geometry
import point as coord from geometry
// pt and coord are the same type — freely interchangeable
```

### Import scoping

Imports follow lexical scoping. Each import is visible only in the scope where it appears:

**File-level imports** are visible to all code in that file, but not to other files:

```fc
// lib.fc
namespace mylib::
import * from std::types               // visible only within lib.fc

module lib =
    let make = (a: 'a, b: 'b) -> tuple2 { e1 = a, e2 = b }
```

```fc
// main.fc — must import std::types independently
import lib from mylib::
import * from std::types
```

**Module-level imports** are visible within the declaring module and all its child modules. A child module can see its parent's imports, but the parent's imports and child's imports are independent — each module's declarations are type-checked in their own import context:

```fc
module parent =
    import double from helpers          // visible to parent and children

    module child =
        let quad = (x: int32) -> double(double(x))   // sees parent's import
```

If a child module imports a name that shadows a parent's import, the child's import takes precedence within the child. The parent's declarations still see the parent's original import, even when type-checked on-demand from within the child.

### Non-forwarding rule

`import * from M` exports only M's own declarations — never names that M imported for internal use. A module's public API is exactly its declared members:

```fc
module outer =
    import secret from inner            // internal use only
    let get = () -> secret              // own declaration — exported

import * from outer                     // brings get — does NOT bring secret
```

### Shadowing

Later imports shadow earlier ones in the same scope. Inner scopes shadow outer scopes. Imports shadow top-level declarations. This matches `let` binding semantics:

```fc
module mod_a =
    let value = 10
module mod_b =
    let value = 20

import value from mod_a
import value from mod_b                 // shadows — value is now 20
```

### Name resolution order

The compiler resolves identifiers through a scope chain, innermost to outermost:

1. **Local scope** — `let` bindings in the current function body (innermost block outward to the enclosing module boundary)
2. **Interleaved module resolution** — at each module level, members are checked then that level's imports, before moving to the parent:
   - Current module's own declarations (functions, types, constants, nested modules)
   - Current module's imports
   - Parent module's declarations → parent module's imports
   - Grandparent module's declarations → grandparent module's imports
   - *(and so on, to any depth)*
   - File-level imports
3. **Global declarations** — module definitions and entry-point file declarations

At each level, members take priority over imports. A child's import shadows a parent's member — consistent with the rule that imports follow the same lexical scoping rules as `let` bindings. Later declarations shadow earlier ones at each level.

### Direct module access

Module members can be accessed with dot notation without importing:

```fc
let main = (args: str[]) ->
    let p = geometry.point { x = 3, y = 4 }      // struct literal
    let d = geometry.manhattan(p)                   // function call
    let p2 = geometry.transforms.scale(p, 10)      // nested module
    let size = sizeof(geometry.point)               // type context
```

Dot notation works for all modules visible in the current scope — same-namespace modules, imported modules, and modules in the import chain. Cross-namespace modules must be imported first; dot notation then accesses their members.

**Forward references** — within a module, declarations can reference each other regardless of source order. When a reference targets a declaration whose type has not yet been determined, the compiler performs on-demand type checking — pausing the current declaration to resolve the referenced one first. This works across all scope levels: siblings in the same module, ancestor module bindings (parent chain), imported bindings, and global declarations. Circular type dependencies (where A's type depends on B's type which depends on A's type) are detected and reported as errors. Note that mutual *calls* between functions are not circular type dependencies — function signatures are determined from their parameters, so mutual recursion is valid.

**Circular references** between modules are not allowed. If A references B, B may not reference A (directly or transitively). The compiler detects cycles during the first pass. Mutual pointer references between types must be within the same module.

### Type-associated modules

A module may share a name with a struct or union in the same scope — the idiomatic way to define constructors and static operations:

```fc
module geometry =
    struct vec2 =
        x: float64
        y: float64

    module vec2 =
        let zero = vec2 { x = 0.0, y = 0.0 }
        let add = (a: vec2, b: vec2) -> vec2 { x = a.x + b.x, y = a.y + b.y }
```

`vec2 { ... }` is struct construction; `vec2.zero` is module access. Inside `module vec2`, the struct is visible from the enclosing scope (module members are checked before imports in the resolution order).

The same pattern works with unions:

```fc
module game =
    union shape =
        | circle(int32)
        | rect(int32)

    module shape =
        let area = (s: shape) ->
            match s with
            | circle(r) -> r * r
            | rect(w) -> w * w

        let make_circle = (r: int32) -> shape.circle(r)
```

When a module and union share a name, **module members take priority**. If a name is not found in the module, the compiler falls through to check if it matches a variant of the companion union. This means `shape.area(s)` resolves to the module function, while `shape.circle(5)` resolves to variant construction (since there is no module member named `circle`). If a module member and a variant share the same name, the module member wins.

### Qualified type names in diagnostics

Types defined inside modules display with their fully qualified path in error messages:

```
error: comparison type mismatch: std::types.tuple2<int32, uint8> vs local.tuple2<int32, uint8>
```

The format is `[namespace::]module.name`. Top-level types (outside any module) display without qualification.

### Multi-file builds

All `.fc` files are passed to the compiler together:

```
fc main.fc lib.fc
fc src/*.fc vendor/acme/*.fc
```

The first pass scans all files and builds a global module map before type-checking. Modules can reference each other regardless of file order. File ordering never affects correctness.

**Per-file import scoping:** each file's imports are scoped to that file. A library's internal imports never leak to consumers.

**Duplicate module names** within the same namespace are a compile error. Different namespaces never conflict — `acme::` and `widget::` can both define a module named `utils`.

**Vendor libraries** are source `.fc` files with a namespace declaration, included in the build like any other file:

```
fc src/*.fc vendor/acme/*.fc vendor/widget/*.fc
```

### Transpilation

The module system is entirely compile-time — no runtime representation in generated C:

- **Namespaces** — erased. Exist only in the compiler's module map.
- **Modules** — become C symbol prefixes using `__` as the hierarchy separator. `geometry.manhattan(p)` transpiles to `geometry__manhattan(p)`. Namespace segments are also joined with `__`: namespace `acme::graphics::` module `render` member `draw` becomes `acme__graphics__render__draw`. The `__` separator is unambiguous because double underscores are forbidden in user identifiers.
- **Imports** — become nothing. The import scope chain is resolved at compile time.
- **`private`** — enforced at compile time only.
- **Type-associated modules** — pure naming convention. `vec2.zero` is a prefixed global; no vtable or indirection.

Zero runtime cost. The C compiler sees flat, idiomatic C.

## Conditional Compilation

FC supports compile-time conditional compilation via `#if`, `#else if`, `#else`, and `#end` directives. These allow code to be included or excluded at compile time based on named flags, without resorting to a text-substitution preprocessor.

### Directives

Directives always appear at **column 1** (the first column), regardless of the surrounding indentation level. This keeps them visually distinct from regular code and avoids ambiguity with the offside rule.

```
#if flag_name
#else if other_flag
#else
#end
```

### Flags

Flags are simple names — either set or not set. There are no valued flags, and there are no built-in flags. All flags are user-defined, passed on the command line:

```
fc --flag debug main.fc
fc --flag feature_x --flag debug main.fc
fc --flag posix main.fc stdlib/io.fc stdlib/sys.fc
```

### Usage

`#if` works at both top-level scope and inside expression blocks. Conditional compilation is resolved at the token level — inactive branch tokens are stripped before parsing begins. Inactive branches receive no checking of any kind.

Top-level usage — conditionally including declarations, imports, and definitions:

```fc
#if posix
import sys from std::
#end

#if debug
let log = (msg: str) -> io.write(msg, stdout)
#else
let log = (msg: str) -> return
#end
```

Expression-level usage — conditionally including statements inside a function body:

```fc
let process = (data: uint8[]) ->
#if debug
    io.write("processing\n", stdout)
#end
    do_work(data)    // still in function body — same indentation level as the #if block contents
```

Chaining with `#else if`:

```fc
#if linux
let platform = "linux"
#else if macos
let platform = "macos"
#else
let platform = "unknown"
#end
```

### Rules

- Directives must always be at column 1 (the first column) — a directive at any other column is a compile error.
- `#if` and `#end` must be matched. An unclosed `#if` is a compile error.
- `#else` and `#else if` must appear between a matching `#if` and `#end`.
- Nesting is allowed — `#if` blocks may contain other `#if` blocks.
- Inactive branches are stripped at the token level and receive no checking.
