# PART 1 — Foundations

## Philosophy

FC compiles directly to C as its backend, making it highly compatible with existing C code and toolchains. The language follows C's memory management philosophy — manual, no garbage collector, no borrow checker — while cleaning up C's syntax and fixing well-known footguns. FC supports parametric polymorphism through monomorphized generics — generic functions and types are resolved entirely at compile time, producing concrete C output with no runtime overhead.

Every feature in FC should transpile to clean, readable C. This is a core design constraint. When a feature cannot be expressed as straightforward C output, that is a signal to reconsider the feature.

The guiding principles are:

- No null in the language — null is not expressible in FC code; option types replace all intentionally nullable values. Raw pointer fields in zero-initialized structs may physically contain null if the programmer does not initialize them — FC does not prevent this, but does not provide null as a value either.
- No uninitialized bindings — all bindings must be initialized at declaration
- No explicit type annotations on bindings — types are always inferred; the same principle extends to generics, where type variables are implicit and instantiation is always inferred at the call site
- Explicit numeric widths throughout — implicit widening conversions are allowed only where no information can be lost (see §Operators & Access)
- Indentation-based lexical scoping
- A clean statement / expression divide — top-level declarations are statements, everything inside an expression context is an expression with a type
- One way to do things — minimize redundant syntax
- Zero-cost abstractions — generics, modules, and option types produce no runtime representation in the generated C; safety and structure are compile-time concepts
- Small performance and memory cost acceptable for safety improvements (fat pointers, bounds checking). Where performance is critical and the programmer is willing to take responsibility, escape mechanisms are available — raw pointer arithmetic and pointer-based array iteration opt out of bounds checking without undermining the rest of the type system.

### Type inference as a design theorem

FC's "no explicit type annotations on bindings" principle is not merely an ergonomic choice — it is a theorem about the language, and the rest of the design is carefully shaped to make that theorem hold.

FC uses local, directional type inference. Every expression's type is derived bottom-up from its sub-expressions: the type of a binary expression follows from the types of its operands, the type of a function call follows from the function's parameter types and its body, and so on. This is a deterministic tree walk — there is no global constraint solving, no unification, and no backtracking. The compiler never needs to look at how a value is *used* to determine what *type* it has.

This works because of four mutually reinforcing design decisions:

- **Explicit parameter types** are the anchor. Every function has a fully specified input signature, so the body can always be type-checked directionally from the leaves upward. Return types follow from bodies; they never need to be declared.
- **No function overloading** means a name always resolves to exactly one function. The type at any call site is always unambiguous. If multiple candidates existed for a name, the compiler would need to resolve the ambiguity by examining context — introducing exactly the kind of global constraint solving the inference model is designed to avoid.
- **No implicit coercions beyond safe widening** means an expression's type is never context-dependent. The type flows up; context never changes it.
- **Monomorphized generics** means type variables are pinned at call sites by concrete arguments, not resolved by global unification. A call to `map` with a `(int32) -> float64` function argument immediately determines both type variables — no constraint propagation required.

**A note on numeric operators** — `+`, `*`, and friends work across all numeric types, which might appear to be a form of overloading. It is not. When the compiler encounters `a + b`, both `a` and `b` are already fully typed by their own bottom-up inference before the operator is consulted. Operator resolution is a post-inference step — a type-indexed dispatch table, not a constraint to be solved. The implicit widening rule (`int32 + int64` widens the narrower operand) is the one bounded exception: it is applied after both operands are independently typed, flows only in one direction (narrow to wide), and never reinterprets a literal. The type of `42` is always `int32` regardless of what it is added to. This is why integer-to-float conversion is always an explicit cast in FC — allowing `42` to silently become `float64` based on context would be a genuine violation of the directional model.

Other languages with more powerful type systems — Haskell, ML, Rust — require global inference or bidirectional checking because features like type classes, trait resolution, and lifetime inference create dependencies that flow *downward* from context as well as upward from structure. FC is deliberately designed to avoid those features, not because inference power is undesirable but because the language is more predictable, more understandable, and easier to implement correctly when the inference algorithm is a single directional pass.

The one nuance is mutually recursive top-level functions: since the first compiler pass collects names without evaluating bodies, two functions that call each other must be type-checked as a system. In practice the base cases anchor the types and the mutual calls are consistent with them — the compiler resolves mutually recursive groups together. This is a bounded technical complexity, not a crack in the model.

---

### Why C as a target

Targeting C is a deliberate strength of the design, not a limitation. Every platform that matters already has a C compiler — GCC, Clang, and cross-compilation toolchains for embedded targets. By targeting C, FC inherits all of these backends for free, including niche embedded toolchains that have no LLVM backend. The generated C is also human-readable and debuggable with standard C tools, and can be submitted directly to platforms that only accept C source.

FC targets **C11** specifically, plus two GNU extensions supported by GCC and Clang. Key C11 features used by the compiler: anonymous unions (cleaner tagged union output), `_Static_assert` (compiler-generated sanity checks), compound literals, and designated initializers.

#### GNU extensions required

The generated C uses two extensions beyond the C11 standard:

- **GNU statement expressions** (`({ ... })`) — used pervasively for bounds-checked slice access, option unwrap, `alloc` expressions, match-as-expression, loop-as-expression, and other constructs that must evaluate a sequence of statements and produce a value. This is the primary GNU dependency.
- **`__builtin_alloca`** — used for stack-dynamic allocation of temporaries: string interpolation buffers, array literal backing storage, and the `argc`/`argv` conversion in the generated `main` wrapper. Avoids any `<alloca.h>` dependency.

Both extensions are supported by GCC (all versions supporting C11) and Clang (all versions). They are also supported by all GCC-based cross-compilation toolchains.

### Platform contract

#### Supported toolchains

FC requires a **GCC-compatible C11 compiler**. Supported toolchains:

- **GCC** — all platforms (Linux, macOS, BSDs, Windows via MinGW-w64)
- **Clang** — all platforms (Linux, macOS, Windows via clang-cl is *not* supported; Clang with GNU-compatible driver is)
- **GCC-based cross-compilers** — arm-none-eabi-gcc (ARM Cortex-M), xtensa-esp32-elf-gcc (ESP32 via ESP-IDF), avr-gcc (Arduino/AVR), riscv-unknown-elf-gcc (RISC-V), and similar GCC-derivative toolchains for embedded targets
- **MinGW-w64** — GCC-based toolchain for building native Windows executables

**Not supported: MSVC.** Microsoft's C compiler does not implement GNU statement expressions or `__builtin_alloca`, and has no plan to. Windows users should use MinGW-w64 or Clang (with the GNU-compatible driver, not clang-cl).

#### Runtime requirements

FC targets **C11 hosted implementations with heap allocation** — a libc providing `malloc`, `free`, `abort`, `memcmp`, `strlen`, and `snprintf`. This covers desktop, server, mobile (iOS, Android NDK), and "rich" embedded platforms (Raspberry Pi, ESP32 with ESP-IDF, Arduino with avr-libc, ARM Cortex-M with newlib/picolibc).

**Not supported:** C11 freestanding (no libc), static-memory-only bare metal, or custom allocator-only environments. FC's core language features — heap allocation (`alloc`/`free`), string interpolation, bounds-check traps (`abort`) — depend on a hosted-like environment. Platforms without these facilities are better served by C directly.

## Indentation and Layout

FC uses indentation to delimit scopes and blocks. There is no `{` / `}` syntax. The rules follow the offside principle — the same model used by languages like F# and Python, though with stricter whitespace requirements.

### The Offside Rule

A block is established by the column position of its first token. That column becomes the **block column**. The rule is then:

- A token at the **same column** as the block column is a new peer in the current block — a new statement or expression in the same scope.
- A token to the **right** of the block column belongs to the current item — either a new nested block or a continuation.
- A token to the **left** of the block column ends the current block and returns to an enclosing scope.

The specific number of spaces used does not matter — only the relative column positions of tokens are significant.

### Blocks

A **block** is a sequence of peer expressions at the same column, introduced after a block-forming construct. Blocks are the fundamental unit of sequencing and scoping in FC:

- Expressions in a block are evaluated top to bottom.
- The value of the block is its last expression. All preceding expressions are evaluated for their side effects — non-void values may be discarded without warning. FC is a systems language where side effects are not discouraged.
- A `let` binding is visible to all subsequent expressions in the same block and in any nested blocks within those expressions. It is not visible before its declaration or outside the enclosing block.

These three rules replace the need for any explicit sequencing or scoping syntax. There is no `;` sequencing operator and no `in` scoping keyword (as found in ML-style languages) — both concepts fall out directly from the block model.

### New Blocks

After a block-forming construct (`->`, `=` in let/module/struct/union bodies, `with`, `loop`, `for`, `then`, `else`), if the next token is on a new line, a new block is established at that token's column. All tokens at that column are peers — statements or expressions in the same scope. The final expression in the block is the block's value.

```fc
let f = (x: int32) ->
    let a = x + 1       // block column = 4, peer 1
    let b = a * 2       // block column = 4, peer 2
    b                   // block column = 4, peer 3 — value of f
```

```fc
let result =
    let a = 1           // block column = 4, peer 1
    let b = 2           // block column = 4, peer 2
    if a > b then a     // block column = 4, peer 3 — value of result
    else b
```

```fc
match shape with
| circle(r)    -> r * r      // block column = 0, arm 1
| rectangle(d) ->
    d.width * d.height       // new block inside this arm, block column = 4
| point        -> 0.0        // block column = 0, arm 3
```

### Continuation

A continuation occurs when a single expression spills onto the next line, indented strictly further than the current block column, without a block-forming construct having appeared. The parser treats this as the remainder of the current expression — not a new statement, and not a new block.

```fc
let total = first_value
    + second_value      // continuation — part of the same expression
    + third_value
```

The distinction between a new block and a continuation is unambiguous from context: a new block only opens after a block-forming construct. In any other case, a more-indented line is a continuation of the previous expression.

### Layout Suppression Inside Brackets

Inside matched bracket pairs — `()`, `[]`, and `{}` — the offside rule is suspended. `INDENT`, `DEDENT`, and `NEWLINE` tokens are not emitted, so expressions can span multiple lines freely without alignment requirements. This applies to function call arguments, slice literals, and struct literals:

```fc
// Multiline function call — arguments can wrap freely inside ()
let result = some_function(
    arg_one,
    arg_two,
    arg_three
)

// Multiline slice literal — elements can wrap freely inside {}
let data = int32[6] {
    1, 2, 3,
    4, 5, 6
}

// Multiline struct literal — fields can wrap freely inside {}
let p = point3d {
    x = 1.0,
    y = 2.0,
    z = 3.0
}
```

Bracket pairs nest correctly — `depth` is tracked, so brackets inside brackets are all accounted for before layout resumes.

### Spaces Only

Tabs are not permitted in indentation. Using a tab character at the start of a line is a compile error. This avoids the class of bugs where mixed tab/space indentation causes layout to differ between editors and compilers.

### Block Contexts

The offside rule applies uniformly across all block-forming constructs:

| Construct | Block contains |
|-----------|---------------|
| Function body (after `->`) | Expressions in the function |
| `let` body (after `=`, when body is on the next line) | The block expression assigned to the binding |
| `module` body (after `=`) | Declarations in the module |
| `struct` body (after `=`) | Field declarations |
| `union` body (after `=`) | Variant declarations |
| `match` arms (after `with`) | Pattern arms |
| `loop` body | Loop body expressions |
| `for` body | Loop body expressions |
| `then` / `else` body | Branch expressions |

---

## Lexical Rules

### Comments

FC supports two forms of comments:

- **Line comments** — `//` through end of line
- **Block comments** — `/* ... */`, which may be nested

```fc
// this is a line comment

/* this is a block comment */

/* block comments /* can nest */ and the compiler tracks depth */
```

Nesting is useful for commenting out regions of code that already contain block comments. Unterminated block comments are a compile error.

### Identifiers

An identifier begins with a letter (`a`–`z`, `A`–`Z`) or underscore (`_`), followed by zero or more letters, digits (`0`–`9`), or underscores. Identifiers are ASCII-only — non-ASCII characters are not permitted in identifier positions. Double underscores (`__`) are **not permitted** within identifiers — they are reserved for the compiler's internal name mangling of namespace and module hierarchies.

Type variable names begin with an apostrophe (`'`) followed by one or more letters, digits, or underscores. The apostrophe is a dedicated sigil — concrete type names never begin with `'`.

The following are **reserved words** and may not be used as identifiers:

`let`, `mut`, `struct`, `union`, `module`, `namespace`, `import`, `from`, `as`, `extern`, `private`, `match`, `with`, `if`, `then`, `else`, `for`, `in`, `loop`, `break`, `continue`, `return`, `some`, `true`, `false`, `none`, `void`

The following are **reserved identifiers** — built-in compile-time operators that may not be shadowed by user-defined bindings:

`alloc`, `free`, `sizeof`, `alignof`, `default`, `assert`

The following are **built-in globals** — predefined identifiers typed `any*` that refer to the standard C streams:

`stdin`, `stdout`, `stderr`

The following are **built-in type names** and may not be used as user-defined type names or binding names:

`int8`, `int16`, `int32`, `int64`, `uint8`, `uint16`, `uint32`, `uint64`, `isize`, `usize`, `float32`, `float64`, `bool`, `char`, `any`, `str`, `cstr`

## Primitive Types, Literals & Casting

### Primitive Types

| Type | Description | C equivalent |
|------|-------------|--------------|
| int8 | Signed 8-bit integer | int8_t |
| int16 | Signed 16-bit integer | int16_t |
| int32 | Signed 32-bit integer (default integer) | int32_t |
| int64 | Signed 64-bit integer | int64_t |
| uint8 | Unsigned 8-bit integer | uint8_t |
| uint16 | Unsigned 16-bit integer | uint16_t |
| uint32 | Unsigned 32-bit integer | uint32_t |
| uint64 | Unsigned 64-bit integer | uint64_t |
| isize | Signed pointer-width integer — width matches the target's pointer size | ptrdiff_t |
| usize | Unsigned pointer-width integer — width matches the target's pointer size | size_t |
| float32 | 32-bit IEEE 754 float | float |
| float64 | 64-bit IEEE 754 float (default float) | double |
| bool | Boolean — true or false | bool (stdbool.h) |
| char | Alias for `uint8`. Represents a single ASCII/UTF-8 byte. Supports character literal syntax. | uint8_t |
| void | Non-instantiable type. Used by the compiler for type inference and control flow analysis. May appear in function type signatures (`() -> void`) but never as a value in expression positions — `void` cannot be assigned to a let binding or passed as an argument. | void |
| any* | Opaque pointer — a raw address with no associated type. Cannot be dereferenced. Used for C interop — wrapping opaque C handles (file handles, database connections, etc.) and pointer casts. See §any* — opaque pointers. | void* |
| str | Alias for `uint8[]`. An FC string — fat pointer with length. | — |
| cstr | Alias for `uint8*`. A null-terminated C string pointer. Use for C interop only. | char* |

Implicit widening conversions are allowed in binary expressions and comparisons where no information can be lost — see §Operators & Access. All other numeric conversions require an explicit cast. `if` conditions must be `bool` typed — numeric values do not implicitly coerce to bool.

**Platform-width types (`isize`, `usize`)** have no implicit widening to or from fixed-width types. Since their width varies by target (32-bit or 64-bit), no fixed-width conversion is guaranteed lossless on all platforms. All conversions require explicit casts: `(isize)x`, `(int64)y`, etc. FC's default types (`int32` for integers, `int64` for `sizeof` and slice `.len`) remain fixed-width — `isize`/`usize` are opt-in for C interop and embedded targets where matching the platform's native size types matters.

### Literals

| Literal | Type |
|---------|------|
| 42 | int32 (default) |
| 42i8, 42i16, 42i64 | int8, int16, int64 |
| 42u8, 42u16, 42u32, 42u64 | uint8, uint16, uint32, uint64 |
| 42i | isize (platform-width signed) |
| 42u | usize (platform-width unsigned) |
| 42i32 | int32 (explicit, same as default) |
| 3.14 | float64 (default) |
| 3.14f32, 3.14f64 | float32, float64 |
| true, false | bool |
| 'a', '\\n', '\\x41' | char (alias for uint8) |
| "hello" | str |
| c"hello" | cstr — null-terminated C string pointer |

Numeric literals may contain single underscores (`_`) between digits as visual separators. Underscores do not affect the value and work with all literal forms:

```fc
let million = 1_000_000        // same as 1000000
let bytes = 0xFF_FF            // hex with separator
let bits = 0b1010_0101         // binary with separator
let pi = 3.14_159              // float with separator
let big = 1_000_000i64         // suffixed with separator
```

Suffixed integer literals are range-checked at compile time. A literal whose value does not fit in the specified type is a compile error:

```fc
let a = 999i8       // compile error — 999 exceeds int8 range (-128..127)
let b = 256u8       // compile error — 256 exceeds uint8 range (0..255)
let c = 127i8       // ok
let d = 255u8       // ok
```

The same rule applies to `char` literals, which are aliases for `uint8`.

### Escape Sequences

The following escape sequences are valid in `str`, `cstr`, and `char` literals:

| Escape | Meaning |
|--------|---------|
| `\\n` | newline (0x0A) |
| `\\t` | horizontal tab (0x09) |
| `\\r` | carriage return (0x0D) |
| `\\\\` | backslash |
| `\\"` | double quote (in string literals) |
| `\\'` | single quote (in char literals) |
| `\\0` | null byte (0x00) |
| `\\xNN` | arbitrary byte value, exactly two hex digits |

All three literal forms share the same escape set. An unrecognized escape sequence is a compile error.

### String Interpolation

Any string literal may contain **interpolation segments** — format specifier / expression pairs that are evaluated at runtime and spliced into the string. A string literal with no interpolation segments remains a static, read-only `str` as before.

An interpolation segment has the form `%spec{expr}`, where `spec` is a printf-style format specifier and `expr` is an arbitrary FC expression:

```fc
let name = "world"
let age = 30
let greeting = "hello %s{name}, you are %d{age} years old"
```

The compiler validates that each format specifier is compatible with the expression's type — a mismatch is a compile error.

#### Format specifiers

| Specifier | Valid types | Notes |
|-----------|------------|-------|
| `%d`, `%i` | all integer types | decimal |
| `%u` | all integer types | unsigned decimal |
| `%x`, `%X` | all integer types | hexadecimal |
| `%o` | all integer types | octal |
| `%f` | `float32`, `float64` | fixed-point — **width required** |
| `%e`, `%E` | `float32`, `float64` | scientific notation |
| `%g`, `%G` | `float32`, `float64` | shortest representation |
| `%s` | `str`, `cstr` | string |
| `%c` | `char` | single character |
| `%p` | any pointer type | pointer address |
| `%T` | any type | compile-time type name |
| `%%` | — | literal `%`, no expression |

The `%T` format emits the compile-time type name of the expression as a string literal. The expression is type-checked but **not evaluated** at runtime — only its static type is used. This is useful for debugging inferred types. For example, `"%T{x}"` where `x` is an `int32` produces `"int32"`. Since the type name is a compile-time constant, `%T` segments always contribute a fixed number of bytes to the buffer size.

Width, precision, and flag modifiers are allowed: `%04d{x}`, `%.2f{pi}`, `%20s{name}`.

The `%f` format requires an explicit width (e.g., `%8.2f`) because fixed-point float output can be arbitrarily long. Other float formats (`%e`, `%g`) are bounded by type and do not require explicit width.

#### Allocation

Interpolated strings are stack-allocated (via `alloca`). The compiler computes a buffer size guaranteed to be sufficient. Integer, char, and pointer formats are bounded at compile time by the type's maximum formatted width. String formats (`%s`) use the runtime `.len` by default. The result `str`'s `.len` reflects the actual bytes written, which may be less than the buffer size. The compiler's escape analysis tracks interpolated strings as stack-allocated — returning one from a function or freeing one is a compile error. Use `alloc(s)!` to deep-copy to the heap if the string must outlive the function.

When `%s` includes a precision (e.g., `%.256s{name}`), the precision acts as a compile-time bound on that segment. If the string is longer than the precision, it is truncated (standard printf truncation semantics). When **all** segments in an interpolated string have compile-time bounds — i.e., all `%s` segments use precision and all other segments are numeric/char/pointer — the entire buffer size is a compile-time constant. This allows the C compiler to hoist the allocation out of loops and enables static stack analysis.

```fc
// Runtime-dependent buffer size (bare %s):
let msg = "hello %s{name}"

// Compile-time constant buffer size (precision-bounded %s):
let msg = "hello %.64s{name}"
```

#### Escape rules

`%%` produces a literal `%` character. Bare `{` and `}` are not special — interpolation is only triggered by the `%spec{` pattern.

```fc
"100%%"                    // "100%"
"braces { } are literal"   // "braces { } are literal"
"use %d format"            // static — %d not followed by {
```

#### cstr Interpolation

The `c"..."` prefix produces a **null-terminated cstr** instead of a `str` slice. All the same format specifiers and interpolation rules apply — the only difference is that the result is a `uint8*` (cstr) with a null terminator appended, rather than a `uint8[]` (str) with an explicit length.

```fc
let name = "world"
let msg = c"hello %s{name}"   // cstr — null-terminated, stack-allocated via alloca
```

Like str interpolation, cstr interpolation is stack-allocated — the result cannot be returned from a function or freed. Use `alloc(c"...")` to promote an interpolated cstr to heap-owned memory:

```fc
let heap_msg = alloc(c"hello %s{name}")!   // heap-allocated cstr, caller must free
```

### Casting

Explicit casts use C-style prefix cast syntax: `(T) expr`. All conversions not covered by the implicit widening rules require an explicit cast.

**Numeric casts** — any numeric type to any other numeric type:

```fc
let x = (float64) 32        // int32 to float64
let y = (int32) 3.14        // float64 to int32, truncates toward zero
let z = (uint8) some_int32  // narrowing cast, programmer responsible
```

**Pointer-to-pointer casts** — any pointer type to any other pointer type, including `any*`. Unsafe — the programmer is responsible for correctness:

```fc
let p = (any*) &my_state         // T* to any* — erase type for C interop
let q = (my_state*) some_any_ptr // any* to T* — recover type, programmer responsible
let r = (uint8*) some_int32_ptr  // T* to U* — reinterpret pointer type
```

Pointer-to-pointer casts include const changes: `(const int32*)ptr` freezes a pointer (safe), `(int32*)const_ptr` strips const (unsafe). For slices, `(const str)s` and `(str)const_s` work similarly. See §The const qualifier.

**str to cstr** — `(cstr)` cast creates a null-terminated stack copy of the string via `alloca`. The copy lives until the enclosing function returns. This is the safe way to pass FC strings to C functions that expect null-terminated strings:

```fc
let s = "hello"
let cs = (cstr) s   // stack copy with null terminator
```

The allocation size is `str.len + 1`, which is unbounded at compile time — casting a large string on a small stack will overflow. The compiler's escape analysis tracks the result as stack-allocated — returning a `(cstr)str` cast from a function is a compile error. Note that `cstr` **literals** (written as `c"..."`) are static data and do not involve `alloca`. The `.ptr` field of a `str` is also freely available without a cast, but does not guarantee null-termination.

**Pointer-to-integer and integer-to-pointer** — for embedded work and memory-mapped I/O. Unsafe:

```fc
let addr = (uint64) some_ptr          // pointer to integer — raw address value
let reg = (uint32*) 0x40001000u64     // integer to pointer — memory-mapped register
```

Bit-reinterpretation of value types (e.g. inspecting the raw bits of a `float32` as `uint32`) is not supported via cast syntax — use explicit pointer casts through a temporary if needed.

## let and let mut

| Keyword | Terminology | Reassignable | Addressable | Capturable in closure |
|---------|-------------|---------|-------------|-----------------------|
| let | let binding | no | no | yes — captured by copy |
| let mut | mutable let binding | yes | yes | no |

All bindings must be initialized at declaration. Types are always inferred — there are no explicit type annotations on bindings.

```fc
let x = 42
let mut y = 42

y = y + 1           // ok — reassigning a mutable let binding
x = x + 1           // compile error — x is a let binding, cannot be reassigned
```

### Binding reassignment vs. content mutation

`let` vs `let mut` controls only whether the **binding itself** can be reassigned — whether you can make it refer to a new value entirely. It says nothing about whether the *contents* of the bound value can be mutated.

Struct field assignment and slice element assignment are valid on both `let` and `let mut` bindings, because they mutate the contents of the value, not the binding:

```fc
let p = point { x = 1.0, y = 2.0 }
p.x = 3.0               // ok — mutating a field, not reassigning p

let buf = int32[4] { 0, 1, 2, 3 }
buf[2] = 99             // ok — mutating an element, not reassigning buf

let mut q = point { x = 1.0, y = 2.0 }
q = point { x = 5.0, y = 6.0 }   // ok — reassigning q to a new value
```

This is consistent with the pointer rule — writing through a `let` binding pointer (`*px = 99`) is valid because you are not changing the pointer, you are changing what it points to.

### The const qualifier

`let` vs `let mut` controls whether a *binding* can be reassigned. The `const` qualifier controls whether data can be *written through* a pointer or slice. These are orthogonal:

| | `let` binding | `let mut` binding |
|--|--|--|
| Non-const pointer/slice | Can't reassign binding, can write through pointer | Can reassign and write through pointer |
| Const pointer/slice | Can't reassign binding, can't write through pointer | Can reassign binding, can't write through pointer |

`const` is a prefix on pointer, slice, and `any*` types:

```fc
const int32*     // pointer to read-only int32
const int32[]    // slice with read-only elements
const str        // read-only string (alias for const uint8[])
const cstr       // read-only C string (alias for const uint8*)
const any*       // read-only opaque pointer (maps to const void* in C)
```

`const` is not valid on bare value types — `const int32` is a compile error. Value-level immutability is handled by `let`.

#### Const sources

Const enters the type system at three sites and propagates from there through inference:

- **String and cstring literals**: `"hello"` has type `const str`, `c"hello"` has type `const cstr`. The data lives in static read-only memory.
- **Function parameter annotations**: `let f = (s: const str) -> ...` declares that `f` will not modify `s`.
- **Struct field declarations**: `struct config = name: const str` declares a read-only field.

Since FC has no type annotations on `let` bindings, local variable types are always inferred from the right-hand side. A binding inherits whatever constness the expression produces.

#### Implicit coercion

Non-const implicitly widens to const (the safe direction). Const to non-const requires an explicit cast:

```fc
let f = (s: const str) -> s.len

let mut buf = alloc(uint8[100] { })!
f(buf)                     // ok — str widens to const str
```

Typed pointers implicitly widen to `any*`, respecting const: `T*` widens to `any*`, and `const T*` widens to `const any*`. However, `const T*` does **not** widen to `any*` — that would silently drop the const guarantee.

#### Explicit casts

Both directions are available via regular cast syntax:

```fc
let mut x = 42
let cp = (const int32*)&x    // freeze — non-const to const (safe)
let mp = (int32*)cp           // strip const (unsafe, for C interop escape hatches)
```

Slice const casts also work: `(const str)s` to freeze, `(str)const_s` to strip.

#### Deep const

Accessing a field through a const pointer preserves const on pointer and slice fields. Value fields are simply not writable — no type change needed:

```fc
struct node =
    data: int32
    next: node*?

let f = (n: const node*) ->
    n->data              // int32 — readable, not writable
    n->next              // const node*? — deep const propagated
```

Deep const chains naturally: `const_ptr->a->b.c.d->e` — every pointer dereference in the chain preserves const, and every value field access inherits the write restriction from the enclosing const dereference.

`.ptr` on a const slice gives a const pointer: if `s` is `const int32[]`, then `s.ptr` is `const int32*`.

#### Write rejection

The compiler rejects these operations through const:

```fc
let mut x = 42
let cp = (const int32*)&x
*cp = 10                 // compile error: cannot assign through const pointer/slice
cp->field = 10           // compile error (for struct pointers)
const_slice[0] = 10      // compile error
&(cp->field)             // compile error: cannot take mutable address through const pointer
free(cp)                 // compile error: cannot free const pointer/slice
```

These are `diag_error` (non-fatal) — the compiler reports all const violations in a single pass.

#### Generics

Type variables can bind to const types. `const` composes with type variable syntax:

```fc
let deref = (p: const 'a*) -> *p    // works for any T — const preserved through monomorphization

deref(&x)                            // 'a = int32, param is const int32*
```

`alloc` always returns non-const, even when the input is const — it creates a fresh mutable heap copy:

```fc
let s = "hello"           // const str
let copy = alloc(s)!      // str (non-const — new heap memory)
```

### Statements vs. expressions

At the top level of a file, `let`, `let mut`, `struct`, `union`, `module`, `import`, and `namespace` are **statements** — they are processed by the first compiler pass, have no type, and produce no value. Inside module bodies, the same applies to `let`, `let mut`, `struct`, `union`, `module`, `import`, and `extern`.

**Module-level** non-function `let` bindings must be initialized with **constant expressions** — literals, arithmetic on literals, casts of constants, `sizeof`, `alignof`, `default`, and struct literals with constant fields. Variable references and function calls are not allowed. This matches C's requirement that file-scope variable initializers be constant expressions.

**File-level** non-function `let` bindings (in the entry-point file) are more permissive: in addition to constant expressions, they may use `alloc`, `some`, option unwrap (`!`), array and slice literals, and union variant constructors. Variable references and function calls are still not allowed. These initializations are hoisted into the program's startup code before `main` runs, so the entry-point file acts as an extended main function.

```fc
// constant expressions — allowed at both file and module level
let max_size = 1024             // ok — integer literal
let mask = 0xFF & 0x0F          // ok — constant arithmetic
let scale = 2 * 3 + 1           // ok — constant arithmetic

// file-level only — not allowed in modules
let buf = alloc(int32[100] { })!  // ok — alloc + unwrap
let p = alloc(point2d)!          // ok — alloc + unwrap
let opt = some(42)               // ok — some constructor
let c = color.green              // ok — union variant

let x = 10
let y = x + 5                   // ERROR — references variable x
let z = compute()               // ERROR — function call
```

Inside any expression context, `let` and `let mut` introduce bindings within a block. The binding is visible to all subsequent expressions in the same block — scoping and sequencing both follow directly from the block model:

```fc
let x = foo()
let y = bar(x)    // x is in scope here
x + y             // value of the block — both x and y in scope
```

Bindings nest naturally across block depth:

```fc
let result =
    let a = 1
    let b = 2
    if a > b then a
    else b
```

### Struct destructuring in bindings

Structs can be destructured directly in `let` and `let mut` bindings using the same `{ field = name }` syntax as match arm patterns. Fields omitted from the destructuring are simply not bound.

```fc
let { center = c, radius = r } = green_circle    // c and r are let bindings
let mut { radius = r } = green_circle            // r is a mutable let binding
```

Destructuring can be nested:

```fc
let { center = { x = cx, y = cy }, radius = r } = green_circle
```

### Shadowing

Any binding can shadow any other binding of the same name, regardless of mutability:

```fc
let x = default(int32?)
let x = some(32)       // let shadows let

let mut y = 42
let mut y = y + 1      // let mut shadows let mut

let mut z = 42
let z = z              // let shadows let mut — z is now immutable
z = z + 1              // compile error — z is now a let binding
```

Shadowing a `let mut` binding with a `let` binding is a useful pattern for "freezing" a mutable value at a point in time.

## Type Inference

FC uses simple right-to-left (inside-out) inference. The type of a binding is always inferred from the expression on the right-hand side. There are no explicit type annotations on bindings. There is no global unification or Hindley-Milner inference.

- Parameter types on lambdas are always required — there is nothing to infer them from
- Return types of functions are inferred from the body expression
- Binding types are always inferred — never annotated

```fc
let double = (x: int32) -> x * 2    // return type inferred as int32
let n = alloc(node)!                 // inferred as node*
let x = default(int32?)              // inferred as int32?
let x = some(42)                     // inferred as int32?
```

### Two-Pass Compilation

The two compiler passes correspond directly to the statement / expression divide. The first pass processes all top-level statements — collecting names, types, struct layouts, and module structure — without evaluating any expressions. The second pass type-checks all expressions with the full top-level environment available.

This means top-level bindings can reference each other regardless of declaration order, and mutual recursion requires no special syntax. Inner bindings inside function bodies do not benefit from this — they are resolved left-to-right in the second pass, so a local binding can only reference bindings that appear before it in the same block.

## Operators & Access

### Precedence and Associativity

Operators are listed from highest to lowest precedence. Operators at the same level share the same precedence and associativity.

| Level | Operators | Associativity | Notes |
|-------|-----------|---------------|-------|
| 1 | `x!` &nbsp; `x[i]` &nbsp; `x.f` &nbsp; `x->f` | left | postfix — unwrap, index, member access |
| 2 | `-x` &nbsp; `!x` &nbsp; `~x` &nbsp; `&x` &nbsp; `*x` &nbsp; `(T)x` | right | unary prefix |
| 3 | `*` &nbsp; `/` &nbsp; `%` | left | multiplicative |
| 4 | `+` &nbsp; `-` | left | additive |
| 5 | `<<` &nbsp; `>>` | left | bitwise shift |
| 6 | `&` | left | bitwise AND |
| 7 | `^` | left | bitwise XOR |
| 8 | `\|` | left | bitwise OR |
| 9 | `==` &nbsp; `!=` &nbsp; `<` &nbsp; `>` &nbsp; `<=` &nbsp; `>=` | left | comparison — produce `bool`; `<` `>` `<=` `>=` also valid on pointers |
| 10 | `&&` | left | logical AND |
| 11 | `\|\|` | left | logical OR |
| 12 | `=` | right | assignment — mutable let bindings only |

> **Note**
> Bitwise operators (`&`, `^`, `|`) bind more tightly than comparison operators. This fixes C's well-known wart where `x & mask == 0` parses as `x & (mask == 0)`. In FC, `x & mask == 0` parses as `(x & mask) == 0`.

> **Note**
> Compound assignment operators (`+=`, `-=`, `*=`, `<<=`, etc.) are not supported. All assignment is plain `=`. This is a deliberate consequence of "one way to do things" — `x = x + 1` is the only way to write an increment. The redundancy in common loop patterns is a known cost, traded for a simpler grammar and a single assignment form.

### Binary Operators

| Operator | Valid on | Result type |
|----------|----------|-------------|
| `+` `-` `*` `/` | integer types, float types | same as operands (after widening) |
| `%` | integer types | same as operands (after widening) |
| `<<` `>>` | integer types | left operand type |
| `&` `^` `\|` | integer types | same as operands (after widening) |
| `==` `!=` | primitives, structs, unions, options, slices | `bool` |
| `<` `>` `<=` `>=` | integer types, float types, pointer types | `bool` |
| `&&` `\|\|` | `bool` only | `bool` |

Integer division truncates toward zero. `%` produces the remainder with the sign of the dividend.

### Integer overflow

Unsigned integer overflow wraps modulo 2ⁿ — this is C's existing guarantee and FC inherits it directly.

Signed integer overflow is also defined as two's complement wrapping for all signed integer types (`int8`, `int16`, `int32`, `int64`, `isize`). This diverges from C, where signed overflow is undefined behavior and the compiler is permitted to optimize on the assumption it never occurs — a source of subtle, dangerous bugs. FC eliminates this class of bug entirely.

In generated C, signed arithmetic is emitted as a cast through the unsigned equivalent for each type:

```c
// FC: let x = a + b   (a, b: int32)
int32_t x = (int32_t)((uint32_t)a + (uint32_t)b);

// FC: let x = a + b   (a, b: int64)
int64_t x = (int64_t)((uint64_t)a + (uint64_t)b);
```

Each signed type casts through its same-width unsigned counterpart — `int8` through `uint8_t`, `int16` through `uint16_t`, and so on. All signed integer types share the same two's complement layout as their unsigned counterparts — the cast is a reinterpretation of bits, not a computation. Unsigned addition is guaranteed to wrap in C, so the result is fully defined behavior on any C11 compiler with no additional flags required.

The consequences of wrapping are predictable and consistent:

- `int32.max + 1` → `int32.min`
- `int32.min - 1` → `int32.max`
- `int32.min * -1` → `int32.min` (the one asymmetry of two's complement)

> **Transpilation**
> The cast-through-unsigned pattern is applied to `+`, `-`, `*`, and `<<` on signed integer types. Division, comparison, and bitwise operators are unaffected — their signed and unsigned semantics already agree or overflow is not applicable.

### Shift semantics

When the shift amount equals or exceeds the bit width of the left operand, FC defines the result by masking the shift amount to the bit width — the shift amount is taken modulo the number of bits. This eliminates another class of C undefined behavior at zero runtime cost, since the masking matches what x86 and ARM hardware already do for variable shifts.

| Left operand width | Mask | Effect |
|---------------------|------|--------|
| 8-bit | `& 7` | shift amount mod 8 |
| 16-bit | `& 15` | shift amount mod 16 |
| 32-bit | `& 31` | shift amount mod 32 |
| 64-bit | `& 63` | shift amount mod 64 |

```fc
let a = 1i32 << 33     // equivalent to 1i32 << 1 — result is 2
let b = 1i32 << 32     // equivalent to 1i32 << 0 — result is 1
let c = 1i64 << 65     // equivalent to 1i64 << 1 — result is 2
```

> **Transpilation**
> The compiler emits an explicit mask on the shift amount: `a << (b & 31)` for 32-bit types, `a << (b & 63)` for 64-bit types, and so on. On targets where the hardware already masks, the C compiler's optimizer will typically eliminate the redundant mask.

### Structural Equality

`==` and `!=` work on all FC types using structural equality — values are compared by their contents, not by identity or address. The rules per type:

| Type | `==` behaviour |
|------|----------------|
| Primitives | value comparison |
| `T*` pointers | address comparison — pointed-to value is not dereferenced |
| `T?` options | both `none` → equal; one `none` → not equal; both `some` → compare inner values |
| Structs | field-by-field recursively, in declaration order |
| Unions | compare tags first; if tags match, compare the active variant's payload |
| Slices | compare `len` first; if equal, compare element-by-element |
| Function types | compare `fn_ptr` and `ctx` — both fields must be equal |

The unifying principle is that each type is compared by what it *represents* to the programmer. Value-like types (primitives, structs, unions, options, slices) compare contents. Reference-like types (`T*` pointers, function values) compare identity. A slice is a sequence of values — comparing two slices asks "are these the same sequence?" and follows the pointer to check element-by-element. A `T*` is an explicit indirection — comparing two pointers asks "do these refer to the same location?" and does not follow the pointer.

The compiler emits a comparison function for each struct and union type where `==` is used. For slices this is O(n) in the number of elements — equality on slice-containing types is not free.

**Float equality** — `==` on `float32` and `float64` follows IEEE 754 semantics: `NaN != NaN` (even for identical bit patterns) and `+0.0 == -0.0` (despite different bit patterns). This applies transitively — a struct containing a `float64` field uses IEEE 754 comparison for that field. As a consequence, equality for types containing float fields cannot be implemented as raw byte comparison; the compiler generates field-by-field comparison functions that use C's `==` for each primitive field.

**Pointer fields** — a `T*` field inside a struct is compared by address. Two structs whose `T*` fields point to different allocations containing identical data will compare as not-equal. This is intentional — following pointers arbitrarily would be untenable for circular structures. If you need deep equality across pointer boundaries, write an explicit comparison function.

**Function value equality** — two function values are equal if and only if they have the same `fn_ptr` and the same `ctx` pointer. This means two references to the same non-capturing lambda are equal (same `fn_ptr`, both null `ctx`), but two independently written lambdas with identical bodies are not — they compile to different C functions and therefore have different `fn_ptr` values. This is consistent with how pointer equality works elsewhere in FC — identity, not structural content.

```fc
let a = point { x = 1.0, y = 2.0 }
let b = point { x = 1.0, y = 2.0 }
a == b      // true — field-by-field

let s1 = "hello"
let s2 = "hello"
s1 == s2    // true — element-by-element

let a = shape.circle(3.14)
let b = shape.circle(3.14)
a == b      // true — tag and payload match

let p = alloc(shape.circle(3.14))!
*p == shape.circle(3.14)    // true — dereferences p, copies value, then compares
```

### Unary Operators

| Operator | Syntax | Valid on | Result type |
|----------|--------|----------|-------------|
| Negation | `-x` | signed integer types, float types | same type |
| Boolean not | `!x` | `bool` only | `bool` |
| Bitwise not | `~x` | integer types | same type |
| Address-of | `&x` | `let mut` bindings only | `T*` |
| Dereference | `*x` | `T*` | `T` |
| Cast | `(T)x` | numeric types | `T` |
| Unwrap | `x!` | `T?` | `T` — crashes at runtime if `none` |

### Implicit Widening

FC allows implicit widening conversions in binary expressions and comparisons where no information can be lost. When operands have different types, the narrower type is widened to match the wider:

| From | To |
|------|----|
| `int8` | `int16`, `int32`, `int64` |
| `int16` | `int32`, `int64` |
| `int32` | `int64` |
| `uint8` | `uint16`, `uint32`, `uint64`, `int16`, `int32`, `int64` |
| `uint16` | `uint32`, `uint64`, `int32`, `int64` |
| `uint32` | `uint64`, `int64` |
| `float32` | `float64` |

All other mixed-type expressions require an explicit cast. Integer-to-float conversions are always explicit — `int32` to `float64` is safe in range but can lose precision for large values.

```fc
let x = 42i32
let y = 100i64
let z = x + y           // x widened to int64, z is int64

let a = 10u8
let b = 200i32
let c = a + b           // a widened to int32, c is int32

let p = 1000000i32
let q = 3.14f64
let r = p + q           // compile error — explicit cast required
```

### Overloaded Tokens

Several tokens have multiple meanings distinguished by context:

| Token | Context | Meaning |
|-------|---------|---------|
| `*` | type context (suffix) | pointer type — `int32*` |
| `*` | expression context (prefix) | dereference — `*px` |
| `*` | expression context (binary) | multiplication — `a * b` |
| `&` | expression context (prefix) | address-of — `&x` |
| `&` | expression context (binary) | bitwise AND — `a & b` |
| `!` | expression context (prefix) | boolean not — `!flag` |
| `!` | expression context (postfix) | option unwrap — `val!` |
| `->` | expression context | pointer field access — `ptr->field` |
| `->` | type context | function type arrow — `(int32) -> int32` |
| `->` | match arm | match arm separator — `\| some(x) -> ...` |
| `..` | slice indexing | sub-slice range — `s[i..j]` |
| `..` | `for` range | iteration range — `for i in 0..n` |

## Runtime Failures

Several operations in FC can fail at runtime with no meaningful recovery path. These are **hard failures** — the program aborts immediately.

| Failure | Cause |
|---------|-------|
| Bounds check | Slice index or sub-slice range out of bounds |
| Option unwrap | `x!` on a `none` value |
| Division by zero | Integer division or remainder with a zero divisor |

All hard failures call `abort()` from the C standard library, which terminates the process immediately without unwinding, without running cleanup functions, and without flushing output buffers.

There is no exception handling and no recoverable failure path for these operations in this version of FC. Hard failures that have sufficient source context (option unwrap, assert) print a diagnostic to stderr before aborting — including the source file, line number, and the expression text that triggered the failure. Bounds checks and division-by-zero abort without diagnostic output.

**Division by zero** — integer division (`/`) and remainder (`%`) by zero are hard failures. This diverges from C, where integer division by zero is undefined behavior. FC makes it defined: the program aborts. Float division by zero follows IEEE 754 and produces `inf` or `nan` — it is not a hard failure.

> **Transpilation**
> Bounds checks emit a conditional `abort()` before the access. Option unwrap emits a tag check before the value read; on failure, it prints a diagnostic to stderr (`file:line: unwrap failed: expr`) before calling `abort()`. Division by zero emits a divisor check before the division. The compiler may elide checks it can prove unnecessary at compile time (constant indices within known bounds, divisors provably non-zero).

# PART 2 — Control Flow

## Control Flow Expressions

All control flow transfer mechanisms in FC — `return`, `return expr`, `break`, `break expr`, and `continue` — are expressions of type `void`. This is true even for `return expr` and `break expr`, which carry a value: the carried value determines the type of the *outer* construct they transfer control to (the enclosing function or loop), but the transfer expression itself is void within the block where it appears, because it never produces a local value — it exits.

This principle is what allows control flow transfers to appear in expression positions without disrupting the type system:

```fc
let f = (x: int32) ->
    if x > 0 then return "early exit"    // no else required — return is void
    do_something(x)
    "normal exit"
```

Here `return "early exit"` is void-typed within the `then` branch. Since void branches do not require `else`, the `if` expression is valid without one. The string `"early exit"` determines the return type of `f`, not the type of the `if` expression.

The same principle applies to `break value` in loops:

```fc
let result = loop
    if done() then break 42    // break 42 is void-typed here
    do_work()                   // void — side effect
```

`break 42` is void within the loop body — it does not produce a value in the local block. The `42` determines the type of the `loop` expression at the call site.

| Expression | Type within enclosing block | Determines type of |
|------------|---------------------------|-------------------|
| `return` | `void` | — |
| `return expr` | `void` | enclosing function |
| `break` | `void` | — |
| `break expr` | `void` | enclosing `loop` expression |
| `continue` | `void` | — |
| `defer expr` | `void` | — (schedules `expr` to run at block scope exit) |

---

## If Expressions

`if` is an expression. Both branches must return the same type. The `else` branch is required when the `if` expression produces a non-void value. When both branches are void-typed — or when there is no `else` — the expression is void. Branches are introduced at a deeper indentation level than the `if` keyword.

```fc
let max = if a > b then a else b

let label =
    if score >= 90 then "excellent"
    else if score >= 70 then "good"
    else "needs work"

if condition then
    do_something()     // void — no else required
```

---

## Match Expressions

`match` is an expression. The compiler enforces exhaustiveness — all variants must be covered. Inside a match, variant names may be used unqualified since the type is known from the match subject. All arms must return the same type. Match arms are introduced at a deeper indentation level than the `match` keyword.

```fc
match s with
| circle(r)    -> 3.14159 * r * r
| rectangle(d) -> d.width * d.height
| point        -> 0.0

match opt with
| some(x) -> x + 1
| none    -> 0
```

### Wildcard patterns

`_` matches anything without binding it. It can appear at any pattern position, or as a catch-all arm that satisfies exhaustiveness checking:

```fc
match s with
| circle(_) -> "it's a circle"
| _         -> "it's not a circle"
```

### Nested patterns

Patterns are recursive — any pattern position can contain a nested pattern:

```fc
match opt_shape with
| some(circle(r))       -> r * r * 3.14159
| some(rectangle(dims)) -> dims.width * dims.height
| some(_)               -> 0.0
| none                  -> 0.0
```

### Struct destructuring in patterns

Structs can be destructured in pattern position using `{ field = pattern }` syntax. Fields omitted from the pattern match anything:

```fc
match some_node with
| some({ value = 0 }) -> "found zero"
| some({ value = v }) -> "found other"
| none                -> "empty"

match some_node with
| some({ value = 0, next = none }) -> "zero with no next"
| some({ value = 0, next = _   }) -> "zero with a next"
| some({ value = v             }) -> "other value"
| none                            -> "empty"

match some_node with
| some({}) -> "it's a node"
| none     -> "empty"
```

### Pattern summary

| Pattern | Meaning |
|---------|---------|
| `_` | wildcard — matches anything, binds nothing |
| `name` | matches anything, binds value to name |
| `0`, `-1`, `42i64`, etc. | matches that exact integer literal value |
| `'a'`, `'\\n'` | matches that exact char value |
| `true`, `false` | matches that exact bool value |
| `"hello"` | matches a `str` value using structural (element-by-element) equality |
| `variant(pattern)` | matches variant, applies inner pattern to payload |
| `{ field = pattern }` | struct destructuring, omitted fields match anything |
| `{}` | matches any struct, binds nothing |

When matching on a union type, a bare identifier in pattern position is first checked against the union's no-payload variant names. If it matches a variant, it is a variant pattern (not a binding). If it does not match any variant, it is a binding pattern. This means variant names take precedence over bindings — you cannot bind a union value to a variable that shares a name with one of its no-payload variants.

Negative integer literals such as `-1`, `-42i8`, and `-100i64` are valid in pattern position. The `-` is part of the literal, not a unary operator — the parser treats a minus sign immediately followed by digits as a single integer literal token in pattern context.

Float literals and `cstr` literals are not valid in pattern position. Float equality is unreliable under IEEE 754 — a float literal pattern is almost certainly a bug. `cstr` equality is pointer comparison, not content comparison, so a `cstr` literal pattern would rarely do what the programmer intended. Both are compile errors.

```fc
// integer and bool literals
match status with
| -1   -> "error"
| 0    -> "ok"
| 1    -> "warning"
| _    -> "unknown"

match flag with
| true  -> do_thing()
| false -> skip()

// string literals — uses structural equality
match command with
| "help"    -> show_help()
| "quit"    -> exit()
| "version" -> show_version()
| _         -> unknown_command()
```

---

## Loops

FC has two looping constructs: `loop` and `for`.

### loop

`loop` is the primary looping construct. It is an expression and produces a value via `break value`. A loop with no value-producing break is void-typed.

```fc
// void loop — side effects only
loop
    if done then break
    do_work()

// loop as expression — type inferred from break value
let mut i = 0
let result = loop
    if i >= data.len then break default(int32?)
    if matches(data[i]) then break some(i)
    i = i + 1
```

A loop produces a value only via `break value`. Everything else in the loop body — including expressions with non-void return values — is evaluated for side effects, and any value is discarded. Fall-through at the bottom of the loop body simply begins the next iteration; it never produces a value.

`break value` is void-typed within the loop body (see §Control Flow Expressions) — the carried value determines the type of the `loop` expression at the call site, not the type of the `break` expression itself. All `break value` paths in a loop must agree on a type, and that type becomes the type of the loop expression.

### for

`for` iterates over slices and ranges. It is always void-returning — if a value needs to be produced from an iteration, use `loop` with `break value` instead. `for` is syntactic sugar — everything it can do can also be done with `loop`. It is the more convenient choice when a common iteration pattern applies cleanly.

Three forms are supported:

**Element iteration** — iterates over a slice, binding each element as a `let` binding:

```fc
for p in points
    process(p)
```

**Range iteration** — iterates over an integer range, exclusive of the upper bound:

```fc
for i in 0..10
    process(data[i])
```

The range `a..b` iterates from `a` up to but not including `b` — the same convention as sub-slice syntax `s[i..j]`. The type of the loop binding is inferred from the range endpoints using the standard widening rules. `0..10` gives `int32` (both default). `0..points.len` gives `int64` (`int32` widens to `int64`). Both endpoints must be integer types — float ranges are a compile error.

If the start exceeds or equals the end, the body executes zero times. This handles signed endpoints naturally — `for i in -5..5` iterates from -5 to 4.

The `..` syntax is only valid in `for` position and slice indexing position — it is not a general-purpose range expression and does not produce a value of any type.

**Index-element iteration** — iterates over a slice, binding both the index and the element:

```fc
for i, p in points
    if p.x == 0.0 then io.write("zero at index %d{i}\n", stdout)
```

The index type is inferred from the implicit range `0..slice.len`, following the same widening rules as explicit ranges — in practice this is always `int64`. The element is a copy, same as plain element iteration.

#### Copy semantics

Element iteration and index-element iteration copy the current element into the loop binding on each iteration. For slices of large structs, this copy may be significant. When per-element copies are undesirable — for example, when only one field of a large struct is needed — use range iteration with indexed access, or `loop` for full control:

```fc
// range iteration — no element copy
for i in 0..readings.len
    if readings[i].flags == 0u32 then continue
    process(readings[i])
```

#### Closures in `for` bodies

Closures created inside a `for` body may capture loop bindings. Since each binding is a fresh `let` per iteration and capture is by copy, each closure receives its own independent copy — there is no aliasing between iterations.

### Control flow

`break`, `break value`, and `continue` work in both `loop` and `for`, with one exception: `break value` is a compile error inside a `for` loop since `for` is always void-returning.

| Keyword | In `loop` | In `for` |
|---------|-----------|----------|
| `break` | exit loop, no value | exit loop early |
| `break value` | exit with value | compile error |
| `continue` | skip to next iteration | skip to next iteration |

```fc
// continue in loop — skip even numbers
let mut i = 0
loop
    i = i + 1
    if i % 2 == 0 then continue
    process(i)
    if i >= 9 then break

// break and continue in for
let mut result = default(point?)
for p in points
    if p.x < 0.0 then continue       // skip negative x
    if p.x == 0.0 then
        result = some(p)
        break                         // exit early
```

### Other loop forms

`while`, `do ... while`, and C-style `for(int i = 0; i < len; i++)` loops are not supported. FC's `for` covers common iteration patterns over slices and integer ranges. `loop` covers everything else — conditional loops, non-uniform steps, and any pattern that needs to produce a value:

```fc
// while-style
loop
    if not_ready() then break
    do_work()

// do-while-style
loop
    do_work()
    if done() then break

// non-uniform step — for only supports step-by-one
let buf = alloc(uint8[256] { })!
let mut i = 0
loop
    if i >= buf.len then break
    if buf[i] == 0u8 then break    // stop at null byte
    process(buf[i])
    i = i + 2                      // advance by two
```

> **Transpilation**
> All three `for` forms transpile to standard C `for` loops:
> ```c
> // for p in points (element iteration)
> for (int64_t _i = 0; _i < points.len; _i++) {
>     point p = points.ptr[_i];
>     // body
> }
>
> // for i in 0..n (range iteration)
> for (int32_t i = 0; i < n; i++) {
>     // body
> }
>
> // for i, p in points (index-element iteration)
> for (int64_t i = 0; i < points.len; i++) {
>     point p = points.ptr[i];
>     // body
> }
> ```
> For element iteration, `int64_t` is used for the internal loop counter, matching the slice `.len` type. This does not affect FC semantics. For range and index-element iteration, the counter is the user-visible binding `i`, typed according to the widening rules.
> `loop` transpiles to a C `while(1)` with `break` and `continue` mapping directly.

## Defer

`defer` ensures an expression runs when the enclosing block scope exits. Execution is deterministic — deferred expressions run in LIFO order at well-defined points with no runtime overhead.

```fc
let p = alloc(point { x = 1, y = 2 })!
defer free(p)
// ... use p ...
// free(p) runs at scope exit, regardless of exit path
```

**Semantics:**

| Property | Behavior |
|---|---|
| Scope | Block-scoped: function bodies, loop/for bodies, if/else blocks, match arm blocks, nested blocks |
| Order | LIFO — last defer registered runs first |
| Loops | Each iteration gets a fresh defer queue — defers are not cumulative |
| `return` | Unwinds all defers from innermost scope outward to function scope |
| `break`/`continue` | Unwinds defers from innermost scope to loop boundary |
| Return value | Discarded — any type is allowed; the expression runs for its side effects |
| Restriction | The deferred expression must not contain `return`, `break`, or `continue` |

### LIFO order

Multiple defers in one scope run in reverse order of registration:

```fc
let a = alloc(int32[8] {})!
defer free(a)
let b = alloc(int32[8] {})!
defer free(b)
// at scope exit: free(b) runs first, then free(a)
```

### Defer in loops

Defer in a loop body runs at the end of each iteration, not at function exit. This makes per-iteration cleanup correct without extracting a helper function:

```fc
for i in 0..n
    let f = open(paths[i])!
    defer close(f)       // closes at end of EACH iteration
    process(f)
// all files closed — no accumulation
```

### Unwinding

`return` from a nested scope unwinds all defers from inner to outer. `break` and `continue` unwind defers up to the enclosing loop scope.

```fc
let run = () ->
    defer cleanup_outer()
    if error_condition then
        defer cleanup_inner()
        return                // runs cleanup_inner, then cleanup_outer
```

> **Transpilation**
> Deferred expressions are emitted inline before every scope exit point in the generated C. For `return` with a value, the return expression is evaluated into a temporary, defers are emitted, then the temporary is returned.
