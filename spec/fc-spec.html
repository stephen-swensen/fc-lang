## Function Types

```fc
(int32, int32) -> int32           // takes two int32, returns int32
(str) -> bool                     // takes str, returns bool
() -> void                        // no parameters, returns void
(int32) -> (int32) -> int32       // returns a function
```

Function types transpile to C function pointers. When the function type appears in a position that may receive a closure (such as a function parameter), the compiler uses a fat function pointer — a function pointer paired with a `void*` context pointer. See §Closures & Capture for the full transpilation treatment.

> **Aside — function values and slices as fat pointers**
> Both slices and function values are two-word structs at the representation level. The similarity ends there.
>
> Slices are **transparent** about their internals — `.ptr` and `.len` are directly accessible, slices can be constructed from raw parts using struct literal syntax, and the fat pointer representation *is* the type from the programmer's perspective.
>
> Function values are **opaque** — the compiler never exposes `.fn_ptr` or `.ctx` as accessible fields. The only operation that matters is calling. This is intentional: a function value's internal layout is an implementation detail, and exposing it would be noise for the overwhelming majority of use cases and unsafe for the rest. Constructing a function value from raw parts is not supported.
>
> The one place this opacity is pierced is `&f` on a non-capturing function binding, which extracts the raw C function pointer for interop. This is not "address of the function value struct" — it reaches inside and pulls out a field — which means `&f` and `&s` are subtly different operations despite using the same syntax. `&f` is a narrow C interop escape hatch and rarely appears in FC code.

---

## Static Type Properties

Every type in FC has built-in static properties accessible via dot notation on the type name. These replace C's inconsistent collection of macros.

The dot notation `T.something` is not a special "static property" feature — it is simply module access syntax. The compiler implicitly provides a built-in module for each primitive type pre-populated with universal and type-specific properties. User-defined static properties on structs are just a module sharing the type's name (see §Module System).

A **type alias** is a symbolic stand-in for another type — it is not a new type. Because an alias is just another name for the same underlying type, it inherits all static properties, built-in module members, operators, and inference rules of that type without any additional specification. `str` is `uint8[]` and `str.none` is therefore valid for the same reason `uint8[].none` would be. Should any further alias syntax be added in future, this same rule applies: an alias always fully impersonates the aliased type at every level.

### Compiler-provided universals

Available on every type:

```fc
int32.none      // int32? with no value
node.none       // node? with no value
str.none        // str? with no value
```

### Type-specific built-ins

Available only on the types where they make sense — using them on other types is a compile error:

```fc
int32.min       // minimum representable value
int32.max       // maximum representable value
uint8.min       // 0
uint8.max       // 255
float64.nan     // not-a-number
float64.inf     // positive infinity
float32.nan
float32.inf
```

> **Transpilation**
> `T.min` / `T.max` transpile to the appropriate `INT32_MIN` / `INT32_MAX` style constants from `stdint.h`.

# PART 5 — Memory Management

## Memory Management

FC's memory model is manual — no garbage collector, no borrow checker. Memory lives either on the stack or the heap, and the programmer is responsible for managing heap allocations explicitly.

Four built-in compile-time operators handle memory-related operations that require compiler participation to resolve:

| Operator | Description |
|----------|-------------|
| `alloc(T)` | Heap-allocate and zero-initialize a value of type `T`, returning `T*?`. When `T` is a slice type `T[N]`, allocates `N` elements and returns `T[]?`. Also accepts a value expression — `alloc(expr)` — inferring the type from the expression and initializing the allocated memory with that value. |
| `free(ptr)` | Free a heap-allocated pointer or slice. When passed a slice, compiler emits `free(slice.ptr)`. |
| `default(T)` | Produce the default (zero-initialized) value of type `T` on the stack. |
| `sizeof(T)` | Return the size in bytes of type `T` as an `int64`. |

These are not functions — they cannot be stored in bindings or passed as arguments. They are resolved entirely at compile time.

`alloc`, `free`, `sizeof`, and `default` are **reserved identifiers** — they cannot be used as user-defined binding or function names anywhere in FC code. Attempting to define a binding with one of these names is a compile error. This ensures that bare calls to these operators are always unambiguous, regardless of what names are in scope.

The idiomatic name for a type's cleanup function is `drop` — a convention borrowed from Rust. `T.drop` should free any heap memory the value owns and release any other resources it holds (file handles, connections, and so on). Nothing in the language enforces this name, but it is the expected convention.

---

## Default Values

Every FC type has a well-defined default value, produced by zero-initializing its memory. This is what both `default(T)` on the stack and `alloc(T)` on the heap produce.

```fc
let x = default(int32)     // 0
let f = default(float64)   // 0.0
let b = default(bool)      // false
let s = default(str)       // empty slice — { ptr = null, len = 0 }
let p = default(point)     // point { x = 0.0, y = 0.0 }
let o = default(int32?)    // int32.none
let n = sizeof(int32)      // 4 — int64
```

Default values by type category:

| Type | Default |
|------|---------|
| Integer types | `0` |
| Float types | `0.0` |
| `bool` | `false` |
| `T?` | `none` |
| `T*?` | `none` |
| Slices (`T[]`) | Empty slice — `{ ptr = null, len = 0 }`. Safe because bounds checking prevents indexing into a zero-length slice. |
| Structs | Zero bytes across all fields — each field holds whatever zero means for its type at its memory offset. No construction occurs. |
| Unions | Zero bytes — tag field is 0, which maps to the first declared variant. Payload bytes are also zero. The resulting value is a valid union of the first variant with zeroed payload memory. |
| `T*` | Zero bytes — physically null. The programmer is responsible for initializing raw pointer fields before use. |
| Function types | Zero bytes — null `fn_ptr` and null `ctx`. Calling a zero-initialized function value will crash. The programmer is responsible for initializing function-typed fields before calling them. |

> **Note on unions**
> The first-variant convention means the programmer controls what `default(T)` produces for a union by ordering variants intentionally. If no variant is a sensible default, the programmer should avoid relying on `default` for that union and initialize explicitly instead.

**Raw pointer and function-typed fields** — both `default(T)` and `alloc(T)` are zero-initialization under the hood. For types containing raw `T*` fields or function-typed fields, zero-init produces physically null bytes. The programmer is responsible for writing valid values to those fields before dereferencing or calling them, regardless of whether the value lives on the stack or the heap.

---

## Stack Allocation

Stack memory is allocated implicitly when a binding is declared. All stack bindings must be initialized at declaration — FC never emits an uninitialized C local variable.

```fc
let x = 42                           // stack int32, initialized to 42
let p = point { x = 1.0, y = 2.0 }  // stack struct, explicitly initialized
let p = default(point)               // stack struct, zero-initialized
let buf = int32[128] { }             // stack slice, zero-initialized
let rgb = uint8[3] { 255, 0, 128 }  // stack slice, exhaustive element list
```

Stack slices are backed by a compiler-generated C array. The slice binding is the only thing the programmer interacts with — the backing array is an implementation detail.

`N` in `T[N]` must be a compile-time integer literal for stack-allocated slices. FC does not emit C variable-length arrays (VLAs) — they were made optional in C11 and are absent or unreliable on many embedded compilers. For heap-allocated slices (`alloc(T[N])`), `N` may be a runtime value since `calloc` accepts a runtime count.

> **Transpilation**
> `int32[128] { }` transpiles to `int32_t _buf[128] = {0}` plus a slice struct `{ .ptr = _buf, .len = 128 }`. `default(point)` transpiles to `point p = {0}`.

**Lifetime** — all local bindings share the stack frame of their enclosing function. A pointer or slice into stack memory is valid for the duration of the function call and must not escape it. Returning a stack-allocated pointer or slice, or storing it in heap memory that outlives the call, produces a dangling pointer. Use heap allocation for data that must outlive a function call.

> **Warning — stack slice escape**
> Stack slices are particularly prone to silent escape bugs because a slice is a value type — it can be passed to functions, stored in structs, and returned, all without any syntactic indication that it contains a pointer into stack memory. Returning a stack-allocated slice is a compile error. Other escape paths — storing a stack slice into heap memory, wrapping it in an option that outlives the function — are not currently detected and are undefined behavior:
> ```fc
> let buf = int32[128] { }
> return buf                    // compile error — stack slice cannot be returned
> heap_struct->data = buf       // undefined behavior — not detected
> some(buf)                     // undefined behavior if result outlives function — not detected
> ```
> The safe rule: a stack-allocated slice must not outlive the function that created it. If you need a slice to outlive the function, use `alloc`.

---

## Heap Allocation

```fc
let n = alloc(node)          // returns node*? — may fail
let n = alloc(node)!         // unwrap — crash on failure
let buf = alloc(node[128])   // heap-allocated slice of 128 nodes, returns node[]?
free(ptr)                    // free a heap-allocated pointer
free(buf)                    // free a heap-allocated slice — compiler emits free(buf.ptr)
```

`alloc(T)` transpiles to `calloc(1, sizeof(T))`. `alloc(T[N])` transpiles to `calloc(N, sizeof(T))` and wraps the result in a slice with `len = N`. Memory is always zero-initialized. `free` on a slice transpiles to `free(slice.ptr)`.

`alloc` and `free` require a hosted environment or an embedded target with a heap allocator. They are unavailable on bare-metal targets and are a compile error if used there. See §Build Targets.

### Initialized alloc

`alloc` also accepts a value expression instead of a bare type name. The type is inferred from the expression, memory is allocated and zero-initialized, then the value is written in. This combines allocation and initialization into a single expression.

**Struct literal** — partial construction allowed, unspecified fields remain zero:

```fc
let p = alloc(point3d { x = 2, y = 3, z = 4 })!
let p = alloc(point3d { x = 2, z = 4 })!        // y defaults to 0
```

**Union variant:**

```fc
let s = alloc(shape.circle(3.14))!
let r = alloc(parse_outcome.success(42))!
```

**Slice literal** — same rules as stack slice initialization. Length is always required and the element count must match exactly:

```fc
let buf = alloc(int32[4] { 1, 2, 3, 4 })!   // heap slice, length 4
let buf = alloc(int32[4] { })!               // heap slice, all zeros — same as alloc(int32[4])
```

In all cases the return type is the same as the zero-init form — `T*?` for structs and unions, `T[]?` for slices.

> **Transpilation**
> `alloc(point3d { x = 2, z = 4 })` transpiles to `calloc(1, sizeof(point3d))` followed by a compound literal assignment `*_p = (point3d){ .x = 2, .z = 4 }`. `alloc(int32[4] { 1, 2, 3, 4 })` transpiles to `calloc(4, sizeof(int32_t))` followed by element assignments. Both are conditional on the allocation succeeding.

### Initialization after alloc

When using the zero-init form, there are two idiomatic ways to initialize fields afterward.

**Field-by-field** — useful when only some fields differ from their defaults:

```fc
let p = alloc(point3d)!
p->x = 2
p->z = 4
// y remains 0 — already zero-initialized by alloc
```

**Whole-struct assignment** — write a struct literal through the pointer with `*p = ...`:

```fc
let p = alloc(point3d)!
*p = point3d { x = 2, y = 3, z = 4 }

// partial construction also works — unspecified fields default to 0
*p = point3d { x = 2, z = 4 }
```

> **Transpilation**
> `*p = point3d { x = 2, z = 4 }` transpiles to `*p = (point3d){ .x = 2, .z = 4 }` — a C99 compound literal assigned through a pointer dereference.

# PART 6 — I/O & Formatting

## std::io — File I/O

`std::io` is a standard library module written in regular FC. It provides file I/O operations using `any*` handles — file handles are not a special type in FC, they are opaque pointers like any other C resource (database connections, thread handles, etc.).

```fc
import io from std::
```

### Constants

| Constant | Type | Description | C equivalent |
|----------|------|-------------|--------------|
| `io.stdout` | `any*` | Standard output stream | `(void*)stdout` |
| `io.stderr` | `any*` | Standard error stream | `(void*)stderr` |

### Operations

```fc
io.open(path: str, mode: str) -> any*?
io.close(f: any*) -> void
io.read(f: any*, buf: uint8[]) -> str
io.write(f: any*, data: str) -> int64
io.flush(f: any*) -> void
```

**`io.open`** — opens a file at the given path with the given mode. Returns `any*?` — `none` on failure. Mode strings follow C conventions: `"r"` (read), `"w"` (write/truncate), `"a"` (append), `"rb"` (read binary), etc. Both arguments accept `str` — the compiler ensures null-termination at the C boundary (see transpilation note below).

Since `any*?` uses null-sentinel optimization (same as `T*?`), the option wrapper is zero-cost — `none` is just a null pointer.

```fc
import io from std::

let f = io.open("data.txt", "r")
match f with
| none    -> eprint("failed to open file\n")
| some(f) ->
    // use f
    io.close(f)
```

**`io.close`** — closes the file. Using a file handle after closing it is undefined behavior.

**`io.read`** — reads up to `buf.len` bytes from the file into the provided buffer. Returns a `str` sub-slice of `buf` covering the bytes actually read. An empty slice (length 0) indicates end-of-file or error.

```fc
let mut buf = uint8[1024] { }
let data = io.read(f, buf)
if data.len == 0 then
    eprint("EOF or error\n")
```

**`io.write`** — writes the contents of `data` to the file. Returns the number of bytes written as `int64`. A short write (return value less than `data.len`) indicates an error.

```fc
io.write(f, "hello world\n")
```

**`io.flush`** — flushes buffered output to the underlying file. Relevant for files opened in buffered mode. `stdout` is line-buffered by default; `stderr` is unbuffered.

> **Transpilation**
> All `io` handles are `any*` in FC and cast to/from `FILE*` at the C boundary.
>
> When a `str` argument must be passed to a C function that expects a null-terminated string, the compiler emits a stack copy with a null terminator appended. The copy is unconditional — reading past the slice boundary to check for an existing null byte would be unsafe (the memory may not be owned, and even if it is, another thread could mutate it). For functions like `io.open` the cost of a small `memcpy` is negligible next to the underlying syscall.
>
> This only applies to arguments that become C strings (`char*`) — namely the `path` and `mode` parameters to `io.open`. Data-oriented operations like `io.read` and `io.write` use length-based C functions (`fread`/`fwrite`) that take a pointer and a byte count directly, so `str` arguments pass through with no copy and no null-termination overhead, regardless of size.
> ```c
> // io.open(path, mode) — path and mode are str
> // compiler emits null-terminated stack copies:
> char _path_buf[/*path.len+1*/];
> memcpy(_path_buf, path.ptr, path.len);
> _path_buf[path.len] = '\0';
> // (same pattern for mode)
> void* f = (void*)fopen(_path_buf, _mode_buf);
>
> // io.read(f, buf) — reads into buf, returns sub-slice
> size_t _n = fread(buf.ptr, 1, buf.len, (FILE*)f);
> // result is (fc_slice_uint8){ .ptr = buf.ptr, .len = (int64_t)_n }
>
> // io.write(f, data)
> size_t _n = fwrite(data.ptr, 1, data.len, (FILE*)f);
>
> // io.close(f)
> fclose((FILE*)f);
>
> // io.flush(f)
> fflush((FILE*)f);
>
> // io.stdout / io.stderr
> void* io_stdout = (void*)stdout;
> void* io_stderr = (void*)stderr;
> ```

> **Note on `print`/`eprint`**
> The `print` and `eprint` operators write to stdout and stderr directly — they do not require importing `std::io`. They are reserved compiler operators, not `io` module functions.

---

## std::sys — System Operations

`std::sys` is a standard library module providing access to environment variables, process control, and time. Like `std::io`, it is written in regular FC and wraps C standard library functions.

```fc
import sys from std::
```

### Operations

```fc
sys.env(name: str) -> str?
sys.exit(code: int32) -> void
sys.time() -> int64
sys.sleep(ms: int64) -> void
```

**`sys.env`** — reads the environment variable with the given name. Returns `str?` — `none` if the variable is not set. The returned `str` is a view into process memory (from C's `getenv`), valid for the lifetime of the process unless the environment is modified. The `name` argument receives the same null-termination treatment as `io.open`'s path argument — an unconditional stack copy with a null byte appended.

```fc
import sys from std::

match sys.env("HOME") with
| none       -> eprint("HOME not set\n")
| some(home) -> print("home: %s\n", home)
```

**`sys.exit`** — terminates the process immediately with the given exit code. The return type is `void` but the function never returns. After `sys.exit`, no destructors, deferred operations, or further code execute.

```fc
if fatal_error then sys.exit(1)
```

**`sys.time`** — returns the current wall-clock time as milliseconds since the Unix epoch (`int64`). Wraps `clock_gettime(CLOCK_REALTIME)` on POSIX systems.

```fc
let start = sys.time()
do_work()
let elapsed = sys.time() - start
print("took %d ms\n", elapsed)
```

**`sys.sleep`** — pauses execution for the given number of milliseconds. Wraps `nanosleep` on POSIX systems.

```fc
sys.sleep(1000)    // sleep for 1 second
```

> **Transpilation**
> ```c
> // sys.env(name) — name is str, stack-copy for null termination
> char _name_buf[/*name.len+1*/];
> memcpy(_name_buf, name.ptr, name.len);
> _name_buf[name.len] = '\0';
> char* _val = getenv(_name_buf);
> // result: _val == NULL → none, otherwise some({ .ptr = (uint8_t*)_val, .len = strlen(_val) })
>
> // sys.exit(code)
> exit(code);
>
> // sys.time()
> struct timespec _ts;
> clock_gettime(CLOCK_REALTIME, &_ts);
> int64_t _ms = (int64_t)_ts.tv_sec * 1000 + (int64_t)_ts.tv_nsec / 1000000;
>
> // sys.sleep(ms)
> struct timespec _req = { .tv_sec = ms / 1000, .tv_nsec = (ms % 1000) * 1000000 };
> nanosleep(&_req, NULL);
> ```

---

## Formatted Output

Four built-in operators provide type-safe formatted output using printf-style format strings. These are compile-time operators — like `alloc` and `sizeof`, they are resolved by the compiler, cannot be stored in bindings, and cannot be passed as arguments.

| Operator | Destination | Returns |
|----------|-------------|---------|
| `print(fmt, args...)` | `stdout` | `void` |
| `eprint(fmt, args...)` | `stderr` | `void` |
| `fprint(f, fmt, args...)` | an `any*` file handle | `void` |
| `sprint(buf, fmt, args...)` | caller-provided `uint8[]` buffer | `str` — sub-slice of bytes written |

The format string `fmt` is a `str` value (not `cstr`). All standard printf format specifiers are supported — `%d`, `%x`, `%04d`, `%.2f`, `%s`, `%%`, and so on.

```fc
print("hello %s, you are %d years old\n", name, age)
eprint("error: %s\n", msg)

import io from std::
let f = io.open("log.txt", "w")!
fprint(f, "event %d: %s\n", id, description)
io.close(f)

let mut buf = uint8[256] { }
let msg = sprint(buf, "x = %d, y = %d", x, y)
```

### Compile-time format checking

The compiler parses the format string at compile time and validates each format specifier against the corresponding argument's type. A mismatch is a compile error:

```fc
let x = 42
print("value: %s\n", x)    // compile error — %s expects str or cstr, got int32
print("value: %d\n", x)    // ok
```

The compiler checks:

| Specifier | Valid argument types |
|-----------|-------------------|
| `%d`, `%i` | all integer types |
| `%u`, `%x`, `%X`, `%o` | all integer types |
| `%f`, `%e`, `%E`, `%g`, `%G` | `float32`, `float64` |
| `%s` | `str`, `cstr` |
| `%c` | `char` |
| `%p` | any pointer type (`T*`, `any*`) |
| `%%` | — (literal percent, no argument consumed) |

Width, precision, and flag modifiers (`%04d`, `%-20s`, `%.2f`) are passed through to the C format string unchanged. The compiler validates the base specifier only.

### Transparent str handling

When `%s` is used with a `str` argument, the compiler automatically expands it to `%.*s` and passes the length and pointer — no manual `.ptr` or null-termination required:

```fc
let name = "world"
print("hello %s\n", name)
// compiler emits: printf("hello %.*s\n", (int)name.len, name.ptr)
```

When `%s` is used with a `cstr` argument, the compiler emits plain `%s`:

```fc
let name = c"world"
print("hello %s\n", name)
// compiler emits: printf("hello %s\n", name)
```

This means `%s` always does the right thing regardless of which string type is passed.

### sprint

`sprint` writes formatted output into a caller-provided `uint8[]` buffer and returns a `str` sub-slice covering the bytes actually written (not including the null terminator). If the output exceeds the buffer size, it is truncated — matching `snprintf` behavior.

```fc
let mut buf = uint8[64] { }
let msg = sprint(buf, "point(%d, %d)", x, y)
// msg is a sub-slice of buf — no allocation occurred
```

The returned sub-slice shares memory with `buf`. The programmer is responsible for the buffer's lifetime. To detect truncation, compare `msg.len` against `buf.len - 1` — if equal, the output may have been clipped.

> **Transpilation**
> The four operators map to C's printf family:
> ```c
> // print("x = %d\n", x) — str format string
> printf("x = %d\n", x);
>
> // eprint("error: %s\n", msg) — msg is str
> fprintf(stderr, "error: %.*s\n", (int)msg.len, msg.ptr);
>
> // fprint(f, "event %d\n", id) — f is any*
> fprintf((FILE*)f, "event %d\n", id);
>
> // sprint(buf, "x = %d", x)
> int _n = snprintf(buf.ptr, buf.len, "x = %d", x);
> if (_n < 0) _n = 0;
> if (_n > buf.len - 1) _n = buf.len - 1;
> // result is (fc_slice_uint8){ .ptr = buf.ptr, .len = (int64_t)_n }
> ```
> The format string itself is always emitted as a C string literal or passed via `.ptr` — the compiler ensures null termination for the format string argument at the C boundary. Format specifiers for `str` arguments are rewritten from `%s` to `%.*s` with the corresponding length and pointer arguments inserted.

# PART 7 — Program Structure

## Module System & Visibility

Modules are logical organizational units, fully contained within a single file. Multiple modules may exist in one file. The same module name may not be declared more than once within the same namespace across the build.

```fc
// file: geometry.fc

module math =
    let add = (a: int32, b: int32) -> a + b

module shapes =
    struct point =
        x: float64
        y: float64

// top-level — file-scoped private, not importable
let helper = (x: int32) -> x * 2
```

Module names are flat — `module math` inside any file declares a module named `math`. The filename has no effect on module naming.

### Namespaces

A file may optionally declare a namespace as its first line, before any `import` or `module` declarations. Namespaces group modules across files and prevent name collisions between independently developed code.

```fc
namespace acme::
namespace acme::graphics::
namespace acme::graphics::rendering::
```

A namespace name consists of one or more `::` separated segments and always ends with a trailing `::`. The trailing `::` is what syntactically distinguishes a namespace from a module everywhere it appears. Namespace names may be arbitrarily deep, though shallow is idiomatic — a company or product name is usually sufficient.

**Files with no namespace declaration are in `global::`** — the implicit default namespace. This is the normal case for application code. Vendor libraries should always declare a namespace to avoid collisions.

Namespaces have no presence in code beyond import and namespace declarations — they are purely an organizational and disambiguation mechanism. You cannot access a namespace by name in an expression.

### Visibility

Everything declared inside a module is public by default. Use `private` to hide a symbol from importers.

```fc
module math =
    let add = (a: int32, b: int32) -> a + b    // public

    private let clamp = (x: int32, lo: int32, hi: int32) ->
        if x < lo then lo
        else if x > hi then hi
        else x
```

Top-level declarations outside any module block are always file-scoped private. The `private` keyword is not needed or meaningful there.

`private` applies to all declarable things — functions, structs, union types, and nested modules.

### Importing

The `from` clause locates the source of the import. Its right-hand side is either a bare namespace (ending in `::`) or a qualified module name (namespace path followed by a module, optionally dotted into submodules). `global::` is the implicit namespace when no `from` clause is given or when `from global::` is written explicitly.

The left-hand side is what comes into scope — a module, submodule, or symbol — with an optional `as` alias. The namespace is consumed at the import site and never appears in code.

**Same-namespace imports** — `global::` is implicit, no qualification needed:

```fc
import module_a                                       // imports module_a from global::
import module_a from global::                         // equivalent
import module_a as m_a                                // alias
import func_a from module_a                           // symbol from global::module_a
import func_a from global::module_a                   // equivalent
import func_a as f_a, func_b as f_b from module_a    // multiple with aliases
import module_a.module_b                              // submodule — available as module_b
import module_b from module_a                         // equivalent
import * from module_a                                // everything public in module_a
```

**Cross-namespace imports** — namespace path required in `from`:

```fc
import module_a from acme::graphics::                 // module from named namespace
import module_b from acme::graphics::module_a         // submodule
import acme::graphics::module_a.module_b              // equivalent — available as module_b
import module_a as m_a from acme::graphics::          // alias
import func_a from acme::graphics::module_a           // symbol from named module
```

**Syntax rules:**
- `::` separates namespace segments and terminates a namespace path
- `.` navigates into modules and submodules — module territory only
- A path ending in `::` is a namespace; a path not ending in `::` is a module or symbol
- `import *` works on modules only — you cannot wildcard-import from a bare namespace

`import T from M` brings both the type `T` and the module `T` (if it exists) into scope together. There is no need to import them separately.

Circular references between modules are not allowed — whether via `import` or direct qualified access. If module A references anything in module B, module B may not reference anything in module A, directly or transitively. This applies even when both modules are defined in the same file. The compiler detects cycles during the first pass and reports them as compile errors.

If two types need mutual pointer references, they must live in the same module — intra-module mutual recursion via pointer fields is always valid (see §Structs).

### Type-associated modules

A module may share a name with a type defined in the same scope. This is the idiomatic way to define static properties and constructors for a type — there is no separate language feature for this. The dot notation `vec2.zero` is simply module access.

```fc
module geometry =

    struct vec2 =
        x: float64
        y: float64

    module vec2 =
        let zero = vec2 { x = 0.0, y = 0.0 }
        let from_angle = (angle: float64) -> vec2 { x = cos(angle), y = sin(angle) }
```

Inside `module vec2`, the `vec2` struct is visible because it was defined in the enclosing lexical scope. Outside, `vec2 { ... }` is unambiguously struct construction and `vec2.zero` is unambiguously module access — the parser distinguishes these by context.

### Multi-file builds

All `.fc` files involved in a build are passed to the compiler together. The compiler accepts individual files, glob patterns, or directories (non-recursive):

```
fc build main.fc
fc build src/*.fc
fc build src/
fc build src/*.fc vendor/acme/*.fc vendor/widget/*.fc
```

The first compiler pass scans all provided files, collects every namespace and module declaration, and builds a global module map before any type-checking occurs. This means modules can reference each other regardless of file order, and mutual recursion across files requires no special syntax.

**Duplicate module names** within the same namespace across different files are a compile error. Module names in different namespaces never conflict — `acme::graphics::` and `widget::ui::` can both contain a module named `renderer` without collision.

**Vendor libraries** are distributed as source — `.fc` files with a namespace declaration. They are included in the build the same way as any other file. The namespace prevents their module names from colliding with application code or other vendors:

```
fc build src/*.fc vendor/acme/graphics/*.fc vendor/widget/ui/*.fc
```

### Transpilation note

The entire module and namespace system is a compiler-time concept — none of it has any runtime representation in the generated C output. This is an important guiding principle for compiler implementation:

- **Namespaces** — erased entirely. They exist only in the compiler's module map during the first pass.
- **Modules** — become C symbol prefixes. `vec2.add(a, b)` transpiles to a call like `geom_vectors_vec2_add(a, b)`. The dot notation is purely a source-level convenience.
- **`import`** — becomes nothing in the output. It informs the compiler which declarations are in scope; the transpiled C either uses `#include` for extern declarations or assumes all generated code compiles together as a single translation unit.
- **`private`** — module-private symbols become `static` in C where file scope allows it, or are simply excluded from generated headers. Top-level file-private declarations are already `static` by nature.
- **Type-associated modules** — pure naming convention in the C output. `vec2.zero` is a prefixed global constant; `vec2.add` is a prefixed function. No vtable, no struct, no indirection.

The result is that FC provides enforced module structure, namespace isolation, visibility control, and type-associated namespacing at zero runtime cost. The C compiler sees well-named, flat, idiomatic C. This property should be preserved in all future work on the module system — any new feature that would require a runtime representation in C needs strong justification.

---

## Conditional Compilation

FC supports compile-time conditional compilation via `#if`, `#else if`, `#else`, and `#end` directives. These allow code to be included or excluded at compile time based on named flags, without resorting to a text-substitution preprocessor.

### Directives

Directives always appear at **column 0**, regardless of the surrounding indentation level. This keeps them visually distinct from regular code and avoids ambiguity with the offside rule.

```
#if flag_name
#else if other_flag
#else
#end
```

### Flags

Flags are simple names — either set or not set. There are no valued flags. Two categories:

**Built-in target flags** — automatically set by the compiler based on the build target:

| Flag | Set when |
|------|----------|
| `target_hosted` | Building for hosted target (default) |
| `target_embedded` | Building for embedded target with allocator |
| `target_bare_metal` | Building for bare-metal target |

**User-defined flags** — passed on the command line:

```
fc build --flag debug main.fc
fc build --flag feature_x --flag debug main.fc
```

### Usage

`#if` works at both top-level scope and inside expression blocks. Inactive branches are parsed and syntax-checked but not type-checked — structural errors in inactive branches are caught, but type errors are not.

Top-level usage — conditionally including declarations, imports, and definitions:

```fc
#if target_hosted
import libc
#end

#if debug
let log = (msg: str) -> libc.printf(msg.ptr)
#else
let log = (msg: str) -> return
#end
```

Expression-level usage — conditionally including statements inside a function body:

```fc
let process = (data: uint8[]) ->
#if debug
    libc.printf(c"processing\n")
#end
    do_work(data)    // still in function body — same indentation level as the #if block contents
```

Chaining with `#else if`:

```fc
#if target_hosted
let platform = "hosted"
#else if target_embedded
let platform = "embedded"
#else
let platform = "bare-metal"
#end
```

### Rules

- Directives must always be at column 0 — a directive at any other column is a compile error.
- `#if` and `#end` must be matched. An unclosed `#if` is a compile error.
- `#else` and `#else if` must appear between a matching `#if` and `#end`.
- Nesting is allowed — `#if` blocks may contain other `#if` blocks.
- Inactive branches are syntax-checked but not type-checked.

---

## Build Targets

FC is designed to support multiple deployment targets beyond standard hosted environments. The build target determines what runtime facilities are available to the program, and automatically sets the corresponding built-in conditional compilation flag (see §Conditional Compilation).

**Hosted** (default) — the standard target for desktop, server, and general-purpose programs. Full libc is available. `alloc` and `free` work automatically. `import libc` exposes the full C standard library. `alloc` uses `calloc`, guaranteeing zero-initialized heap memory. Sets the `target_hosted` flag.

```
fc build src/
fc build src/*.fc vendor/acme/*.fc
```

**Embedded with allocator** — targets like Arduino Uno and ESP32 where `malloc` and `free` are available but the rest of libc is absent or limited. `alloc` and `free` still work. `import libc` only exposes functions available on the target — the compiler warns if unavailable functions are used. Where `calloc` is available, `alloc` uses it directly. Where it is not, the compiler emits `malloc` + `memset` to achieve the same zero-initialization guarantee. On these targets heap allocations are typically small and infrequent, so the `memset` overhead is negligible. Sets the `target_embedded` flag.

```
fc build --target arduino-uno src/*.fc
fc build --target esp32 src/*.fc
```

**Bare metal / no allocator** — targets like ATtiny or custom hardware where no heap allocator is available and memory is severely constrained. `alloc` and `free` are unavailable — using them is a compile error. Programs must be entirely stack-based. Stack allocation is always zero-initialized via C declaration syntax, which works identically on all targets and requires no runtime support. This is analogous to Rust's `no_std` mode. Sets the `target_bare_metal` flag.

```
fc build --target bare-metal src/*.fc
```

Target definitions specify the available libc subset, pointer width, endianness, and other platform characteristics. The compiler uses this to enforce correct usage at compile time rather than producing code that fails silently at runtime.

# PART 8 — C Interop

## C Interop

C library bindings are declared using `extern` inside a module that names the C library source. The programmer is responsible for correct type mapping.

> **Note on `from` in module declarations**
> The `from "..."` in `module libc from "libc.so"` is distinct from the `from` used in import statements. Here `from` binds the module to a C library source — a string literal naming the shared library or object file. It is only valid in module declarations containing `extern` bindings. It has nothing to do with namespace-qualified imports.

```fc
module libc from "libc.so" =
    extern printf:  (cstr, ...) -> int32
    extern free as c_free: (any*) -> void
    extern malloc:  (int64) -> any*?
    extern memcpy:  (any*, any*, int64) -> any*
    extern strlen:  (cstr) -> int64
    extern fopen:   (cstr, cstr) -> any*?
```

> **Note on the libc module**
> The declarations above are illustrative. `free` is declared as `c_free` because `free` is a reserved identifier in FC — see §Reserved identifiers and `extern as`. `any*` is used where C uses `void*` — see §any* — opaque pointers. The `int64` parameters for `malloc`, `memcpy`, and `strlen` map C's `size_t` — the principle is to use a reasonable signed upper bound that is never incorrect, so that FC's `int64` lengths pass through without casts. The compiler emits casts to `size_t` at the C boundary. In practice, common libc bindings ship with the FC compiler as pre-written `extern` declarations and most programs only need to `import libc`.

### Reserved identifiers and `extern as`

FC reserves `alloc`, `free`, `sizeof`, and `default` as built-in operator names — they cannot be used as user-defined binding names anywhere in FC code. This creates a conflict when importing C functions that share these names. `free` is the most common case.

The `extern as` form resolves this by binding the C function under a different name in the FC module:

```fc
module libc from "libc.so" =
    extern free as c_free: (any*) -> void   // C's free, available as libc.c_free
```

The string after `as` becomes the FC-visible name. The original C symbol name is used in the generated C output. This follows the same `as` aliasing convention already used in import statements.

In practice, `extern free as c_free` is essentially never needed. FC's built-in `free` operator emits C's `free()` in the generated output and works on any heap pointer regardless of whether it was allocated via FC's `alloc` or `libc.malloc` — at the C level it is the same allocator. If a C API requires `free` as a function pointer value, a wrapper lambda suffices:

```fc
let mut free_fn = (ptr: any*) -> free(ptr)   // (any*) -> void — addressable, passable
```

The `extern as` form is shown here for completeness and is more relevant when a C library has a function named `alloc`, `sizeof`, or `default`.

### Variadic C functions

Some C functions accept a variable number of arguments — `printf`, `sprintf`, `fprintf` being the most common. FC has no variadic functions and cannot define them: the directional inference model requires every parameter to have a declared type, which variadics by definition cannot provide.

For C interop, variadic C functions are declared using `...` as a terminal parameter:

```fc
module libc from "libc.so" =
    extern printf:  (cstr, ...) -> int32
    extern sprintf: (cstr, cstr, ...) -> int32
    extern fprintf: (any*, cstr, ...) -> int32
```

At a call site, arguments beyond the declared typed parameters are passed through without type-checking — the same trust-the-programmer stance FC takes on all C interop sharp edges:

```fc
libc.printf(c"value: %d\n", x)
libc.printf(c"%s has %d items\n", name.ptr, count)
```

FC-defined functions cannot use `...`. If a programmer needs a variable number of arguments in FC code, the idiomatic approach is a slice parameter:

```fc
let log = (parts: str[]) ->
    for p in parts
        libc.printf(c"%.*s", p.len, p.ptr)
    libc.printf(c"\n")

log(str[2] { "value is: ", int_to_str(x) })
```

This is fully type-safe and consistent with the inference model.

### Null return values from C

C functions that can return null must be declared with a `?` return type. This keeps null out of FC's type system — the programmer is forced to handle the absent case explicitly before using the value:

```fc
let buf = libc.malloc(1024)    // type is any*?
let ptr = buf!                 // unwrap — crash on null
// or
match buf with
| none     -> handle_failure()
| some(p)  -> use(p)
```

The programmer is responsible for correctly declaring which C functions can return null. Getting this wrong (declaring a nullable return as non-nullable) is the same class of bug as in C itself.

For C functions that signal failure via a sentinel integer value (such as `-1`), declare the return type as a plain integer and check the sentinel directly — do not use `?`:

```fc
module libc from "libc.so" =
    extern open: (cstr, int32) -> int32    // returns -1 on failure, not null

let fd = libc.open(c"file.txt", 0)
if fd == -1 then handle_error()
```

### Null arguments to C

If a C function accepts null for a pointer parameter, declare it as `T*?` and pass `T.none` or `some(ptr)` at the call site:

```fc
module libc from "libc.so" =
    extern pthread_create: (any*?, any*?, (any*) -> any*?, any*?) -> int32
    // thread function: (any*) -> any*? — receives and returns the user-data pointer
```

### Passing FC values to C

Higher-level FC types must be explicitly lowered at C call sites:

- `str` — pass `s.ptr` to get a `cstr`. Programmer is responsible for ensuring null termination.
- `cstr` — pass directly. Use `c"..."` literals for constant strings.
- `T?` — unwrap with `x!` or `match` before passing
- Structs — memory-compatible with C structs if declared in the same field order

### Mapping C enums

C enums are integer constants. In pure FC, use union types for sum types. When interoperating with a C API that uses an enum, model it as a module of `int32` constants and declare the extern function with an `int32` parameter:

```fc
module af =                    // address family constants (from sys/socket.h)
    let inet  = 2
    let inet6 = 10

module sock =                  // socket type constants
    let stream = 1
    let dgram  = 2
    let raw    = 3

module libc from "libc.so" =
    extern socket: (int32, int32, int32) -> int32    // returns fd or -1

let fd = libc.socket(af.inet, sock.stream, 0)
if fd == -1 then handle_error()
```

For bit flag enums, the same pattern applies and values combine naturally with bitwise operators:

```fc
module file_mode =
    let read  = 1
    let write = 2
    let exec  = 4

let mode = file_mode.read | file_mode.write
```

### `any*` — opaque pointers

`any*` is FC's opaque pointer type — a raw address with no associated element type. It maps directly to C's `void*` in generated code. Unlike C's `void*`, the name is unambiguous: `void` already has a specific meaning in FC (the non-instantiable return type), so reusing it for an unrelated pointer concept would be confusing. `any*` says what it means.

`any*` cannot be dereferenced — the compiler has no type information to read through it. It can only be stored, passed, returned, and cast to a typed pointer when the programmer knows the concrete type.

**C interop — opaque handles**

`any*` exists because C libraries expose opaque pointer types — `FILE*`, `sqlite3*`, `pthread_t*` — where the struct definition is hidden. FC has no struct definition to attach to these pointers, so they are represented as `any*`. Standard library modules like `std::io` wrap C's stdio and therefore return `any*` handles — the type propagates from the C boundary through the wrapper.

FC code that receives `any*` handles never constructs or inspects them; it passes them to functions that know how to operate on them:

```fc
module sqlite from "libsqlite3.so" =
    extern sqlite3_open:  (cstr, any*?) -> int32
    extern sqlite3_exec:  (any*, cstr, (any*, int32, any*, any*) -> int32, any*?, any*?) -> int32
    extern sqlite3_close: (any*) -> int32

module libc from "libc.so" =
    extern fopen:  (cstr, cstr) -> any*?
    extern fclose: (any*) -> int32
    extern fread:  (any*, int64, int64, any*) -> int64
    extern fwrite: (any*, int64, int64, any*) -> int64
    extern malloc: (int64) -> any*?
    extern free:   (any*) -> void
```

Note that `fread` and `fwrite` take `any*` for both the data buffer and the `FILE*` handle — both are `void*` in C. `int64` maps C's `size_t` parameters using the same principle as elsewhere: a reasonable signed upper bound that lets FC lengths pass through without casts.

The programmer is responsible for passing handles to the correct functions — FC's type system does not distinguish a `sqlite3*` from a `FILE*` at the `any*` level. This is an acceptable tradeoff: opaque handles are passed to a small number of known functions, and mixing them up is no more likely than passing the wrong integer argument.

**Function pointer parameters in C interop**

When a function type appears as a parameter in an `extern` declaration, the compiler maps it to a C function pointer at the boundary. The programmer passes a non-capturing lambda directly — no `&` required:

```fc
module libc from "libc.so" =
    extern qsort: (any*, int64, int64, (any*, any*) -> int32) -> void

// pass a non-capturing lambda directly — compiler handles C function pointer mapping
libc.qsort(data.ptr, data.len, sizeof(int32), (a: any*, b: any*) ->
    *(int32*) a - *(int32*) b)
```

Passing a capturing lambda to a C function pointer parameter is a compile error — the fat-pointer representation cannot be expressed as a plain C function pointer.

**C interop — FFI callbacks with user-data**

C APIs commonly pass a `void*` user_data alongside a function pointer so the callback can recover its context. Declare the callback parameter as an FC function type and the user-data as `any*`:

```fc
module libc from "libc.so" =
    extern pthread_create: (any*?, any*?, (any*) -> any*?, any*?) -> int32

let my_cb = (data: any*) ->
    let s = (my_state*) data
    // use s->...
    any*.none

let mut state = my_state { ... }
pthread_create(any*.none, any*.none, my_cb, some((any*) &state))
```

`my_cb` is non-capturing so it passes cleanly to `pthread_create`. The `any*` user-data is cast to the concrete type inside the callback.

**`any*` vs `void*` in C — a note on naming**

C uses `void` to mean two unrelated things: the absence of a return value (`void` as a return type) and the absence of a pointer's element type (`void*`). The only unifying thread is "absence of type information" — a stretch that has confused C programmers for decades. Rust faced the same problem and solved it by introducing `c_void` as a separate FFI-specific type, explicitly noting in its documentation that `c_void` is unrelated to Rust's unit type `()`.

FC avoids the problem entirely: `void` means what it always means, and `any*` is its own named concept.

**Where `any*` is not needed in FC**

In C, `void*` is frequently used for patterns that FC handles at the language level. FC programmers should reach for these before `any*`:

- **Heterogeneous collections** — in C, a `void*[]` holds mixed types. In FC, use a tagged union: `union shape = | circle(circle) | rect(rect)`. The type system tracks what's in each slot; no unsafe cast required.
- **Generic algorithms** — in C, `qsort` takes `void*` because it cannot be parameterized by element type. In FC, generic functions handle this directly: `let sort = (arr: 'a[], cmp: ('a, 'a) -> int32) -> ...`.
- **Stateful callbacks** — in C, a `void*` user_data accompanies every callback to carry context. In FC, closures capture their environment as a fat pointer internally — no manual user_data threading needed.
- **Opaque types within FC** — in C, hiding a struct's internals requires forward-declaring it in a header and exposing only `void*`. In FC, module-level `private` fields achieve the same thing with a typed pointer — the caller holds a `connection*` but cannot access its fields. No type erasure needed.

`any*` appears in everyday FC code — file handles from `std::io`, database handles from C wrapper libraries — but it always originates from a C boundary. Pure FC modules that want to hide their internals should use private struct fields and typed pointers, not `any*`.

---

### Converting between str and cstr

`str` to `cstr` — use `.ptr`. Programmer is responsible for null termination:

```fc
let cs = s.ptr    // type: cstr — only safe if s is null-terminated
```

`cstr` to `str` — construct a slice from the raw pointer and length:

```fc
let s = str { ptr = cs, len = libc.strlen(cs) }
```

The resulting `str` shares memory with the original C string — no allocation occurs. The programmer is responsible for ensuring the C string remains live for the lifetime of the FC slice.

# PART 9 — Generics

## Overview

FC supports parametric polymorphism through type variables. A type variable is a placeholder for any concrete type — the compiler produces a separate concrete instantiation for each unique combination of types a generic function or type is used with. This is **monomorphization**: there is no runtime type information, no boxing, and no dispatch overhead. Every generic use site compiles down to code that is identical in structure to what you would have written by hand for that specific type.

This is the same model as C++ templates, but specified at the language level rather than as a text-substitution mechanism. The compiler resolves all type variables before emitting any C output — the generated C contains only concrete, fully-typed code.

---

## Type Variables

A type variable is written as an apostrophe followed by a name: `'a`, `'b`, `'elem`, `'Key`, `'Val`. The apostrophe is a dedicated sigil — concrete type names never begin with `'`, so there is no ambiguity.

Type variables are **implicit** — they are never declared separately. Any `'a` appearing in a function signature, struct body, or union body is automatically treated as a type variable. Multiple occurrences of the same name within the same scope refer to the same type variable and constrain the types at those positions to be identical.

---

## Generic Functions

A function is generic if one or more type variables appear in its parameter or return types. The type variables are resolved at each call site by the compiler — no explicit instantiation syntax is required.

```fc
let identity = (x: 'a) -> x

let fst = (a: 'a, b: 'b) -> a

let map = (s: 'a[], f: ('a) -> 'b) ->
    let mut result = alloc('b[s.len])!
    let mut i = 0
    loop
        if i >= s.len then break result
        result[i] = f(s[i])
        i = i + 1

let swap = (p: pair<'a, 'b>) ->
    pair { first = p.second, second = p.first }
```

When the same type variable appears more than once, the compiler unifies the types at those positions:

```fc
let eq_first = (a: 'a, b: 'a) -> a == b    // both arguments must be the same type
```

`==` is valid here without any constraint because FC defines structural equality for all types (see §Structural Equality). This is one of the benefits of FC's universal equality model — unconstrained type variables can always use `==` and `!=`.

Return types are always inferred — if the body expression resolves to a concrete type, that becomes the return type after type variable substitution.

### Implicit and explicit type arguments

In the normal case, type variables are resolved entirely from the function's arguments — no explicit type annotation is needed at the call site:

```fc
let x = identity(42)                          // 'a = int32, inferred from argument
let z = map(points, (p: point) -> p.x)        // 'a = point, 'b = float64, inferred
```

However, some functions introduce type variables that do not appear in any parameter. The most common case is a constructor or factory function where the element type is not given by any argument:

```fc
// 'a cannot be inferred from any argument — it only appears in the return type
let make = <'a>() ->
    arraylist { data = alloc('a[4])!, len = 0 }
```

The `<'a>` prefix declares that `'a` is a type variable that must be explicitly supplied at every call site:

```fc
let mut nums = arraylist.make<int32>()
let mut strs = arraylist.make<str>()
```

Multiple explicit type variables are separated by commas:

```fc
let make_pair = <'a, 'b>() ->
    pair { first = default('a), second = default('b) }

let p = make_pair<int32, str>()
```

**The rule:** a type variable belongs in `<>` if and only if it does not appear in any parameter type. If a type variable appears in a parameter, it is always inferred from the argument — declaring it in `<>` as well is a compile error:

```fc
// compile error — 'a appears in a parameter, cannot also be declared explicit
let bad = <'a>(x: 'a) -> x
```

This keeps the explicit syntax minimal — it only appears when genuinely necessary, and a `<>` declaration is a clear signal to the reader that the type cannot be derived from the arguments.

**Inside a generic function body**, a `<>` type variable may be satisfied by a type variable already in scope from the enclosing function's own parameters — no explicit `<type>` annotation is needed at internal call sites:

```fc
let map = (l: arraylist<'a>, f: ('a) -> 'b) ->
    let mut result = arraylist.make<'b>()    // 'b is in scope — explicit but no concrete type needed
    for x in l.data[..l.len]
        arraylist.add(&result, f(x))
    result
```

The explicit `<type>` syntax is only required when calling from a non-generic context where no type variable is in scope.

**Passing generic functions as arguments** — `<type>` syntax is only valid in call position, never as a standalone expression. A generic function cannot be passed as a value directly — it has no single concrete type until instantiated. The idiomatic pattern is a wrapper lambda that instantiates at the required type:

```fc
let factory = <'a>() -> default('a)

// wrapper lambda instantiates factory at a specific type
let str_factory = () -> factory<str>()

let l = arraylist.repeat<str>(5, str_factory)

// or inline
let l = arraylist.repeat<str>(5, () -> factory<str>())
```

The wrapper is a plain concrete `() -> str` — no new language mechanism required. This covers all practical factory and callback patterns without rank-2 polymorphism.

**Rank-2 polymorphism is not supported** — a function parameter typed as "a generic function that works for any type" (e.g. `f: <'a>() -> 'a`) would require the callee to invoke `f` at multiple different types, which implies runtime type information or a constraint system. FC has neither, and this pattern is explicitly out of scope. The wrapper lambda approach covers all realistic cases without it.

**Parsing** — `name<type>()` is always parsed as a generic call, never as a comparison expression. This is unambiguous in FC because type names (`int32`, `str`, `point`, `'a`) are syntactically distinct from value expressions in all positions where they may appear. No disambiguation sigil (such as Rust's `::<>` turbofish) is required.

---

## Generic Structs and Unions

Structs and unions become generic by using type variables in their field or variant definitions. The type parameters are inferred from the body — no explicit parameter list is required on the type name.

```fc
struct pair =
    first:  'a
    second: 'b

struct box =
    value: 'a

union result =
    | ok('a)
    | err('b)
```

The compiler treats `pair` as implicitly parameterized over `'a` and `'b`, `box` over `'a`, and `result` over `'a` and `'b`. When used in type positions or constructed, the type arguments are supplied by context:

```fc
let p = pair { first = 42, second = "hello" }    // pair<int32, str>
let b = box { value = 3.14 }                     // box<float64>
let r = result.ok(42)                            // result<int32, 'b> — 'b unconstrained until used
```

Type variables in a struct or union propagate through — a function accepting a `pair<'a, 'b>` introduces those variables into its own signature:

```fc
let map_fst = (p: pair<'a, 'b>, f: ('a) -> 'c) ->
    pair { first = f(p.first), second = p.second }
```

### Type-associated modules on generic types

A module sharing a generic type's name works the same as for concrete types. Type variables in scope within the type definition are available within the associated module:

```fc
struct box =
    value: 'a

module box =
    let wrap = (x: 'a) -> box { value = x }
    let unwrap = (b: box<'a>) -> b.value
    let map = (b: box<'a>, f: ('a) -> 'b) -> box { value = f(b.value) }
```

Static type properties such as `.none`, `default(T)`, `sizeof(T)`, and module member access follow the same monomorphization rules as operators — they are valid on type variables in a generic body and checked against the concrete type at each call site:

```fc
let make_default = (x: 'a) -> default('a)     // ok — checked at call site
let size_of_val  = (x: 'a) -> sizeof('a)       // ok — checked at call site
let get_min      = (x: 'a) -> 'a.min           // ok — valid if concrete type has .min
```

A call site that provides a type without the required property is a monomorphization error — the same rule as for unsupported operators.

Static property access extends naturally to parameterized type expressions — `node<'b>.none` is valid because `node<'b>` is a type and `.none` is a universal property on all types. No special syntax rule is needed; the parser treats `T<args>` as a type expression and `.property` as property access on that type. This is the same form used in expressions like `arraylist.make<int32>()` — the `<args>` resolves the type, and the `.` navigates into the associated module or property.

---

## option

`option` is a built-in generic union:

```fc
union option =
    | none
    | some('a)
```

`none` is declared first so that zero-initialized memory is always a valid `none` — consistent with the union default value rules (see §Default Values). `'a?` is syntactic sugar for `option<'a>` — the two are interchangeable in all type positions. The existing `.none` and `some(x)` construction syntax, pattern matching, and `!` unwrapping all apply unchanged.

The pointer optimization is preserved as a special compiler rule applied during monomorphization: when `option` is instantiated with a pointer type (`'a*`), the compiler emits a plain nullable C pointer rather than a tagged struct. This is invisible at the FC level — `'a*?` still behaves as an option type — but means pointer options remain zero-cost and ABI-compatible with C nullable pointer returns.

---

## Monomorphization

For each unique combination of concrete types a generic function or type is used with, the compiler produces a distinct concrete instantiation. This happens entirely before C code is emitted — the generated C contains no type variables, no generic machinery, and no runtime type information.

```fc
let x = identity(42)        // produces: identity instantiated at int32
let y = identity(3.14)      // produces: identity instantiated at float64
let z = identity("hello")   // produces: identity instantiated at str

let p1 = pair { first = 1,     second = true  }   // produces: pair<int32, bool>
let p2 = pair { first = "hi",  second = 3.14  }   // produces: pair<str, float64>
```

Each instantiation becomes a distinct C type or function. The compiler derives C names from the generic name and the concrete type arguments — for example, `pair<int32, bool>` might emit as `pair_int32_bool` and `identity` at `int32` as `identity_int32`. The exact naming scheme is a compiler implementation detail; what matters is that names are unique, derived deterministically from the types, and human-readable enough to be identifiable in debugger output and compiler errors.

Two uses of the same generic at the same concrete types share a single instantiation — the compiler deduplicates across the entire build.

> **Transpilation**
> A generic struct transpiles to a C struct per instantiation:
> ```c
> typedef struct { int32_t first; bool second; } pair_int32_bool;
> typedef struct { fc_slice_uint8 first; double second; } pair_str_float64;
> ```
> A generic function transpiles to a C function per unique call signature:
> ```c
> int32_t identity_int32(int32_t x) { return x; }
> double  identity_float64(double x) { return x; }
> ```
> `option<'a>` follows the existing option transpilation rules per instantiation — pointer types use the null-sentinel form, all others use the tagged struct form.

### Errors at monomorphization

FC has no constraint system in this version. Type variables are unconstrained — any concrete type may be substituted. If a generic function uses an operation that the concrete type does not support, the compiler reports an error at the **call site** where the unsupported instantiation was requested, identifying the type variable substitution that caused the problem. Errors are not reported inside the generic definition itself.

This means generic functions work naturally across numeric types without any annotation:

```fc
let add = (a: 'a, b: 'a) -> a + b

add(1, 2)           // ok — int32 supports +
add(1.0, 2.0)       // ok — float64 supports +
add("x", "y")       // compile error at this call site — str does not support +
```

The error message identifies the call site and the substitution: something like "when calling `add` with `'a = str`, operator `+` is not defined for `str`." This makes it straightforward to diagnose in practice, even without a formal constraint declaration in the source.

# Appendix

## Full Examples

### Linked List

Demonstrates generics, structs, pointers, options, recursion, higher-order functions, and manual memory management. Note that the cleanup function is named `drop` rather than `free` — `free` is a reserved identifier in FC.

```fc
struct node =
    value: 'a
    next:  node<'a>*?

module node =
    let make = (value: 'a) ->
        alloc(node { value = value })!

    let prepend = (head: node<'a>*?, value: 'a) ->
        let n = node.make(value)
        n->next = head
        n

    let map = (head: node<'a>*?, f: ('a) -> 'b) ->
        match head with
        | none      -> node<'b>.none
        | some(ptr) ->
            let n = node.make(f(ptr->value))
            n->next = node.map(ptr->next, f)
            some(n)

    let drop = (head: node<'a>*?) ->
        let mut current = head
        loop
            match current with
            | none      -> break
            | some(ptr) ->
                let next = ptr->next
                free(ptr)
                current = next

let main = (args: str[]) ->
    let list = some(node.prepend(some(node.prepend(node.none, 1)), 2))
    let doubled = node.map(list, (x: int32) -> x * 2)
    node.drop(list)
    node.drop(doubled)
    0
```

### String Search

Demonstrates slice operations, loops, and early return.

```fc
import libc

let find_substring = (haystack: str, needle: str) ->
    if needle.len > haystack.len then return str.none
    let mut i = 0
    loop
        // safe: needle.len <= haystack.len guaranteed by early return above
        if i > haystack.len - needle.len then break str.none
        let candidate = haystack[i .. i + needle.len]
        if candidate == needle then break some(candidate)
        i = i + 1

let main = (args: str[]) ->
    let haystack = "the quick brown fox"
    let needle = "brown"
    match find_substring(haystack, needle) with
    | some(_) -> libc.printf(c"found\n")
    | none    -> libc.printf(c"not found\n")
    0
```

### Resizable Array List

Demonstrates generics, type-associated modules, heap growth, and idiomatic functional operations over a generic container. `data.len` is the allocated capacity; `len` is the number of live elements.

```fc
struct arraylist =
    data: 'a[]
    len:  int64

module arraylist =

    private let grow = (l: arraylist<'a>*) ->
        let new_cap = l->data.len * 2
        let mut new_data = alloc('a[new_cap])!
        for i in 0..l->len
            new_data[i] = l->data[i]
        free(l->data)
        l->data = new_data

    let make = <'a>() ->
        arraylist { data = alloc('a[4])!, len = 0 }

    let drop = (l: arraylist<'a>) ->
        free(l.data)

    let add = (l: arraylist<'a>*, value: 'a) ->
        if l->len == l->data.len then arraylist.grow(l)
        l->data[l->len] = value
        l->len = l->len + 1

    let insert = (l: arraylist<'a>*, index: int64, value: 'a) ->
        if l->len == l->data.len then arraylist.grow(l)
        let mut i = l->len
        loop
            if i <= index then break
            l->data[i] = l->data[i - 1]
            i = i - 1
        l->data[index] = value
        l->len = l->len + 1

    let get = (l: arraylist<'a>, index: int64) ->
        l.data[..l.len][index]

    let update = (l: arraylist<'a>*, index: int64, value: 'a) ->
        l->data[..l->len][index] = value

    let iter = (l: arraylist<'a>, f: ('a) -> void) ->
        for x in l.data[..l.len]
            f(x)

    let map = (l: arraylist<'a>, f: ('a) -> 'b) ->
        let mut result = arraylist.make<'b>()
        for x in l.data[..l.len]
            arraylist.add(&result, f(x))
        result

    let filter = (l: arraylist<'a>, pred: ('a) -> bool) ->
        let mut result = arraylist.make<'a>()
        for x in l.data[..l.len]
            if pred(x) then arraylist.add(&result, x)
        result

    let fold = (l: arraylist<'a>, init: 'b, f: ('b, 'a) -> 'b) ->
        let mut acc = init
        for x in l.data[..l.len]
            acc = f(acc, x)
        acc

    let reduce = (l: arraylist<'a>, f: ('a, 'a) -> 'a) ->
        if l.len == 0 then 'a.none
        else
            let mut acc = l.data[0]
            for x in l.data[1..l.len]
                acc = f(acc, x)
            some(acc)

    let scan = (l: arraylist<'a>, init: 'b, f: ('b, 'a) -> 'b) ->
        let mut result = arraylist.make<'b>()
        arraylist.add(&result, init)
        let mut acc = init
        for x in l.data[..l.len]
            acc = f(acc, x)
            arraylist.add(&result, acc)
        result

    let try_find = (l: arraylist<'a>, pred: ('a) -> bool) ->
        let mut i = 0
        loop
            if i >= l.len then break 'a.none
            if pred(l.data[i]) then break some(l.data[i])
            i = i + 1

    let find = (l: arraylist<'a>, pred: ('a) -> bool) ->
        arraylist.try_find(l, pred)!

let main = (args: str[]) ->
    let mut nums = arraylist.make<int32>()
    arraylist.add(&nums, 1)
    arraylist.add(&nums, 2)
    arraylist.add(&nums, 3)
    arraylist.add(&nums, 4)
    arraylist.add(&nums, 5)
    arraylist.insert(&nums, 2, 99)
    // nums = [1, 2, 99, 3, 4, 5]
    arraylist.update(&nums, 0, 10)
    // nums = [10, 2, 99, 3, 4, 5]

    let doubled     = arraylist.map(nums, (x: int32) -> x * 2)
    let evens       = arraylist.filter(nums, (x: int32) -> x % 2 == 0)
    let sum         = arraylist.fold(nums, 0, (acc: int32, x: int32) -> acc + x)
    let product     = arraylist.reduce(nums, (a: int32, b: int32) -> a * b)
    let running_sum = arraylist.scan(nums, 0, (acc: int32, x: int32) -> acc + x)
    let first_big   = arraylist.try_find(nums, (x: int32) -> x > 10)   // some(99)
    let big         = arraylist.find(nums, (x: int32) -> x > 10)       // 99

    arraylist.drop(nums)
    arraylist.drop(doubled)
    arraylist.drop(evens)
    arraylist.drop(running_sum)
    0
```

### Namespaces & Imports

A vendor geometry library used by a 2D simulation. Demonstrates namespace declarations, same-namespace imports within a vendor library, cross-namespace imports in application code, type-associated modules, and a multi-file build.

**`vendor/geom/vec.fc`** — defines `vec2` with a type-associated module, exported via `module vectors`:

```fc
namespace geom::

module vectors =
    struct vec2 =
        x: float64
        y: float64

    module vec2 =
        let zero     = vec2 { }
        let unit_x   = vec2 { x = 1.0 }
        let unit_y   = vec2 { y = 1.0 }

        let add = (a: vec2, b: vec2) ->
            vec2 { x = a.x + b.x, y = a.y + b.y }

        let scale = (v: vec2, s: float64) ->
            vec2 { x = v.x * s, y = v.y * s }

        let dot = (a: vec2, b: vec2) ->
            a.x * b.x + a.y * b.y
```

**`vendor/geom/shapes.fc`** — defines shape types; imports `vec2` from the same namespace without qualification:

```fc
namespace geom::

import vec2 from vectors                // same namespace — vec2 type and module in scope

module shapes =
    struct rect_bounds =                // multi-field variant requires a named struct
        min: vec2
        max: vec2

    union shape =
        | circle(float64)               // radius
        | rect(rect_bounds)             // min corner, max corner

    module shape =
        let area = (s: shape) ->
            match s with
            | circle(r) -> 3.14159 * r * r
            | rect(b)   ->
                let w = b.max.x - b.min.x
                let h = b.max.y - b.min.y
                w * h
```

**`src/world.fc`** — application module; imports from `geom::`:

```fc
import vec2 from geom::vectors          // cross-namespace — vec2 type and module in scope
import shape from geom::shapes          // cross-namespace — shape type and module in scope

module world =
    struct body =
        position: vec2
        velocity: vec2
        bounds:   shape

    let step = (b: body, dt: float64) ->
        let new_pos = vec2.add(b.position, vec2.scale(b.velocity, dt))
        body { position = new_pos, velocity = b.velocity, bounds = b.bounds }
```

**`src/main.fc`** — entry point; imports `world` from the same namespace and the needed types from `geom::`:

```fc
import world                            // same namespace — global:: implicit
import vec2 from geom::vectors          // needed to construct vec2 literals
import shape from geom::shapes          // needed to construct shape variants

let main = (args: str[]) ->
    let mut b = world.body {
        position = vec2 { x = 0.0, y = 0.0 },
        velocity = vec2 { x = 1.0, y = 0.5 },
        bounds   = shape.circle(1.0)
    }
    let mut i = 0
    loop
        if i >= 100 then break 0
        b = world.step(b, 0.016)
        i = i + 1
```

**Build:**

```
fc build src/*.fc vendor/geom/*.fc
```

The compiler's first pass collects all four files, registers `geom::` as a namespace containing `vectors` and `shapes`, and resolves all imports before type-checking. The two `global::` files see each other's modules without qualification; `src/world.fc` must use the full `from geom::vectors` and `from geom::shapes` forms to reach across the namespace boundary. `src/main.fc` does the same to bring `vec2` and `shape` into scope for constructing the `world.body` literal — importing `world` alone is not sufficient, since re-exporting imported names is not automatic.

## Road to Implementation

This section outlines the major work items between this design specification and a working FC compiler. The items are roughly ordered by dependency — earlier items inform later ones.

### Formal grammar

A complete formal grammar (PEG or BNF) is the natural first step. The design spec describes syntax through prose and examples, which is sufficient for language design but insufficient for parser implementation. Writing the grammar will surface ambiguities and edge cases not yet visible in prose — particularly around the interaction between indentation-based layout, continuation lines, and expression-level constructs like `match` and `if`.

Key areas that will need careful attention in the grammar:

- The offside rule and how it interacts with multi-line expressions, match arms, and nested blocks
- Disambiguation of overloaded tokens (`*`, `&`, `!`, `->`) across type and expression contexts
- Negative literals in patterns vs. unary negation in expressions
- `T<args>` in call position vs. comparison operators
- The boundary between type expressions and value expressions

### Lexer

A whitespace-sensitive lexer that tracks column positions and emits synthetic indent/dedent tokens (or equivalent layout information). The lexer must handle nested block comments, all escape sequences, suffixed numeric literals with compile-time range checking, and the tab prohibition.

### Two-pass compiler front end

The spec describes a two-pass architecture: a first pass that collects top-level declarations (names, types, struct layouts, module structure) and a second pass that type-checks all expressions. This maps to a concrete implementation:

- **Pass 1** — scan all files, build the global module map, resolve namespaces and imports, detect circular imports, collect struct/union layouts, and register function signatures (parameter types inferred from annotations, return types deferred).
- **Pass 2** — type-check all expression bodies with the full environment available. Resolve type variables at generic call sites. Detect monomorphization errors. Enforce capture rules on closures.

### Monomorphizer

After type-checking, the monomorphizer walks every generic call site and produces concrete instantiations. This is a fixpoint process — a generic function may call another generic function, requiring transitive instantiation. The monomorphizer must detect and deduplicate identical instantiations across the build.

### C code emitter

The backend emits C11 source from the typed, monomorphized AST. Most of the transpilation patterns are already specified in this document — the emitter is largely a mechanical translation. Key areas requiring care:

- Name mangling for monomorphized generics, module-qualified names, and collision avoidance
- The cast-through-unsigned pattern for signed arithmetic
- Shift amount masking
- Fat pointer representation for closures and slices
- Tagged union layout with C11 anonymous unions
- Bounds check and division-by-zero guard insertion
- Option type specialization (null-sentinel for pointer options, tagged struct for value options)
- Conditional compilation directive handling

### Runtime support

FC has minimal runtime needs — no garbage collector, no scheduler, no standard library beyond what C provides. The compiler may need to emit a small set of support functions:

- `abort()`-based trap functions for bounds check, unwrap, and division-by-zero failures
- Generated equality functions for structs and unions where `==` is used
- Platform-specific trap instructions for bare-metal targets

### Test infrastructure

A test suite covering the major areas of the spec: type inference edge cases, generic monomorphization, closure capture and lifetime rules, operator semantics (overflow wrapping, shift masking, implicit widening), bounds checking, pattern matching exhaustiveness, module visibility, and C interop. Each transpilation note in this spec is effectively a test case.
